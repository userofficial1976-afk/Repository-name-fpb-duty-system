<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kod Duty - FPB Duty System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    background: #f1f5f9;
    color: #1e293b;
}

header {
    background: #0f172a;
    color: white;
    padding: 20px 25px;
}

header h1 {
    margin: 0;
    font-size: 25px;
}

header p {
    margin: 6px 0 0;
    color: #cbd5e1;
}

nav {
    background: #1e293b;
    padding: 10px 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

nav a {
    color: white;
    text-decoration: none;
    padding: 9px 14px;
    border-radius: 6px;
    font-size: 14px;
}

nav a:hover,
nav a.active {
    background: #2563eb;
}

.container {
    max-width: 1400px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
}

h2 {
    margin-top: 0;
    color: #0f172a;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 6px;
}

input,
select,
button {
    width: 100%;
    padding: 11px;
    border-radius: 7px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #1d4ed8;
}

.btn-danger {
    background: #dc2626;
}

.btn-danger:hover {
    background: #b91c1c;
}

.btn-warning {
    background: #f59e0b;
}

.btn-warning:hover {
    background: #d97706;
}

.success {
    background: #dcfce7;
    color: #166534;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
}

.error {
    background: #fee2e2;
    color: #991b1b;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
}

.table-wrapper {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 900px;
}

th,
td {
    border-bottom: 1px solid #e2e8f0;
    padding: 10px;
    text-align: left;
    white-space: nowrap;
}

th {
    background: #0f172a;
    color: white;
}

tr:hover {
    background: #f8fafc;
}

.badge {
    display: inline-block;
    padding: 5px 9px;
    border-radius: 5px;
    font-weight: bold;
}

.badge-aktif {
    background: #dcfce7;
    color: #166534;
}

.badge-tidak {
    background: #fee2e2;
    color: #991b1b;
}

.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

.modal-content {
    background: white;
    width: 90%;
    max-width: 700px;
    margin: 5% auto;
    padding: 25px;
    border-radius: 12px;
}

.close {
    float: right;
    font-size: 25px;
    cursor: pointer;
    color: #64748b;
}

.modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.modal-buttons button {
    flex: 1;
}

@media(max-width:600px) {

    header h1 {
        font-size: 20px;
    }

    .container {
        padding: 10px;
    }

}

</style>

</head>

<body>

<header>

<h1>FPB DUTY SYSTEM</h1>

<p>Kod Duty</p>

</header>

<nav>

<a href="index.html">
🏠 Dashboard
</a>

<a href="anggota.html">
👥 Senarai Anggota
</a>

<a href="jadual-duty.html">
📅 Jadual Duty
</a>

<a href="kod-duty.html" class="active">
🏷️ Kod Duty
</a>

<a href="laporan.html">
📊 Laporan
</a>

<a href="tetapan.html">
⚙️ Tetapan
</a>

</nav>

<div class="container">

<div class="card">

<h2>🏷️ Senarai Kod Duty</h2>

<div id="mesej"></div>

<div class="grid">

<div>

<label>Cari Kod / Waktu</label>

<input
type="text"
id="cari"
placeholder="Cari..."
onkeyup="paparKodDuty()"
>

</div>

<div>

<label>Status</label>

<select
id="filterStatus"
onchange="paparKodDuty()"
>

<option value="">
Semua Status
</option>

<option value="Aktif">
Aktif
</option>

<option value="Tidak Aktif">
Tidak Aktif
</option>

</select>

</div>

</div>

<br>

<button onclick="bukaTambah()">

➕ TAMBAH KOD DUTY

</button>

</div>


<div class="card">

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>Kod</th>

<th>Waktu Tugasan</th>

<th>Jam Kerja</th>

<th>Jam KLM</th>

<th>Status</th>

<th>Tindakan</th>

</tr>

</thead>

<tbody id="senaraiKodDuty">

<tr>

<td colspan="6">

Memuatkan data...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>


<!-- MODAL -->

<div
id="modalKod"
class="modal"
>

<div class="modal-content">

<span
class="close"
onclick="tutupModal()"
>
&times;
</span>

<h2 id="tajukModal">

Tambah Kod Duty

</h2>

<input
type="hidden"
id="editKod"
>

<div class="grid">

<div>

<label>Kod Duty</label>

<input
type="text"
id="kod"
placeholder="Contoh: D1"
>

</div>

<div>

<label>Waktu Tugasan</label>

<input
type="text"
id="waktuTugasan"
placeholder="Contoh: 0800 - 1600"
>

</div>

<div>

<label>Jam Kerja</label>

<input
type="number"
id="jamKerja"
step="0.01"
>

</div>

<div>

<label>Jam KLM</label>

<input
type="number"
id="jamKlm"
step="0.01"
>

</div>

<div>

<label>Status</label>

<select id="status">

<option value="Aktif">
Aktif
</option>

<option value="Tidak Aktif">
Tidak Aktif
</option>

</select>

</div>

</div>

<div class="modal-buttons">

<button onclick="simpanKodDuty()">

💾 SIMPAN

</button>

<button
class="btn-danger"
onclick="tutupModal()"
>

BATAL

</button>

</div>

</div>

</div>


<script>

// ===============================
// SUPABASE
// ===============================

const SUPABASE_URL =
"https://nlwrrrwkjpktrifxeymw.supabase.co";

const SUPABASE_KEY =
"sb_publishable_0ymP9thOFXkuNYzvwa0gwQ_1mbxyFE6";

const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);


// ===============================
// DATA
// ===============================

let semuaKodDuty = [];


// ===============================
// MULA
// ===============================

document.addEventListener(
"DOMContentLoaded",
async function() {

    await muatKodDuty();

});


// ===============================
// MUAT KOD DUTY
// ===============================

async function muatKodDuty() {

    const result =
    await supabaseClient
    .from("kod_duty")
    .select(
        "kod,waktu_tugasan,jam_kerja,jam_klm,status"
    )
    .order(
        "kod",
        {
            ascending: true
        }
    );

    if (result.error) {

        paparMesej(
            "Gagal ambil data: "
            + result.error.message,
            "error"
        );

        return;

    }

    semuaKodDuty =
    result.data || [];

    paparKodDuty();

}


// ===============================
// PAPAR KOD DUTY
// ===============================

function paparKodDuty() {

    const cari =
    document
    .getElementById("cari")
    .value
    .toLowerCase();

    const filterStatus =
    document
    .getElementById("filterStatus")
    .value;

    const data =
    semuaKodDuty.filter(
    function(x) {

        const teks =
        (
            x.kod
            + " "
            + x.waktu_tugasan
            + " "
            + x.jam_kerja
            + " "
            + x.jam_klm
        )
        .toLowerCase();

        return (

            teks.includes(cari)

            &&

            (
                !filterStatus
                ||
                x.status === filterStatus
            )

        );

    });

    const tbody =
    document
    .getElementById(
        "senaraiKodDuty"
    );

    tbody.innerHTML = "";

    if (data.length === 0) {

        tbody.innerHTML = `

        <tr>

            <td colspan="6">

                Tiada rekod kod duty.

            </td>

        </tr>

        `;

        return;

    }

    data.forEach(
    function(duty) {

        const tr =
        document.createElement(
            "tr"
        );

        const statusClass =
        duty.status === "Aktif"
        ? "badge-aktif"
        : "badge-tidak";

        tr.innerHTML = `

        <td>

            <strong>
                ${duty.kod || ""}
            </strong>

        </td>

        <td>
            ${duty.waktu_tugasan || ""}
        </td>

        <td>
            ${duty.jam_kerja || 0} jam
        </td>

        <td>
            ${duty.jam_klm || 0} jam
        </td>

        <td>

            <span
            class="badge ${statusClass}"
            >

                ${duty.status || ""}

            </span>

        </td>

        <td>

            <button
            class="btn-warning"
            onclick="editKodDuty('${duty.kod}')"
            >

                ✏️ Edit

            </button>

        </td>

        `;

        tbody.appendChild(tr);

    });

}


// ===============================
// TAMBAH
// ===============================

function bukaTambah() {

    document
    .getElementById(
        "tajukModal"
    )
    .textContent =
    "Tambah Kod Duty";

    document
    .getElementById(
        "editKod"
    )
    .value =
    "";

    document
    .getElementById(
        "kod"
    )
    .value =
    "";

    document
    .getElementById(
        "kod"
    )
    .disabled =
    false;

    document
    .getElementById(
        "waktuTugasan"
    )
    .value =
    "";

    document
    .getElementById(
        "jamKerja"
    )
    .value =
    "";

    document
    .getElementById(
        "jamKlm"
    )
    .value =
    "";

    document
    .getElementById(
        "status"
    )
    .value =
    "Aktif";

    document
    .getElementById(
        "modalKod"
    )
    .style.display =
    "block";

}


// ===============================
// EDIT
// ===============================

function editKodDuty(kod) {

    const duty =
    semuaKodDuty.find(
        x =>
        String(x.kod)
        ===
        String(kod)
    );

    if (!duty) {

        return;

    }

    document
    .getElementById(
        "tajukModal"
    )
    .textContent =
    "Edit Kod Duty";

    document
    .getElementById(
        "editKod"
    )
    .value =
    duty.kod;

    document
    .getElementById(
        "kod"
    )
    .value =
    duty.kod;

    document
    .getElementById(
        "kod"
    )
    .disabled =
    true;

    document
    .getElementById(
        "waktuTugasan"
    )
    .value =
    duty.waktu_tugasan || "";

    document
    .getElementById(
        "jamKerja"
    )
    .value =
    duty.jam_kerja || "";

    document
    .getElementById(
        "jamKlm"
    )
    .value =
    duty.jam_klm || "";

    document
    .getElementById(
        "status"
    )
    .value =
    duty.status || "Aktif";

    document
    .getElementById(
        "modalKod"
    )
    .style.display =
    "block";

}


// ===============================
// SIMPAN
// ===============================

async function simpanKodDuty() {

    const kod =
    document
    .getElementById("kod")
    .value
    .trim();

    const waktuTugasan =
    document
    .getElementById("waktuTugasan")
    .value
    .trim();

    const jamKerja =
    document
    .getElementById("jamKerja")
    .value;

    const jamKlm =
    document
    .getElementById("jamKlm")
    .value;

    const status =
    document
    .getElementById("status")
    .value;

    const editKod =
    document
    .getElementById("editKod")
    .value;

    if (
        !kod
        ||
        !waktuTugasan
    ) {

        alert(
            "Kod dan waktu tugasan wajib diisi."
        );

        return;

    }

    let result;

    if (editKod) {

        result =
        await supabaseClient
        .from("kod_duty")
        .update({

            waktu_tugasan:
            waktuTugasan,

            jam_kerja:
            jamKerja,

            jam_klm:
            jamKlm,

            status:
            status

        })
        .eq(
            "kod",
            editKod
        );

    } else {

        result =
        await supabaseClient
        .from("kod_duty")
        .insert({

            kod:
            kod,

            waktu_tugasan:
            waktuTugasan,

            jam_kerja:
            jamKerja,

            jam_klm:
            jamKlm,

            status:
            status

        });

    }

    if (result.error) {

        paparMesej(
            "Gagal simpan: "
            + result.error.message,
            "error"
        );

        return;

    }

    tutupModal();

    paparMesej(
        "Kod duty berjaya disimpan.",
        "success"
    );

    await muatKodDuty();

}


// ===============================
// TUTUP
// ===============================

function tutupModal() {

    document
    .getElementById(
        "modalKod"
    )
    .style.display =
    "none";

}


// ===============================
// MESEJ
// ===============================

function paparMesej(
    mesej,
    jenis
) {

    const div =
    document
    .getElementById(
        "mesej"
    );

    div.className =
    jenis;

    div.textContent =
    mesej;

    setTimeout(
    function() {

        div.textContent =
        "";

        div.className =
        "";

    },
    5000
    );

}

</script>

</body>

</html>
