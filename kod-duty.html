<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"

>

<title>Kod Duty - FPB Duty System</title>

<style>

/* =====================================================
   RESET
===================================================== */

* {

    box-sizing: border-box;

    font-family: Arial, sans-serif;

}


/* =====================================================
   BODY
===================================================== */

body {

    margin: 0;

    background: #f1f5f9;

    color: #1e293b;

}


/* =====================================================
   HEADER
===================================================== */

header {

    background: #0f172a;

    color: white;

    padding: 20px 25px;

}


header h1 {

    margin: 0;

    font-size: 25px;

}


header p {

    margin: 6px 0 0;

    color: #cbd5e1;

}


/* =====================================================
   CONTAINER
===================================================== */

.container {

    max-width: 1400px;

    margin: auto;

    padding: 20px;

}


/* =====================================================
   BUTTON DASHBOARD
===================================================== */

.btn-dashboard {

    display: inline-block;

    background: #2563eb;

    color: white;

    text-decoration: none;

    padding: 10px 16px;

    border-radius: 7px;

    font-weight: bold;

    margin-top: 15px;

}


/* =====================================================
   CARD
===================================================== */

.card {

    background: white;

    border-radius: 12px;

    padding: 20px;

    margin-bottom: 20px;

    box-shadow:

        0 3px 12px

        rgba(

            0,

            0,

            0,

            0.08

        );

}


/* =====================================================
   HEADING
===================================================== */

h2 {

    margin-top: 0;

    color: #0f172a;

}


/* =====================================================
   GRID
===================================================== */

.grid {

    display: grid;

    grid-template-columns:

        repeat(

            auto-fit,

            minmax(

                220px,

                1fr

            )

        );

    gap: 15px;

}


/* =====================================================
   LABEL
===================================================== */

label {

    display: block;

    font-weight: bold;

    margin-bottom: 6px;

}


/* =====================================================
   INPUT SELECT BUTTON
===================================================== */

input,

select,

button {

    width: 100%;

    padding: 11px;

    border-radius: 7px;

    border: 1px solid #cbd5e1;

    font-size: 14px;

}


/* =====================================================
   BUTTON
===================================================== */

button {

    background: #2563eb;

    color: white;

    border: none;

    cursor: pointer;

    font-weight: bold;

}


button:hover {

    background: #1d4ed8;

}


/* =====================================================
   BUTTON EDIT
===================================================== */

.btn-edit {

    background: #f59e0b;

}


.btn-edit:hover {

    background: #d97706;

}


/* =====================================================
   BUTTON DELETE
===================================================== */

.btn-danger {

    background: #dc2626;

}


.btn-danger:hover {

    background: #b91c1c;

}


/* =====================================================
   TABLE
===================================================== */

.table-wrapper {

    overflow-x: auto;

}


table {

    width: 100%;

    border-collapse: collapse;

    min-width: 900px;

}


th,

td {

    border-bottom:

        1px solid

        #e2e8f0;

    padding: 11px;

    text-align: left;

}


th {

    background: #0f172a;

    color: white;

}


tr:hover {

    background: #f8fafc;

}


/* =====================================================
   MESEJ
===================================================== */

.success {

    background: #dcfce7;

    color: #166534;

    padding: 10px;

    border-radius: 6px;

    margin-bottom: 15px;

}


.error {

    background: #fee2e2;

    color: #991b1b;

    padding: 10px;

    border-radius: 6px;

    margin-bottom: 15px;

}


/* =====================================================
   BADGE
===================================================== */

.badge {

    display: inline-block;

    padding: 5px 9px;

    border-radius: 5px;

    font-weight: bold;

}


.badge-aktif {

    background: #dcfce7;

    color: #166534;

}


.badge-tidak-aktif {

    background: #fee2e2;

    color: #991b1b;

}


/* =====================================================
   BUTTON SIMPAN
===================================================== */

.btn-simpan {

    margin-top: 20px;

}


/* =====================================================
   BUTTON BATAL
===================================================== */

.btn-batal {

    background: #64748b;

    margin-top: 10px;

}


.btn-batal:hover {

    background: #475569;

}


/* =====================================================
   TINDAKAN
===================================================== */

.tindakan {

    display: flex;

    gap: 6px;

}


.tindakan button {

    width: auto;

    padding: 7px 10px;

}


/* =====================================================
   RESPONSIVE
===================================================== */

@media (

    max-width: 600px

) {


    header {

        padding: 18px;

    }


    header h1 {

        font-size: 21px;

    }


    .container {

        padding: 12px;

    }


    .card {

        padding: 15px;

    }


    .tindakan {

        flex-direction: column;

    }


}

</style>

</head>

<body>

<!-- =====================================================
     HEADER
===================================================== -->

<header>

<h1>

🏷️ KOD DUTY

</h1>

<p>

Pengurusan Kod Waktu Kerja Mengikut Unit

</p>

<a

```
href="index.html"

class="btn-dashboard"
```

>

🏠 Kembali ke Dashboard

</a>

</header>

<!-- =====================================================
     CONTAINER
===================================================== -->

<div class="container">

<!-- =====================================================
     BORANG TAMBAH / EDIT
===================================================== -->

<div class="card">

<h2 id="tajukBorang">

➕ Tambah Kod Duty

</h2>

<div id="mesej"></div>

<div class="grid">

<!-- =================================================
     UNIT
================================================== -->

<div>

<label>

Unit

</label>

<select id="unit">

<option value="">

-- Pilih Unit --

</option>

<option value="Jerangau">

Jerangau

</option>

<option value="Chador">

Chador

</option>

<option value="Terengganu">

Terengganu

</option>

<option value="Setiu">

Setiu

</option>

<option value="Rantau Abang">

Rantau Abang

</option>

<option value="Kerteh">

Kerteh

</option>

</select>

</div>

<!-- =================================================
     KOD DUTY
================================================== -->

<div>

<label>

Kod Duty

</label>

<input

```
type="text"

id="kod"

placeholder="Contoh: A"
```

>

</div>

<!-- =================================================
     WAKTU TUGASAN
================================================== -->

<div>

<label>

Waktu Tugasan

</label>

<input

```
type="text"

id="waktuTugasan"

placeholder="Contoh: 0700-1500"
```

>

</div>

<!-- =================================================
     JAM KERJA
================================================== -->

<div>

<label>

Jam Kerja

</label>

<input

```
type="number"

id="jamKerja"

min="0"

step="0.5"

placeholder="Contoh: 8"
```

>

</div>

<!-- =================================================
     JAM KLM
================================================== -->

<div>

<label>

Jam KLM

</label>

<input

```
type="number"

id="jamKlm"

min="0"

step="0.5"

value="0"
```

>

</div>

<!-- =================================================
     STATUS
================================================== -->

<div>

<label>

Status

</label>

<select id="status">

<option value="Aktif">

Aktif

</option>

<option value="Tidak Aktif">

Tidak Aktif

</option>

</select>

</div>

</div>

<br>

<button

```
class="btn-simpan"

onclick="simpanKodDuty()"
```

>

💾 SIMPAN KOD DUTY

</button>

<button

```
id="btnBatal"

class="btn-batal"

onclick="batalEdit()"

style="display:none"
```

>

❌ BATAL EDIT

</button>

</div>

<!-- =====================================================
     SENARAI KOD DUTY
===================================================== -->

<div class="card">

<h2>

📋 Senarai Kod Duty

</h2>

<!-- =================================================
     FILTER
================================================== -->

<div class="grid">

<div>

<label>

Tapisan Unit

</label>

<select

```
id="filterUnit"

onchange="paparKodDuty()"
```

>

<option value="">

Semua Unit

</option>

<option value="Jerangau">

Jerangau

</option>

<option value="Chador">

Chador

</option>

<option value="Terengganu">

Terengganu

</option>

<option value="Setiu">

Setiu

</option>

<option value="Rantau Abang">

Rantau Abang

</option>

<option value="Kerteh">

Kerteh

</option>

</select>

</div>

<div>

<label>

Cari Kod

</label>

<input

```
type="text"

id="cariKod"

placeholder="Contoh: A"

onkeyup="paparKodDuty()"
```

>

</div>

</div>

<br>

<!-- =================================================
     TABLE
================================================== -->

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>Bil</th>

<th>Unit</th>

<th>Kod Duty</th>

<th>Waktu Tugasan</th>

<th>Jam Kerja</th>

<th>Jam KLM</th>

<th>Status</th>

<th>Tindakan</th>

</tr>

</thead>

<tbody id="senaraiKodDuty">

<tr>

<td colspan="8">

Memuatkan data...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<!-- =====================================================
     SUPABASE
===================================================== -->

<script

src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"

></script>

<!-- =====================================================
     SAMBUNGAN SUPABASE
===================================================== -->

<script src="supabase.js"></script>

<!-- =====================================================
     JAVASCRIPT KOD DUTY
===================================================== -->

<script src="js/kod-duty.js"></script>

</body>

</html>
