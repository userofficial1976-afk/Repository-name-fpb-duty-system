<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"

>

<title>
Kod Tempat Kerja — FPB Duty System
</title>

<style>

* {

    box-sizing: border-box;

    margin: 0;

    padding: 0;

    font-family:
        "Segoe UI",
        Arial,
        sans-serif;

}


body {

    background: #f3f3f3;

    color: #111;

}


header {

    background: #080808;

    color: white;

    padding: 25px 35px;

}


.header-content {

    max-width: 1500px;

    margin: auto;

    display: flex;

    justify-content: space-between;

    align-items: center;

    gap: 20px;

}


.header-title {

    display: flex;

    align-items: center;

    gap: 15px;

}


.logo {

    width: 55px;

    height: 55px;

    object-fit: contain;

    background: white;

    border-radius: 9px;

    padding: 4px;

}


header h1 {

    font-size: 25px;

}


header p {

    color: #aaa;

    margin-top: 5px;

    font-size: 14px;

}


.btn-dashboard {

    display: inline-flex;

    align-items: center;

    gap: 8px;

    background: white;

    color: #111;

    text-decoration: none;

    padding: 12px 18px;

    border-radius: 8px;

    font-weight: bold;

}


.container {

    max-width: 1500px;

    margin: auto;

    padding: 30px;

}


.card {

    background: white;

    padding: 26px;

    border-radius: 13px;

    margin-bottom: 24px;

    border: 1px solid #dedede;

    box-shadow:

        0 4px 15px
        rgba(0,0,0,0.05);

}


.card-header {

    display: flex;

    align-items: center;

    gap: 12px;

    border-bottom: 1px solid #e5e5e5;

    padding-bottom: 16px;

    margin-bottom: 22px;

}


.card-number {

    width: 34px;

    height: 34px;

    border-radius: 50%;

    background: #111;

    color: white;

    display: flex;

    align-items: center;

    justify-content: center;

    font-weight: bold;

}


.card-header h2 {

    font-size: 21px;

}


.grid {

    display: grid;

    grid-template-columns:

        repeat(3, 1fr);

    gap: 20px;

}


.form-group {

    display: flex;

    flex-direction: column;

}


label {

    font-weight: 700;

    margin-bottom: 8px;

    font-size: 14px;

    color: #444;

}


input,

select {

    width: 100%;

    padding: 13px;

    border-radius: 8px;

    border: 1px solid #cfcfcf;

    background: white;

    font-size: 14px;

}


input:focus,

select:focus {

    outline: none;

    border-color: #111;

    box-shadow:

        0 0 0 3px

        rgba(0,0,0,0.08);

}


.btn-save {

    width: 100%;

    padding: 15px;

    background: #111;

    color: white;

    border: none;

    border-radius: 8px;

    font-size: 15px;

    font-weight: bold;

    cursor: pointer;

}


.btn-save:hover {

    background: #333;

}


.table-wrapper {

    overflow-x: auto;

    border: 1px solid #e0e0e0;

    border-radius: 9px;

}


table {

    width: 100%;

    border-collapse: collapse;

    min-width: 800px;

}


th,

td {

    padding: 14px 13px;

    border-bottom: 1px solid #e5e5e5;

    text-align: left;

    font-size: 14px;

}


th {

    background: #111;

    color: white;

    font-size: 12px;

    text-transform: uppercase;

}


tr:hover {

    background: #f7f7f7;

}


.badge {

    display: inline-block;

    background: #111;

    color: white;

    padding: 5px 9px;

    border-radius: 5px;

    font-size: 12px;

    font-weight: bold;

}


.success {

    background: #f0f0f0;

    color: #111;

    padding: 13px 15px;

    border-radius: 7px;

    margin-bottom: 18px;

    border-left: 4px solid #111;

}


.error {

    background: #eeeeee;

    color: #111;

    padding: 13px 15px;

    border-radius: 7px;

    margin-bottom: 18px;

    border-left: 4px solid #555;

}


.btn-danger {

    background: #111;

    color: white;

    border: none;

    padding: 8px 12px;

    border-radius: 6px;

    cursor: pointer;

}


.btn-danger:hover {

    background: #333;

}


.footer {

    text-align: center;

    color: #888;

    font-size: 13px;

    padding: 20px;

}


@media(max-width:1000px) {

    .grid {

        grid-template-columns:

            repeat(2, 1fr);

    }

}


@media(max-width:650px) {

    .header-content {

        flex-direction: column;

        align-items: flex-start;

    }


    .btn-dashboard {

        width: 100%;

        justify-content: center;

    }


    .container {

        padding: 15px;

    }


    .grid {

        grid-template-columns: 1fr;

    }

}

</style>

</head>

<body>

<header>

<div class="header-content">

<div class="header-title">

<img

src="logo.png"

class="logo"

alt="Logo FPB"

>

<div>

<h1>

🏢 KOD TEMPAT KERJA

</h1>

<p>

FPB DUTY SYSTEM — WILAYAH TERENGGANU

</p>

</div>

</div>

<a

href="index.html"

class="btn-dashboard"

>

🏠 Kembali ke Dashboard

</a>

</div>

</header>

<div class="container">

<!-- =================================================
     TAMBAH KOD TEMPAT KERJA
================================================= -->

<div class="card">

<div class="card-header">

<div class="card-number">

1

</div>

<h2>

Tambah Kod Tempat Kerja

</h2>

</div>

<div

id="mesej"

> </div>

<div class="grid">

<!-- UNIT -->

<div class="form-group">

<label>

Unit

</label>

<select

id="unit"

>

<option value="">

-- Pilih Unit --

</option>

<option value="Jerangau">

Jerangau

</option>

<option value="Terengganu">

Terengganu

</option>

<option value="Setiu">

Setiu

</option>

<option value="Chador">

Chador

</option>

<option value="Kerteh">

Kerteh

</option>

<option value="Rantau Abang">

Rantau Abang

</option>

</select>

</div>

<!-- KOD TK -->

<div class="form-group">

<label>

Kod TK

</label>

<input

type="text"

id="kodTempatKerja"

placeholder="Contoh: W"

maxlength="10"

>

</div>

<!-- POS TEMPAT KERJA -->

<div class="form-group">

<label>

Pos (Tempat Kerja)

</label>

<select

id="pos"

>

<option value="">

-- Pilih Pos --

</option>

</select>

</div>

</div>

<br>

<button

class="btn-save"

onclick="simpanTempatKerja()"

>

💾 SIMPAN KOD TEMPAT KERJA

</button>

</div>

<!-- =================================================
     SENARAI KOD TEMPAT KERJA
================================================= -->

<div class="card">

<div class="card-header">

<div class="card-number">

2

</div>

<h2>

Senarai Kod Tempat Kerja

</h2>

</div>

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>

Bil

</th>

<th>

Unit

</th>

<th>

Kod TK

</th>

<th>

Pos (Tempat Kerja)

</th>

<th>

Status

</th>

<th>

Tindakan

</th>

</tr>

</thead>

<tbody

id="senaraiTempatKerja"

>

<tr>

<td

colspan="6"

>

Sedang memuatkan...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<footer

class="footer"

>

FPB DUTY SYSTEM — WILAYAH TERENGGANU

<br>

</footer>

src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"

></script>

src="supabase.js"

></script>

<script

src="js/tempat-kerja.js"

></script>

</body>

</html>
