<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kod Tempat Kerja - FPB Duty System</title>

<style>

* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    background: #f1f5f9;
    color: #1e293b;
}

header {
    background: #0f172a;
    color: white;
    padding: 20px 25px;
}

header h1 {
    margin: 0;
}

header p {
    color: #cbd5e1;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
}

.grid {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 15px;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 6px;
}

input,
select,
button {
    width: 100%;
    padding: 11px;
    border-radius: 7px;
    border: 1px solid #cbd5e1;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.btn-dashboard {
    display: inline-block;
    width: auto;
    background: #2563eb;
    color: white;
    text-decoration: none;
    padding: 10px 16px;
    border-radius: 7px;
    margin-top: 10px;
}

.btn-danger {
    background: #dc2626;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th,
td {
    padding: 10px;
    border-bottom: 1px solid #e2e8f0;
    text-align: left;
}

th {
    background: #0f172a;
    color: white;
}

.success {
    background: #dcfce7;
    color: #166534;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
}

.error {
    background: #fee2e2;
    color: #991b1b;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
}

.badge {
    background: #dbeafe;
    color: #1d4ed8;
    padding: 5px 8px;
    border-radius: 5px;
    font-weight: bold;
}

.table-wrapper {
    overflow-x: auto;
}

@media(max-width:600px) {

    .grid {
        grid-template-columns: 1fr;
    }

}

</style>

</head>

<body>

<header>

<h1>🏢 KOD TEMPAT KERJA</h1>

<p>Pengurusan Kod Tempat Kerja</p>

<a
href="index.html"
class="btn-dashboard"
>
🏠 Kembali ke Dashboard
</a>

</header>


<div class="container">


<div class="card">

<h2>➕ Tambah Kod Tempat Kerja</h2>

<div id="mesej"></div>


<div class="grid">


<div>

<label>
Kod Tempat Kerja
</label>

<input
type="text"
id="kodTempatKerja"
placeholder="Contoh: W"
>


</div>


<div>

<label>
Nama Tempat Kerja
</label>

<select
id="namaTempatKerja"
>

<option value="">

-- Pilih Tempat Kerja --

</option>

</select>

</div>


</div>


<br>


<button
onclick="simpanTempatKerja()"
>

💾 SIMPAN KOD TEMPAT KERJA

</button>

</div>


<div class="card">

<h2>📋 Senarai Kod Tempat Kerja</h2>


<div class="table-wrapper">

<table>

<thead>

<tr>

<th>Bil</th>

<th>Kod Tempat Kerja</th>

<th>Nama Tempat Kerja</th>

<th>Status</th>

<th>Tindakan</th>

</tr>

</thead>


<tbody
id="senaraiTempatKerja"
>

<tr>

<td
colspan="5"
>

Sedang memuatkan...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>


<script
src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
></script>


<script
src="supabase.js"
></script>


<script
src="js/tempat-kerja.js"
></script>

</body>

</html>
