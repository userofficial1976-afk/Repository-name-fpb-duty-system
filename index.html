<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>FPB Duty System</title>


<!-- SUPABASE -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>

    * {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }


    body {

        margin: 0;

        background: #f1f5f9;

        color: #1e293b;

    }


    /* SIDEBAR */

    .sidebar {

        position: fixed;

        width: 244px;

        height: 100vh;

        background: #0f172a;

        color: white;

        padding: 25px 18px;

    }


    .logo {

        font-size: 24px;

        font-weight: bold;

        margin-bottom: 30px;

    }


    .menu {

        padding: 15px;

        margin: 8px 0;

        cursor: pointer;

        border-radius: 8px;

    }


    .menu:hover,

    .menu.active {

        background: #2563eb;

    }


    /* MAIN */

    .main {

        margin-left: 244px;

        padding: 30px;

    }


    .header,

    .content,

    .card {

        background: white;

        border-radius: 12px;

        padding: 20px;

        margin-bottom: 24px;

    }


    h1 {

        margin-top: 0;

        color: #1e3a5f;

    }


    h2 {

        margin-top: 0;

    }


    /* DASHBOARD CARDS */

    .cards {

        display: grid;

        grid-template-columns:

            repeat(4, 1fr);

        gap: 18px;

    }


    .card h3 {

        color: #64748b;

    }


    .number {

        font-size: 32px;

        color: #2563eb;

        font-weight: bold;

    }


    /* FORM */

    .form-row {

        display: flex;

        flex-wrap: wrap;

        gap: 15px;

        margin-bottom: 15px;

    }


    .form-group {

        display: flex;

        flex-direction: column;

        min-width: 220px;

        flex: 1;

    }


    .form-group label {

        font-weight: bold;

        margin-bottom: 6px;

    }


    input,

    select {

        width: 100%;

        padding: 11px;

        border: 1px solid #cbd5e1;

        border-radius: 6px;

        font-size: 14px;

        background: white;

    }


    button {

        background: #2563eb;

        color: white;

        border: none;

        padding: 11px 18px;

        border-radius: 6px;

        cursor: pointer;

        font-weight: bold;

    }


    button:hover {

        background: #1d4ed8;

    }


    .delete {

        background: #dc2626;

    }


    .delete:hover {

        background: #b91c1c;

    }


    /* DUTY INFO */

    .duty-info {

        margin-top: 20px;

        padding: 15px;

        background: #eff6ff;

        border-left: 5px solid #2563eb;

        border-radius: 6px;

    }


    .duty-info-grid {

        display: grid;

        grid-template-columns:

            repeat(3, 1fr);

        gap: 15px;

    }


    .info-box {

        background: white;

        padding: 15px;

        border-radius: 7px;

        border: 1px solid #dbeafe;

    }


    .info-title {

        font-size: 13px;

        color: #64748b;

    }


    .info-value {

        font-size: 20px;

        font-weight: bold;

        margin-top: 6px;

    }


    /* TABLE */

    .table-container {

        overflow-x: auto;

    }


    table {

        width: 100%;

        border-collapse: collapse;

        margin-top: 20px;

        min-width: 900px;

    }


    th,

    td {

        border-bottom: 1px solid #e2e8f0;

        padding: 12px;

        text-align: left;

    }


    th {

        background: #f8fafc;

    }


    /* STATUS */

    .status {

        margin-top: 15px;

        padding: 12px;

        border-radius: 6px;

        display: none;

    }


    .success {

        display: block;

        background: #dcfce7;

        color: #166534;

    }


    .error {

        display: block;

        background: #fee2e2;

        color: #991b1b;

    }


    /* MOBILE */

    @media (max-width: 900px) {

        .cards {

            grid-template-columns:

                repeat(2, 1fr);

        }

    }


    @media (max-width: 700px) {

        .sidebar {

            position: relative;

            width: 100%;

            height: auto;

        }


        .main {

            margin-left: 0;

            padding: 15px;

        }


        .cards {

            grid-template-columns: 1fr;

        }


        .duty-info-grid {

            grid-template-columns: 1fr;

        }

    }

</style>

</head>

<body>

```
<!-- SIDEBAR -->

<div class="sidebar">


    <div class="logo">

        🚓 FPB DUTY

    </div>


    <div class="menu active"

         onclick="paparDashboard(this)">

        🏠 Dashboard

    </div>


    <div class="menu"

         onclick="paparKeyInDuty(this)">

        📝 Key In Duty

    </div>


    <div class="menu"

         onclick="paparAnggota(this)">

        👥 Senarai Anggota

    </div>


    <div class="menu"

         onclick="paparJadualDuty(this)">

        🗓️ Jadual Duty

    </div>


    <div class="menu"

         onclick="paparKodDuty(this)">

        🏷️ Kod Duty

    </div>


</div>


<!-- MAIN -->

<div class="main"

     id="main">

</div>


<script>


    /*

    ============================================

    SAMBUNGAN SUPABASE

    ============================================

    */


    const SUPABASE_URL =

        "https://nlwrrrwkjpktrifxeymw.supabase.co";


    const SUPABASE_ANON_KEY =

        "sb_publishable_0ymP9thOFXkuNYzvwa0gwQ_1mbxyFE6";


    const supabaseClient =

        window.supabase.createClient(

            SUPABASE_URL,

            SUPABASE_ANON_KEY

        );


    /*

    ============================================

    PEMBOLEH UBAH

    ============================================

    */


    let senaraiAnggota = [];

    let senaraiKodDuty = [];

    let senaraiJadualDuty = [];


    /*

    ============================================

    PAGE LOAD

    ============================================

    */


    document.addEventListener(

        "DOMContentLoaded",

        async function() {

            await loadAnggota();

            await loadKodDuty();

            await loadJadualDuty();

            paparDashboard();

        }

    );


    /*

    ============================================

    LOAD ANGGOTA

    TABLE: anggota_database

    ============================================

    */


    async function loadAnggota() {


        const {

            data,

            error

        } = await supabaseClient

            .from("anggota_database")

            .select(`

                no_skb,

                wilayah,

                kawasan,

                pangkat,

                no_anggota,

                nama,

                pos,

                unit,

                jawatan,

                status

            `)

            .eq(

                "status",

                "Aktif"

            )

            .order(

                "nama",

                {

                    ascending: true

                }

            );


        if (error) {

            console.error(

                "Ralat anggota:",

                error

            );

            return;

        }


        senaraiAnggota = data || [];


        console.log(

            "Anggota berjaya dimuatkan:",

            senaraiAnggota.length

        );

    }


    /*

    ============================================

    LOAD KOD DUTY

    TABLE: kod_duty

    ============================================

    */


    async function loadKodDuty() {


        const {

            data,

            error

        } = await supabaseClient

            .from("kod_duty")

            .select(`

                kod,

                waktu_tugasan,

                jam_kerja,

                jam_klm,

                status

            `)

            .eq(

                "status",

                "Aktif"

            )

            .order(

                "kod",

                {

                    ascending: true

                }

            );


        if (error) {

            console.error(

                "Ralat kod duty:",

                error

            );

            return;

        }


        senaraiKodDuty = data || [];


        console.log(

            "Kod duty berjaya dimuatkan:",

            senaraiKodDuty.length

        );

    }


    /*

    ============================================

    LOAD JADUAL DUTY

    ============================================

    */


    async function loadJadualDuty() {


        const {

            data,

            error

        } = await supabaseClient

            .from("jadual_duty")

            .select("*")

            .order(

                "tarikh",

                {

                    ascending: false

                }

            );


        if (error) {

            console.error(

                "Ralat jadual duty:",

                error

            );

            return;

        }


        senaraiJadualDuty = data || [];

    }


    /*

    ============================================

    DASHBOARD

    ============================================

    */


    function paparDashboard() {


        aktifkanMenu(0);


        const hariIni =

            new Date()

                .toISOString()

                .split("T")[0];


        const dutyHariIni =

            senaraiJadualDuty.filter(

                d =>

                    d.tarikh === hariIni

            ).length;


        document

            .getElementById("main")

            .innerHTML = `


            <div class="header">


                <h1>

                    Dashboard

                </h1>


                <p>

                    Selamat datang ke FPB Duty System

                </p>


            </div>


            <div class="cards">


                <div class="card">


                    <h3>

                        Jumlah Anggota

                    </h3>


                    <div class="number">

                        ${senaraiAnggota.length}

                    </div>


                </div>


                <div class="card">


                    <h3>

                        Duty Hari Ini

                    </h3>


                    <div class="number">

                        ${dutyHariIni}

                    </div>


                </div>


                <div class="card">


                    <h3>

                        Kod Duty

                    </h3>


                    <div class="number">

                        ${senaraiKodDuty.length}

                    </div>


                </div>


                <div class="card">


                    <h3>

                        Jumlah Rekod Duty

                    </h3>


                    <div class="number">

                        ${senaraiJadualDuty.length}

                    </div>


                </div>


            </div>

        `;

    }


    /*

    ============================================

    KEY IN DUTY

    ============================================

    */


    function paparKeyInDuty() {


        aktifkanMenu(1);


        let pilihanAnggota = "";


        senaraiAnggota.forEach(

            function(a) {


                pilihanAnggota += `

                    <option value="${a.no_skb}">

                        ${a.no_skb} -

                        ${a.nama} -

                        ${a.no_anggota}

                    </option>

                `;

            }

        );


        let pilihanKod = "";


        senaraiKodDuty.forEach(

            function(k) {


                pilihanKod += `

                    <option value="${k.kod}">

                        ${k.kod} -

                        ${k.waktu_tugasan}

                    </option>

                `;

            }

        );


        document

            .getElementById("main")

            .innerHTML = `


            <div class="header">


                <h1>

                    Key In Duty

                </h1>


                <p>

                    Masukkan rekod duty anggota

                </p>


            </div>


            <div class="content">


                <h2>

                    Tambah Duty

                </h2>


                <div class="form-row">


                    <div class="form-group">


                        <label>

                            Tarikh

                        </label>


                        <input

                            type="date"

                            id="tarikh"

                            value="${new Date()

                                .toISOString()

                                .split("T")[0]}"

                        >

                    </div>


                    <div class="form-group">


                        <label>

                            No. SKB / Anggota

                        </label>


                        <select

                            id="anggotaDuty"

                        >


                            <option value="">

                                -- Pilih No. SKB --

                            </option>


                            ${pilihanAnggota}


                        </select>

                    </div>


                </div>


                <div class="form-row">


                    <div class="form-group">


                        <label>

                            Kod Duty

                        </label>


                        <select

                            id="kodDuty"

                            onchange="paparMaklumatDuty()"

                        >


                            <option value="">

                                -- Pilih Kod Duty --

                            </option>


                            ${pilihanKod}


                        </select>

                    </div>


                    <div class="form-group">


                        <label>

                            Pos

                        </label>


                        <input

                            type="text"

                            id="pos"

                            readonly

                            placeholder="Auto daripada data anggota"

                        >

                    </div>

                </div>


                <div class="duty-info">


                    <h3>

                        Maklumat Duty

                    </h3>


                    <div class="duty-info-grid">


                        <div class="info-box">


                            <div class="info-title">

                                Waktu Tugasan

                            </div>


                            <div

                                class="info-value"

                                id="paparWaktu">

                                -

                            </div>


                        </div>


                        <div class="info-box">


                            <div class="info-title">

                                Jam Kerja

                            </div>


                            <div

                                class="info-value"

                                id="paparJamKerja">

                                -

                            </div>


                        </div>


                        <div class="info-box">


                            <div class="info-title">

                                Jam KLM

                            </div>


                            <div

                                class="info-value"

                                id="paparJamKLM">

                                -

                            </div>


                        </div>


                    </div>

                </div>


                <br>


                <button

                    onclick="simpanDuty()">

                    💾 Simpan Duty

                </button>


                <div

                    id="statusMessage"

                    class="status">

                </div>


            </div>

        `;


        document

            .getElementById(

                "anggotaDuty"

            )

            .addEventListener(

                "change",

                paparMaklumatAnggota

            );

    }


    /*

    ============================================

    PAPAR MAKLUMAT ANGGOTA

    ============================================

    */


    function paparMaklumatAnggota() {


        const noSKB =

            document

                .getElementById(

                    "anggotaDuty"

                )

                .value;


        const anggota =

            senaraiAnggota.find(

                a =>

                    String(a.no_skb) ===

                    String(noSKB)

            );


        document

            .getElementById(

                "pos"

            )

            .value =

            anggota

                ? anggota.pos

                : "";

    }


    /*

    ============================================

    PAPAR MAKLUMAT KOD DUTY

    ============================================

    */


    function paparMaklumatDuty() {


        const kod =

            document

                .getElementById(

                    "kodDuty"

                )

                .value;


        const duty =

            senaraiKodDuty.find(

                k =>

                    k.kod === kod

            );


        document

            .getElementById(

                "paparWaktu"

            )

            .textContent =

            duty

                ? duty.waktu_tugasan

                : "-";


        document

            .getElementById(

                "paparJamKerja"

            )

            .textContent =

            duty

                ? duty.jam_kerja

                : "-";


        document

            .getElementById(

                "paparJamKLM"

            ).textContent =

            duty

                ? duty.jam_klm

                : "-";

    }


    /*

    ============================================

    SIMPAN DUTY

    ============================================

    */


    async function simpanDuty() {


        const tarikh =

            document

                .getElementById(

                    "tarikh"

                )

                .value;


        const noSKB =

            document

                .getElementById(

                    "anggotaDuty"

                )

                .value;


        const kod =

            document

                .getElementById(

                    "kodDuty"

                )

                .value;


        const anggota =

            senaraiAnggota.find(

                a =>

                    String(a.no_skb) ===

                    String(noSKB)

            );


        const duty =

            senaraiKodDuty.find(

                k =>

                    k.kod === kod

            );


        if (

            !tarikh ||

            !noSKB ||

            !kod

        ) {


            alert(

                "Sila lengkapkan Tarikh, No. SKB dan Kod Duty."

            );


            return;

        }


        if (!anggota) {


            alert(

                "Data anggota tidak dijumpai."

            );


            return;

        }


        if (!duty) {


            alert(

                "Data kod duty tidak dijumpai."

            );


            return;

        }


        const tarikhObj =

            new Date(

                tarikh + "T00:00:00"

            );


        const bulan =

            tarikhObj.getMonth() + 1;


        const tahun =

            tarikhObj.getFullYear();


        const {

            error

        } = await supabaseClient

            .from(

                "jadual_duty"

            )

            .insert([

                {


                    tarikh:

                        tarikh,


                    bulan:

                        bulan,


                    tahun:

                        tahun,


                    no_skb:

                        Number(noSKB),


                    kod_duty:

                        duty.kod,


                    waktu_tugasan:

                        duty.waktu_tugasan,


                    jam_kerja:

                        duty.jam_kerja,


                    jam_klm:

                        duty.jam_klm,


                    pos:

                        anggota.pos,


                    dikemaskini_pada:

                        new Date()

                            .toISOString()

                }

            ]);


        if (error) {


            console.error(

                error

            );


            alert(

                "Gagal simpan duty: " +

                error.message

            );


            return;

        }


        alert(

            "Duty berjaya disimpan."

        );


        await loadJadualDuty();


        paparKeyInDuty();

    }


    /*

    ============================================

    SENARAI ANGGOTA

    ============================================

    */


    function paparAnggota() {


        aktifkanMenu(2);


        let rows = "";


        senaraiAnggota.forEach(

            function(a, index) {


                rows += `

                    <tr>

                        <td>

                            ${index + 1}

                        </td>

                        <td>

                            ${a.no_skb}

                        </td>

                        <td>

                            ${a.nama}

                        </td>

                        <td>

                            ${a.no_anggota}

                        </td>

                        <td>

                            ${a.pangkat}

                        </td>

                        <td>

                            ${a.pos}

                        </td>

                        <td>

                            ${a.status}

                        </td>

                    </tr>

                `;

            }

        );


        document

            .getElementById("main")

            .innerHTML = `


            <div class="header">


                <h1>

                    Senarai Anggota

                </h1>


                <p>

                    Data daripada table anggota_database

                </p>


            </div>


            <div class="content">


                <div class="table-container">


                    <table>


                        <thead>


                            <tr>

                                <th>Bil</th>

                                <th>No. SKB</th>

                                <th>Nama</th>

                                <th>No. Anggota</th>

                                <th>Pangkat</th>

                                <th>Pos</th>

                                <th>Status</th>

                            </tr>


                        </thead>


                        <tbody>

                            ${rows}

                        </tbody>


                    </table>

                </div>

            </div>

        `;

    }


    /*

    ============================================

    JADUAL DUTY

    ============================================

    */


    function paparJadualDuty() {


        aktifkanMenu(3);


        let rows = "";


        senaraiJadualDuty.forEach(

            function(d, index) {


                rows += `

                    <tr>


                        <td>

                            ${index + 1}

                        </td>


                        <td>

                            ${d.tarikh || ""}

                        </td>


                        <td>

                            ${d.no_skb || ""}

                        </td>


                        <td>

                            ${d.kod_duty || ""}

                        </td>


                        <td>

                            ${d.waktu_tugasan || ""}

                        </td>


                        <td>

                            ${d.jam_kerja ?? ""}

                        </td>


                        <td>

                            ${d.jam_klm ?? ""}

                        </td>


                        <td>

                            ${d.pos || ""}

                        </td>


                    </tr>

                `;

            }

        );


        document

            .getElementById("main")

            .innerHTML = `


            <div class="header">


                <h1>

                    Jadual Duty

                </h1>


                <p>

                    Semua rekod duty yang telah disimpan

                </p>


            </div>


            <div class="content">


                <div class="table-container">


                    <table>


                        <thead>


                            <tr>


                                <th>Bil</th>

                                <th>Tarikh</th>

                                <th>No. SKB</th>

                                <th>Kod Duty</th>

                                <th>Waktu</th>

                                <th>Jam Kerja</th>

                                <th>Jam KLM</th>

                                <th>Pos</th>


                            </tr>


                        </thead>


                        <tbody>

                            ${rows}

                        </tbody>


                    </table>

                </div>

            </div>

        `;

    }


    /*

    ============================================

    KOD DUTY

    ============================================

    */


    function paparKodDuty() {


        aktifkanMenu(4);


        let rows = "";


        senaraiKodDuty.forEach(

            function(k, index) {


                rows += `

                    <tr>


                        <td>

                            ${index + 1}

                        </td>


                        <td>

                            ${k.kod}

                        </td>


                        <td>

                            ${k.waktu_tugasan}

                        </td>


                        <td>

                            ${k.jam_kerja}

                        </td>


                        <td>

                            ${k.jam_klm}

                        </td>


                        <td>

                            ${k.status}

                        </td>


                    </tr>

                `;

            }

        );


        document

            .getElementById("main")

            .innerHTML = `


            <div class="header">


                <h1>

                    Kod Duty

                </h1>


                <p>

                    Senarai kod duty daripada Supabase

                </p>


            </div>


            <div class="content">


                <div class="table-container">


                    <table>


                        <thead>


                            <tr>


                                <th>Bil</th>

                                <th>Kod</th>

                                <th>Waktu Tugasan</th>

                                <th>Jam Kerja</th>

                                <th>Jam KLM</th>

                                <th>Status</th>


                            </tr>


                        </thead>


                        <tbody>

                            ${rows}

                        </tbody>


                    </table>

                </div>

            </div>

        `;

    }


    /*

    ============================================

    MENU ACTIVE

    ============================================

    */


    function aktifkanMenu(index) {


        const menu =

            document

                .querySelectorAll(

                    ".menu"

                );


        menu.forEach(

            function(m, i) {


                m.classList.toggle(

                    "active",

                    i === index

                );

            }

        );

    }


</script>
```
