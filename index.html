<style>
    * {
        box-sizing: border-box;

        width: 244px;
        height: 100vh;

</head>

<body>

```
<div class="sidebar">

    <div class="logo">🚓 FPB DUTY</div>

    <div class="menu active" onclick="paparDashboard()">🏠 Dashboard</div>

    <div class="menu" onclick="paparKeyInDuty()">
        📝 Key In Duty
    </div>

    <div class="menu" onclick="paparAnggota()">
        👥 Senarai Anggota
    </div>

    <div class="menu">🗓️ Jadual Duty</div>
    <div class="menu">🏷️ Kod Duty</div>
    <div class="menu">📊 Laporan</div>
    <div class="menu">⚙️ Tetapan</div>

</div>

<div class="main" id="main">

    <div class="header">
        <h1>Dashboard</h1>
        <p>Selamat datang ke FPB Duty System</p>
    </div>

    <div class="cards">

        <div class="card">
            <h3>Jumlah Anggota</h3>
            <div class="number" id="jumlahAnggota">0</div>
        </div>

        <div class="card">
            <h3>Duty Hari Ini</h3>
            <div class="number">0</div>
        </div>

        <div class="card">
            <h3>Kod Duty</h3>
            <div class="number">0</div>
        </div>

        <div class="card">
            <h3>Laporan</h3>
            <div class="number">0</div>
        </div>

    </div>

</div>

<script>

    let anggota =
        JSON.parse(localStorage.getItem("anggota")) || [];

    let duty =
        JSON.parse(localStorage.getItem("duty")) || [];

    let kodDuty = [
        {
            kod: "D01",
            nama: "Duty Operasi"
        },
        {
            kod: "D02",
            nama: "Duty Kawalan"
        },
        {
            kod: "D03",
            nama: "Duty Rondaan"
        }
    ];

    function paparDashboard() {

        document.getElementById("main").innerHTML = `

            <div class="header">
                <h1>Dashboard</h1>
                <p>Selamat datang ke FPB Duty System</p>
            </div>

            <div class="cards">

                <div class="card">
                    <h3>Jumlah Anggota</h3>
                    <div class="number">
                        ${anggota.length}
                    </div>
                </div>

                <div class="card">
                    <h3>Duty Hari Ini</h3>
                    <div class="number">
                        ${duty.length}
                    </div>
                </div>

                <div class="card">
                    <h3>Kod Duty</h3>
                    <div class="number">
                        ${kodDuty.length}
                    </div>
                </div>

                <div class="card">
                    <h3>Laporan</h3>
                    <div class="number">
                        0
                    </div>
                </div>

            </div>
        `;
    }

    function paparKeyInDuty() {

        let pilihanAnggota = "";

        anggota.forEach((a, index) => {

            pilihanAnggota += `
                <option value="${index}">
                    ${a.nama} - ${a.noBadan}
                </option>
            `;

        });

        let pilihanKod = "";

        kodDuty.forEach(k => {

            pilihanKod += `
                <option value="${k.kod}">
                    ${k.kod} - ${k.nama}
                </option>
            `;

        });

        let rows = "";

        duty.forEach((d, index) => {

            rows += `

                <tr>

                    <td>${index + 1}</td>

                    <td>${d.tarikh}</td>

                    <td>${d.pos}</td>

                    <td>${d.anggota}</td>

                    <td>${d.kodDuty}</td>

                    <td>

                        <button
                            class="delete"
                            onclick="padamDuty(${index})">

                            Padam

                        </button>

                    </td>

                </tr>

            `;

        });

        document.getElementById("main").innerHTML = `

            <div class="header">

                <h1>Key In Duty</h1>

                <p>
                    Masukkan rekod duty anggota
                </p>

            </div>

            <div class="content">

                <h2>Tambah Duty</h2>

                <div class="form-row">

                    <div class="form-group">

                        <label>Tarikh</label>

                        <input
                            type="date"
                            id="tarikh">

                    </div>

                    <div class="form-group">

                        <label>Pos</label>

                        <input
                            type="text"
                            id="pos"
                            placeholder="Contoh: Pos A">

                    </div>

                </div>

                <div class="form-row">

                    <div class="form-group">

                        <label>Anggota</label>

                        <select id="anggotaDuty">

                            <option value="">
                                Pilih Anggota
                            </option>

                            ${pilihanAnggota}

                        </select>

                    </div>

                    <div class="form-group">

                        <label>Kod Duty</label>

                        <select id="kodDuty">

                            <option value="">
                                Pilih Kod Duty
                            </option>

                            ${pilihanKod}

                        </select>

                    </div>

                </div>

                <button onclick="simpanDuty()">

                    💾 Simpan Duty

                </button>

            </div>

            <div class="content">

                <h2>Senarai Duty (${duty.length})</h2>

                <table>

                    <thead>

                        <tr>

                            <th>Bil</th>
                            <th>Tarikh</th>
                            <th>Pos</th>
                            <th>Anggota</th>
                            <th>Kod Duty</th>
                            <th>Tindakan</th>

                        </tr>

                    </thead>

                    <tbody>

                        ${rows}

                    </tbody>

                </table>

            </div>

        `;

    }

    function simpanDuty() {

        let tarikh =
            document.getElementById("tarikh").value;

        let pos =
            document.getElementById("pos").value;

        let anggotaIndex =
            document.getElementById("anggotaDuty").value;

        let kod =
            document.getElementById("kodDuty").value;

        if (
            tarikh === "" ||
            pos === "" ||
            anggotaIndex === "" ||
            kod === ""
        ) {

            alert("Sila lengkapkan semua maklumat");

            return;

        }

        let anggotaDipilih =
            anggota[anggotaIndex];

        duty.push({

            tarikh: tarikh,

            pos: pos,

            anggota:
                anggotaDipilih.nama +
                " - " +
                anggotaDipilih.noBadan,

            kodDuty: kod

        });

        localStorage.setItem(
            "duty",
            JSON.stringify(duty)
        );

        alert("Duty berjaya disimpan");

        paparKeyInDuty();

    }

    function padamDuty(index) {

        if (confirm("Padam rekod duty ini?")) {

            duty.splice(index, 1);

            localStorage.setItem(
                "duty",
                JSON.stringify(duty)
            );

            paparKeyInDuty();

        }

    }

    function paparAnggota() {

        let rows = "";

        anggota.forEach((a, index) => {

            rows += `

                <tr>

                    <td>${index + 1}</td>
                    <td>${a.nama}</td>
                    <td>${a.noBadan}</td>
                    <td>${a.pangkat}</td>

                    <td>

                        <button
                            class="delete"
                            onclick="padamAnggota(${index})">

                            Padam

                        </button>

                    </td>

                </tr>

            `;

        });

        document.getElementById("main").innerHTML = `

            <div class="header">

                <h1>Senarai Anggota</h1>

                <p>
                    Pengurusan data anggota FPB
                </p>

            </div>

            <div class="content">

                <h2>Tambah Anggota</h2>

                <input
                    id="nama"
                    placeholder="Nama Anggota">

                <input
                    id="noBadan"
                    placeholder="No. Badan">

                <input
                    id="pangkat"
                    placeholder="Pangkat">

                <button onclick="tambahAnggota()">

                    + Tambah Anggota

                </button>

            </div>

            <div class="content">

                <h2>
                    Senarai Anggota (${anggota.length})
                </h2>

                <table>

                    <thead>

                        <tr>

                            <th>Bil</th>
                            <th>Nama</th>
                            <th>No. Badan</th>
                            <th>Pangkat</th>
                            <th>Tindakan</th>

                        </tr>

                    </thead>

                    <tbody>

                        ${rows}

                    </tbody>

                </table>

            </div>

        `;

    }

    function tambahAnggota() {

        let nama =
            document.getElementById("nama").value;

        let noBadan =
            document.getElementById("noBadan").value;

        let pangkat =
            document.getElementById("pangkat").value;

        if (
            nama === "" ||
            noBadan === ""
        ) {

            alert(
                "Sila isi Nama dan No. Badan"
            );

            return;

        }

        anggota.push({

            nama: nama,

            noBadan: noBadan,

            pangkat: pangkat

        });

        localStorage.setItem(

            "anggota",

            JSON.stringify(anggota)

        );

        paparAnggota();

    }

    function padamAnggota(index) {

        if (
            confirm(
                "Padam anggota ini?"
            )
        ) {

            anggota.splice(index, 1);

            localStorage.setItem(

                "anggota",

                JSON.stringify(anggota)

            );

            paparAnggota();

        }

    }

</script>
```

</body>
</html>
