    .table-container {

</div>

<script>


/*
====================================================
1. SAMBUNGAN SUPABASE
====================================================
*/

const SUPABASE_URL =
"https://nlwrrrwkjpktrifxeymw.supabase.co";


const SUPABASE_ANON_KEY =
"sb_publishable_0ymP9thOFXkuNYzvwa0gwQ_1mbxyFE6";


const supabaseClient =
window.supabase.createClient(

    SUPABASE_URL,

    SUPABASE_ANON_KEY

);


/*
====================================================
2. PEMBOLEH UBAH
====================================================
*/

let senaraiKodDuty = [];

let senaraiAnggota = [];


/*
====================================================
3. APABILA PAGE DIBUKA
====================================================
*/

document.addEventListener(

    "DOMContentLoaded",

    function() {


        // Tarikh hari ini

        document.getElementById(
            "tarikh"
        ).value =

        new Date()
        .toISOString()
        .split("T")[0];


        // Load Kod Duty

        loadKodDuty();


        // Load Anggota

        loadAnggota();


        // Load Duty

        loadSenaraiDuty();


    }

);


/*
====================================================
4. LOAD KOD DUTY DARI SUPABASE
TABLE: kod_duty
====================================================
*/

async function loadKodDuty() {


    const {

        data,

        error

    } = await supabaseClient

        .from("kod_duty")

        .select(

            "kod, waktu_tugasan, jam_kerja, jam_klm, status"

        )

        .eq(

            "status",

            "Aktif"

        )

        .order(

            "kod",

            {

                ascending: true

            }

        );


    if (error) {


        console.error(

            "Ralat Kod Duty:",

            error

        );


        paparStatus(

            "Gagal mengambil data Kod Duty: " +

            error.message,

            "error"

        );


        return;

    }


    senaraiKodDuty = data;


    const selectKodDuty =

        document.getElementById(

            "kodDuty"

        );


    selectKodDuty.innerHTML =

        '<option value="">-- Pilih Kod Duty --</option>';


    data.forEach(

        function(duty) {


            const option =

                document.createElement(

                    "option"

                );


            option.value =

                duty.kod;


            option.textContent =

                duty.kod +

                " - " +

                duty.waktu_tugasan;


            selectKodDuty.appendChild(

                option

            );


        }

    );


}


/*
====================================================
5. PAPAR MAKLUMAT DUTY AUTO
====================================================
*/

function paparMaklumatDuty() {


    const kodDipilih =

        document.getElementById(

            "kodDuty"

        ).value;


    const duty =

        senaraiKodDuty.find(

            function(item) {


                return item.kod ===

                    kodDipilih;


            }

        );


    if (duty) {


        document.getElementById(

            "paparWaktu"

        ).textContent =

            duty.waktu_tugasan || "-";


        document.getElementById(

            "paparJamKerja"

        ).textContent =

            duty.jam_kerja ?? "-";


        document.getElementById(

            "paparJamKLM"

        ).textContent =

            duty.jam_klm ?? "-";


    }

    else {


        document.getElementById(

            "paparWaktu"

        ).textContent = "-";


        document.getElementById(

            "paparJamKerja"

        ).textContent = "-";


        document.getElementById(

            "paparJamKLM"

        ).textContent = "-";


    }

}


/*
====================================================
6. LOAD ANGGOTA
TABLE: anggota
====================================================
*/

async function loadAnggota() {


    const {

        data,

        error

    } = await supabaseClient

        .from("anggota")

        .select("*")

        .order(

            "nama",

            {

                ascending: true

            }

        );


    if (error) {


        console.error(

            "Ralat Anggota:",

            error

        );


        paparStatus(

            "Gagal mengambil data anggota: " +

            error.message,

            "error"

        );


        return;

    }


    senaraiAnggota = data;


    const selectAnggota =

        document.getElementById(

            "anggota"

        );


    selectAnggota.innerHTML =

        '<option value="">-- Pilih Anggota --</option>';


    data.forEach(

        function(anggota) {


            const option =

                document.createElement(

                    "option"

                );


            option.value =

                anggota.id;


            option.textContent =

                anggota.nama;


            selectAnggota.appendChild(

                option

            );


        }

    );


}


/*
====================================================
7. SIMPAN DUTY
TABLE: jadual_duty
====================================================
*/

async function simpanDuty() {


    const tarikh =

        document.getElementById(

            "tarikh"

        ).value;


    const anggotaId =

        document.getElementById(

            "anggota"

        ).value;


    const kodDuty =

        document.getElementById(

            "kodDuty"

        ).value;


    if (

        !tarikh ||

        !anggotaId ||

        !kodDuty

    ) {


        paparStatus(

            "Sila lengkapkan Tarikh, Anggota dan Kod Duty.",

            "error"

        );


        return;

    }


    const duty =

        senaraiKodDuty.find(

            function(item) {


                return item.kod ===

                    kodDuty;


            }

        );


    if (!duty) {


        paparStatus(

            "Maklumat Kod Duty tidak dijumpai.",

            "error"

        );


        return;

    }


    const {

        error

    } = await supabaseClient

        .from("jadual_duty")

        .insert([

            {


                tarikh:

                    tarikh,


                anggota_id:

                    anggotaId,


                kod_duty:

                    duty.kod,


                waktu_tugasan:

                    duty.waktu_tugasan,


                jam_kerja:

                    duty.jam_kerja,


                jam_klm:

                    duty.jam_klm


            }

        ]);


    if (error) {


        console.error(

            "Ralat Simpan:",

            error

        );


        paparStatus(

            "Gagal simpan duty: " +

            error.message,

            "error"

        );


        return;

    }


    paparStatus(

        "Duty berjaya disimpan.",

        "success"

    );


    resetBorang();


    loadSenaraiDuty();


}


/*
====================================================
8. LOAD SENARAI DUTY
====================================================
*/

async function loadSenaraiDuty() {


    const {

        data,

        error

    } = await supabaseClient

        .from("jadual_duty")

        .select("*")

        .order(

            "tarikh",

            {

                ascending: false

            }

        );


    if (error) {


        console.error(

            "Ralat Senarai Duty:",

            error

        );


        return;

    }


    const tbody =

        document.getElementById(

            "senaraiDuty"

        );


    tbody.innerHTML = "";


    if (

        !data ||

        data.length === 0

    ) {


        tbody.innerHTML =

        `

        <tr>

            <td colspan="6">

                Tiada data

            </td>

        </tr>

        `;


        return;

    }


    data.forEach(

        function(duty) {


            const row =

                document.createElement(

                    "tr"

                );


            row.innerHTML =

            `

            <td>

                ${duty.tarikh || ""}

            </td>


            <td>

                ${duty.anggota_id || ""}

            </td>


            <td>

                ${duty.kod_duty || ""}

            </td>


            <td>

                ${duty.waktu_tugasan || ""}

            </td>


            <td>

                ${duty.jam_kerja ?? ""}

            </td>


            <td>

                ${duty.jam_klm ?? ""}

            </td>

            `;


            tbody.appendChild(

                row

            );


        }

    );


}


/*
====================================================
9. RESET BORANG
====================================================
*/

function resetBorang() {


    document.getElementById(

        "anggota"

    ).value = "";


    document.getElementById(

        "kodDuty"

    ).value = "";


    document.getElementById(

        "paparWaktu"

    ).textContent = "-";


    document.getElementById(

        "paparJamKerja"

    ).textContent = "-";


    document.getElementById(

        "paparJamKLM"

    ).textContent = "-";


}


/*
====================================================
10. PAPAR STATUS
====================================================
*/

function paparStatus(

    mesej,

    jenis

) {


    const status =

        document.getElementById(

            "statusMessage"

        );


    status.textContent =

        mesej;


    status.className =

        "status " +

        jenis;


    setTimeout(

        function() {


            status.className =

                "status";


        },

        5000

    );


}


</script>

</body>

</html>
