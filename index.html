<!DOCTYPE html>

<html lang="ms">

<head>

```
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>FPB Duty System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

    * {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        margin: 0;
        background: #f1f5f9;
    }

    .sidebar {
        position: fixed;
        width: 244px;
        height: 100vh;
        background: #0f172a;
        color: white;
        padding: 25px 18px;
    }

    .logo {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 30px;
    }

    .menu {
        padding: 15px;
        margin: 8px 0;
        cursor: pointer;
        border-radius: 8px;
    }

    .menu:hover,
    .menu.active {
        background: #2563eb;
    }

    .main {
        margin-left: 244px;
        padding: 30px;
    }

    .header,
    .card,
    .content {
        background: white;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 24px;
    }

    h1 {
        margin-top: 0;
        color: #1e3a5f;
    }

    .cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 18px;
    }

    .card h3 {
        color: #64748b;
    }

    .number {
        font-size: 32px;
        color: #2563eb;
        font-weight: bold;
    }

    button {
        background: #2563eb;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        background: #1d4ed8;
    }

    input,
    select {
        width: 190px;
        padding: 10px;
        margin-top: 6px;
        border: 1px solid #cbd5e1;
        border-radius: 5px;
        font-size: 14px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    th,
    td {
        border-bottom: 1px solid #e2e8f0;
        padding: 12px;
        text-align: left;
    }

    th {
        background: #f8fafc;
    }

    .delete {
        background: #dc2626;
    }

    .delete:hover {
        background: #b91c1c;
    }

    .form-row {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        margin-bottom: 15px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        font-weight: bold;
    }

    .duty-info {
        background: #eff6ff;
        padding: 15px;
        border-left: 5px solid #2563eb;
        margin-top: 15px;
        border-radius: 6px;
    }

    .duty-info-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
    }

    .info-box {
        background: white;
        padding: 15px;
        border-radius: 7px;
    }

    .info-title {
        font-size: 13px;
        color: #64748b;
    }

    .info-value {
        font-size: 20px;
        font-weight: bold;
        margin-top: 5px;
    }

    @media (max-width: 900px) {

        .cards {
            grid-template-columns: repeat(2, 1fr);
        }

    }

    @media (max-width: 700px) {

        .sidebar {
            position: relative;
            width: 100%;
            height: auto;
        }

        .main {
            margin-left: 0;
            padding: 15px;
        }

        .cards {
            grid-template-columns: 1fr;
        }

        .duty-info-grid {
            grid-template-columns: 1fr;
        }

    }

</style>
```

</head>

<body>

```
<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">
        🚓 FPB DUTY
    </div>

    <div class="menu active"
         onclick="paparDashboard()">

        🏠 Dashboard

    </div>

    <div class="menu"
         onclick="paparKeyInDuty()">

        📝 Key In Duty

    </div>

    <div class="menu"
         onclick="paparAnggota()">

        👥 Senarai Anggota

    </div>

    <div class="menu"
         onclick="paparJadualDuty()">

        🗓️ Jadual Duty

    </div>

    <div class="menu">

        🏷️ Kod Duty

    </div>

    <div class="menu">

        📊 Laporan

    </div>

    <div class="menu">

        ⚙️ Tetapan

    </div>

</div>


<!-- MAIN -->

<div class="main"
     id="main">

</div>
```

<script>


/*
====================================================
1. SAMBUNGAN SUPABASE
====================================================
*/

const SUPABASE_URL =
"https://nlwrrrwkjpktrifxeymw.supabase.co";


const SUPABASE_ANON_KEY =
"sb_publishable_0ymP9thOFXkuNYzvwa0gwQ_1mbxyFE6";


const supabaseClient =
window.supabase.createClient(

    SUPABASE_URL,

    SUPABASE_ANON_KEY

);


/*
====================================================
2. APABILA WEBSITE DIBUKA
====================================================
*/

document.addEventListener(

    "DOMContentLoaded",

    function() {

        paparDashboard();

    }

);


/*
====================================================
3. MENU ACTIVE
====================================================
*/

function menuAktif(nama) {

    document.querySelectorAll(".menu")
        .forEach(

            function(menu) {

                menu.classList.remove("active");

            }

        );

}


/*
====================================================
4. DASHBOARD
====================================================
*/

async function paparDashboard() {


    const anggotaResult =
        await supabaseClient

            .from("anggota")

            .select("*", {
                count: "exact",
                head: true
            });


    const dutyResult =
        await supabaseClient

            .from("jadual_duty")

            .select("*", {
                count: "exact",
                head: true
            });


    const kodResult =
        await supabaseClient

            .from("kod_duty")

            .select("*", {
                count: "exact",
                head: true
            });


    const hariIni =
        new Date()
            .toISOString()
            .split("T")[0];


    const dutyHariIniResult =
        await supabaseClient

            .from("jadual_duty")

            .select("*", {
                count: "exact",
                head: true
            })

            .eq(
                "tarikh",
                hariIni
            );


    document.getElementById("main").innerHTML = `

        <div class="header">

            <h1>
                Dashboard
            </h1>

            <p>
                Selamat datang ke FPB Duty System
            </p>

        </div>


        <div class="cards">


            <div class="card">

                <h3>
                    Jumlah Anggota
                </h3>

                <div class="number">

                    ${anggotaResult.count || 0}

                </div>

            </div>


            <div class="card">

                <h3>
                    Duty Hari Ini
                </h3>

                <div class="number">

                    ${dutyHariIniResult.count || 0}

                </div>

            </div>


            <div class="card">

                <h3>
                    Kod Duty
                </h3>

                <div class="number">

                    ${kodResult.count || 0}

                </div>

            </div>


            <div class="card">

                <h3>
                    Jumlah Duty
                </h3>

                <div class="number">

                    ${dutyResult.count || 0}

                </div>

            </div>


        </div>

    `;

}


/*
====================================================
5. KEY IN DUTY
====================================================
*/

async function paparKeyInDuty() {


    const anggotaResult =
        await supabaseClient

            .from("anggota")

            .select("*")

            .order(
                "nama",
                {
                    ascending: true
                }
            );


    const kodResult =
        await supabaseClient

            .from("kod_duty")

            .select("*")

            .eq(
                "status",
                "Aktif"
            )

            .order(
                "kod",
                {
                    ascending: true
                }
            );


    const dutyResult =
        await supabaseClient

            .from("jadual_duty")

            .select(`

                id,

                tarikh,

                anggota_id,

                kod_duty,

                waktu_tugasan,

                jam_kerja,

                jam_klm,

                anggota (

                    nama

                )

            `)

            .order(
                "tarikh",
                {
                    ascending: false
                }
            );


    let pilihanAnggota = "";


    (anggotaResult.data || [])
        .forEach(

            function(a) {

                pilihanAnggota += `

                    <option value="${a.id}">

                        ${a.nama}

                    </option>

                `;

            }

        );


    let pilihanKod = "";


    (kodResult.data || [])
        .forEach(

            function(k) {

                pilihanKod += `

                    <option value="${k.kod}">

                        ${k.kod} - ${k.waktu_tugasan}

                    </option>

                `;

            }

        );


    let rows = "";


    (dutyResult.data || [])
        .forEach(

            function(d, index) {

                rows += `

                    <tr>

                        <td>
                            ${index + 1}
                        </td>

                        <td>
                            ${d.tarikh}
                        </td>

                        <td>
                            ${d.anggota
                                ? d.anggota.nama
                                : d.anggota_id}
                        </td>

                        <td>
                            ${d.kod_duty}
                        </td>

                        <td>
                            ${d.waktu_tugasan || ""}
                        </td>

                        <td>
                            ${d.jam_kerja ?? ""}
                        </td>

                        <td>
                            ${d.jam_klm ?? ""}
                        </td>

                        <td>

                            <button
                                class="delete"
                                onclick="padamDuty('${d.id}')">

                                Padam

                            </button>

                        </td>

                    </tr>

                `;

            }

        );


    document.getElementById("main").innerHTML = `

        <div class="header">

            <h1>
                Key In Duty
            </h1>

            <p>
                Masukkan rekod duty anggota
            </p>

        </div>


        <div class="content">

            <h2>
                Tambah Duty
            </h2>


            <div class="form-row">


                <div class="form-group">

                    <label>
                        Tarikh
                    </label>

                    <input
                        type="date"
                        id="tarikh">

                </div>


                <div class="form-group">

                    <label>
                        Anggota
                    </label>

                    <select
                        id="anggotaDuty">

                        <option value="">

                            Pilih Anggota

                        </option>

                        ${pilihanAnggota}

                    </select>

                </div>


                <div class="form-group">

                    <label>
                        Kod Duty
                    </label>

                    <select
                        id="kodDuty"
                        onchange="paparInfoKodDuty()">

                        <option value="">

                            Pilih Kod Duty

                        </option>

                        ${pilihanKod}

                    </select>

                </div>

            </div>


            <div class="duty-info">


                <h3>
                    Maklumat Duty
                </h3>


                <div class="duty-info-grid">


                    <div class="info-box">

                        <div class="info-title">

                            Waktu Tugasan

                        </div>

                        <div
                            class="info-value"
                            id="paparWaktu">

                            -

                        </div>

                    </div>


                    <div class="info-box">

                        <div class="info-title">

                            Jam Kerja

                        </div>

                        <div
                            class="info-value"
                            id="paparJamKerja">

                            -

                        </div>

                    </div>


                    <div class="info-box">

                        <div class="info-title">

                            Jam KLM

                        </div>

                        <div
                            class="info-value"
                            id="paparJamKLM">

                            -

                        </div>

                    </div>


                </div>


            </div>


            <br>


            <button
                onclick="simpanDuty()">

                💾 Simpan Duty

            </button>


        </div>


        <div class="content">


            <h2>

                Senarai Duty

                (${dutyResult.data
                    ? dutyResult.data.length
                    : 0})

            </h2>


            <div style="overflow-x:auto">


                <table>


                    <thead>

                        <tr>

                            <th>Bil</th>

                            <th>Tarikh</th>

                            <th>Anggota</th>

                            <th>Kod Duty</th>

                            <th>Waktu Tugasan</th>

                            <th>Jam Kerja</th>

                            <th>Jam KLM</th>

                            <th>Tindakan</th>

                        </tr>

                    </thead>


                    <tbody>

                        ${rows}

                    </tbody>


                </table>


            </div>


        </div>

    `;


    document.getElementById("tarikh").value =

        new Date()
            .toISOString()
            .split("T")[0];

}


/*
====================================================
6. PAPAR INFO KOD DUTY
====================================================
*/

async function paparInfoKodDuty() {


    const kod =
        document
            .getElementById("kodDuty")
            .value;


    if (!kod) {

        document.getElementById(
            "paparWaktu"
        ).textContent = "-";


        document.getElementById(
            "paparJamKerja"
        ).textContent = "-";


        document.getElementById(
            "paparJamKLM"
        ).textContent = "-";


        return;

    }


    const result =
        await supabaseClient

            .from("kod_duty")

            .select(
                "waktu_tugasan, jam_kerja, jam_klm"
            )

            .eq(
                "kod",
                kod
            )

            .single();


    if (result.data) {

        document.getElementById(
            "paparWaktu"
        ).textContent =
            result.data.waktu_tugasan;


        document.getElementById(
            "paparJamKerja"
        ).textContent =
            result.data.jam_kerja;


        document.getElementById(
            "paparJamKLM"
        ).textContent =
            result.data.jam_klm;

    }

}


/*
====================================================
7. SIMPAN DUTY
====================================================
*/

async function simpanDuty() {


    const tarikh =
        document
            .getElementById("tarikh")
            .value;


    const anggotaId =
        document
            .getElementById("anggotaDuty")
            .value;


    const kod =
        document
            .getElementById("kodDuty")
            .value;


    if (

        !tarikh ||

        !anggotaId ||

        !kod

    ) {

        alert(
            "Sila lengkapkan semua maklumat."
        );

        return;

    }


    const kodData =
        await supabaseClient

            .from("kod_duty")

            .select("*")

            .eq(
                "kod",
                kod
            )

            .single();


    if (kodData.error) {

        alert(
            "Kod Duty tidak dijumpai."
        );

        return;

    }


    const result =
        await supabaseClient

            .from("jadual_duty")

            .insert([

                {

                    tarikh:
                        tarikh,

                    anggota_id:
                        anggotaId,

                    kod_duty:
                        kodData.data.kod,

                    waktu_tugasan:
                        kodData.data.waktu_tugasan,

                    jam_kerja:
                        kodData.data.jam_kerja,

                    jam_klm:
                        kodData.data.jam_klm

                }

            ]);


    if (result.error) {

        alert(
            "Gagal simpan duty: " +
            result.error.message
        );

        return;

    }


    alert(
        "Duty berjaya disimpan."
    );


    paparKeyInDuty();

}


/*
====================================================
8. PADAM DUTY
====================================================
*/

async function padamDuty(id) {


    if (

        !confirm(
            "Padam rekod duty ini?"
        )

    ) {

        return;

    }


    const result =
        await supabaseClient

            .from("jadual_duty")

            .delete()

            .eq(
                "id",
                id
            );


    if (result.error) {

        alert(
            "Gagal padam duty."
        );

        return;

    }


    paparKeyInDuty();

}


/*
====================================================
9. SENARAI ANGGOTA
====================================================
*/

async function paparAnggota() {


    const result =
        await supabaseClient

            .from("anggota")

            .select("*")

            .order(
                "nama",
                {
                    ascending: true
                }
            );


    let rows = "";


    (result.data || [])
        .forEach(

            function(a, index) {

                rows += `

                    <tr>

                        <td>
                            ${index + 1}
                        </td>

                        <td>
                            ${a.nama}
                        </td>

                        <td>
                            ${a.no_badan || ""}
                        </td>

                        <td>
                            ${a.pangkat || ""}
                        </td>

                        <td>

                            <button
                                class="delete"
                                onclick="padamAnggota('${a.id}')">

                                Padam

                            </button>

                        </td>

                    </tr>

                `;

            }

        );


    document.getElementById("main").innerHTML = `

        <div class="header">

            <h1>
                Senarai Anggota
            </h1>

            <p>
                Pengurusan data anggota FPB
            </p>

        </div>


        <div class="content">

            <h2>
                Senarai Anggota
            </h2>


            <table>

                <thead>

                    <tr>

                        <th>Bil</th>

                        <th>Nama</th>

                        <th>No. Badan</th>

                        <th>Pangkat</th>

                        <th>Tindakan</th>

                    </tr>

                </thead>


                <tbody>

                    ${rows}

                </tbody>

            </table>

        </div>

    `;

}


/*
====================================================
10. PADAM ANGGOTA
====================================================
*/

async function padamAnggota(id) {


    if (

        !confirm(
            "Padam anggota ini?"
        )

    ) {

        return;

    }


    const result =
        await supabaseClient

            .from("anggota")

            .delete()

            .eq(
                "id",
                id
            );


    if (result.error) {

        alert(
            "Gagal padam anggota: " +
            result.error.message
        );

        return;

    }


    paparAnggota();

}


/*
====================================================
11. JADUAL DUTY
====================================================
*/

function paparJadualDuty() {

    paparKeyInDuty();

}


</script>

</body>

</html>
