<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FPB Duty System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    background: #f1f5f9;
    color: #1e293b;
}

header {
    background: #0f172a;
    color: white;
    padding: 20px 25px;
}

header h1 {
    margin: 0;
    font-size: 25px;
}

header p {
    margin: 6px 0 0;
    color: #cbd5e1;
}

.container {
    max-width: 1450px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 20px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
}

h2 {
    margin-top: 0;
    color: #0f172a;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 6px;
}

input,
select,
button {
    width: 100%;
    padding: 11px;
    border-radius: 7px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
}

select:disabled {
    background: #e2e8f0;
    cursor: not-allowed;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #1d4ed8;
}

.btn-danger {
    background: #dc2626;
}

.btn-danger:hover {
    background: #b91c1c;
}

.info-box {
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    padding: 15px;
    border-radius: 8px;
}

.info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
}

.info-item {
    background: white;
    padding: 10px;
    border-radius: 6px;
}

.info-item small {
    color: #64748b;
    display: block;
}

.info-item strong {
    display: block;
    margin-top: 4px;
}

.table-wrapper {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 1100px;
}

th,
td {
    border-bottom: 1px solid #e2e8f0;
    padding: 10px;
    text-align: left;
    white-space: nowrap;
}

th {
    background: #0f172a;
    color: white;
}

tr:hover {
    background: #f8fafc;
}

.success {
    background: #dcfce7;
    color: #166534;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
}

.error {
    background: #fee2e2;
    color: #991b1b;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
}

@media(max-width: 600px) {

    .container {
        padding: 10px;
    }

    header h1 {
        font-size: 20px;
    }

}

</style>

</head>

<body>

<header>

<h1>FPB DUTY SYSTEM</h1>

<p>Sistem Pengurusan Jadual Duty Anggota</p>

</header>

<div class="container">

<!-- ================================================= -->

<!-- BORANG MASUKKAN DUTY -->

<!-- ================================================= -->

<div class="card">

<h2>➕ Masukkan Duty</h2>

<div id="mesej"></div>

<div class="grid">

<!-- TARIKH -->

<div>

<label>Tarikh Duty</label>

<input
type="date"
id="tarikh"

>

</div>

<!-- PILIH POS DAHULU -->

<div>

<label>Pos</label>

<select id="pilihPos">

<option value="">
-- Pilih Pos Dahulu --
</option>

</select>

</div>

<!-- ANGGOTA IKUT POS -->

<div>

<label>Anggota</label>

<select
id="anggota"
disabled

>

<option value="">
-- Pilih Pos Dahulu --
</option>

</select>

</div>

<!-- KOD DUTY -->

<div>

<label>Kod Duty</label>

<select id="kodDuty">

<option value="">
-- Pilih Kod Duty --
</option>

</select>

</div>

<!-- DIKEMASKINI OLEH -->

<div>

<label>Dikemaskini Oleh</label>

<input
type="text"
id="dikemaskiniOleh"
placeholder="Nama Ketua Pos"

>

</div>

</div>

<br>

<!-- ================================================= -->

<!-- MAKLUMAT ANGGOTA -->

<!-- ================================================= -->

<div
    class="info-box"
    id="infoAnggota"
    style="display:none;"
>

<h3>Maklumat Anggota</h3>

<div class="info-grid">

<div class="info-item">

<small>No. Anggota</small>

<strong id="infoNoAnggota">-</strong>

</div>

<div class="info-item">

<small>Nama</small>

<strong id="infoNama">-</strong>

</div>

<div class="info-item">

<small>Pangkat</small>

<strong id="infoPangkat">-</strong>

</div>

<div class="info-item">

<small>Pos</small>

<strong id="infoPos">-</strong>

</div>

<div class="info-item">

<small>Unit</small>

<strong id="infoUnit">-</strong>

</div>

</div>

</div>

<br>

<!-- ================================================= -->

<!-- MAKLUMAT DUTY -->

<!-- ================================================= -->

<div
    class="info-box"
    id="infoDuty"
    style="display:none;"
>

<h3>Maklumat Duty</h3>

<div class="info-grid">

<div class="info-item">

<small>Waktu Tugasan</small>

<strong id="infoWaktu">-</strong>

</div>

<div class="info-item">

<small>Jam Kerja</small>

<strong id="infoJamKerja">-</strong>

</div>

<div class="info-item">

<small>Jam KLM</small>

<strong id="infoJamKlm">-</strong>

</div>

</div>

</div>

<br>

<button onclick="simpanDuty()">

💾 SIMPAN DUTY

</button>

</div>

<!-- ================================================= -->

<!-- SENARAI DUTY -->

<!-- ================================================= -->

<div class="card">

<h2>📋 Senarai Duty</h2>

<div class="grid">

<div>

<label>Pilih Tarikh</label>

<input
type="date"
id="filterTarikh"
onchange="paparDuty()"

>

</div>

<div>

<label>Pilih Pos</label>

<select
id="filterPos"
onchange="paparDuty()"

>

<option value="">
Semua Pos
</option>

</select>

</div>

<div>

<label>Cari Nama</label>

<input
type="text"
id="cariNama"
placeholder="Cari nama anggota..."
onkeyup="paparDuty()"

>

</div>

</div>

<br>

<div class="table-wrapper">

<table>

<thead>

<tr>

<th>Tarikh</th>

<th>No Anggota</th>

<th>Nama</th>

<th>Pangkat</th>

<th>Pos</th>

<th>Kod</th>

<th>Waktu</th>

<th>Jam Kerja</th>

<th>Jam KLM</th>

<th>Tindakan</th>

</tr>

</thead>

<tbody id="senaraiDuty">

<tr>

<td colspan="10">

Sila pilih tarikh

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script>


// =====================================================
// SAMBUNG SUPABASE
// =====================================================

const SUPABASE_URL =
"https://nlwrrrwkjpktrifxeymw.supabase.co";


const SUPABASE_ANON_KEY =
"sb_publishable_0ymP9thOFXkuNYzvwa0gwQ_1mbxyFE6";


const supabaseClient =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);


// =====================================================
// PEMBOLEH UBAH
// =====================================================

let semuaAnggota = [];

let semuaKodDuty = [];

let anggotaIkutPos = [];


// =====================================================
// BILA HALAMAN DIBUKA
// =====================================================

document.addEventListener(
    "DOMContentLoaded",
    async function() {


        document
            .getElementById("tarikh")
            .valueAsDate =
            new Date();


        document
            .getElementById("filterTarikh")
            .valueAsDate =
            new Date();


        await muatAnggota();


        await muatKodDuty();


        await muatSenaraiPos();


        paparDuty();

    }
);


// =====================================================
// AMBIL DATA ANGGOTA
// =====================================================

async function muatAnggota() {


    const {
        data,
        error
    } =
    await supabaseClient

        .from("Data_Anggota")

        .select("*")

        .eq(
            "status",
            "Aktif"
        )

        .order(
            "nama",
            {
                ascending: true
            }
        );


    if (error) {


        console.error(error);


        paparMesej(

            "Gagal ambil data anggota: "
            + error.message,

            "error"

        );


        return;

    }


    semuaAnggota = data;


    // ISI DROPDOWN POS

    const posUnik = [

        ...new Set(

            data

                .map(
                    x => x.pos
                )

                .filter(Boolean)

        )

    ].sort();


    const selectPos =
        document
            .getElementById(
                "pilihPos"
            );


    posUnik.forEach(
        function(pos) {


            const option =
                document
                    .createElement(
                        "option"
                    );


            option.value =
                pos;


            option.textContent =
                pos;


            selectPos
                .appendChild(
                    option
                );

        }
    );


}


// =====================================================
// BILA PILIH POS
// =====================================================

document

    .getElementById(
        "pilihPos"
    )

    .addEventListener(
        "change",
        function() {


            const pos =
                this.value;


            const selectAnggota =
                document
                    .getElementById(
                        "anggota"
                    );


            // KOSONGKAN DROPDOWN

            selectAnggota.innerHTML =
                "";


            // TIADA POS DIPILIH

            if (!pos) {


                selectAnggota.disabled =
                    true;


                selectAnggota.innerHTML = `

                    <option value="">

                        -- Pilih Pos Dahulu --

                    </option>

                `;


                document
                    .getElementById(
                        "infoAnggota"
                    )
                    .style.display =
                    "none";


                return;

            }


            // AKTIFKAN DROPDOWN

            selectAnggota.disabled =
                false;


            selectAnggota.innerHTML = `

                <option value="">

                    -- Pilih Anggota --

                </option>

            `;


            // CARI ANGGOTA IKUT POS

            anggotaIkutPos =
                semuaAnggota.filter(

                    function(anggota) {

                        return
                        anggota.pos === pos;

                    }

                );


            anggotaIkutPos.forEach(

                function(anggota) {


                    const option =
                        document
                            .createElement(
                                "option"
                            );


                    // NO_SKB SEBAGAI VALUE

                    option.value =
                        anggota.no_skb;


                    option.textContent =

                        anggota.no_anggota
                        + " - "
                        + anggota.nama;


                    selectAnggota
                        .appendChild(
                            option
                        );

                }

            );


        }

    );


// =====================================================
// AMBIL KOD DUTY
// =====================================================

async function muatKodDuty() {


    const {
        data,
        error
    } =
    await supabaseClient

        .from("kod_duty")

        .select("*")

        .eq(
            "status",
            "Aktif"
        )

        .order(
            "kod",
            {
                ascending: true
            }
        );


    if (error) {


        console.error(error);


        paparMesej(

            "Gagal ambil kod duty: "
            + error.message,

            "error"

        );


        return;

    }


    semuaKodDuty =
        data;


    const select =
        document
            .getElementById(
                "kodDuty"
            );


    data.forEach(
        function(kod) {


            const option =
                document
                    .createElement(
                        "option"
                    );


            option.value =
                kod.kod;


            option.textContent =

                kod.kod
                + " - "
                + kod.waktu_tugasan
                + " | "
                + kod.jam_kerja
                + " jam kerja"
                + " | "
                + kod.jam_klm
                + " jam KLM";


            select
                .appendChild(
                    option
                );

        }
    );


}


// =====================================================
// PILIH ANGGOTA
// =====================================================

document

    .getElementById(
        "anggota"
    )

    .addEventListener(
        "change",
        function() {


            const noSkb =
                this.value;


            const anggota =
                semuaAnggota.find(

                    function(x) {

                        return
                        String(
                            x.no_skb
                        )
                        ===
                        String(
                            noSkb
                        );

                    }

                );


            if (!anggota) {


                document
                    .getElementById(
                        "infoAnggota"
                    )
                    .style.display =
                    "none";


                return;

            }


            document
                .getElementById(
                    "infoAnggota"
                )
                .style.display =
                "block";


            document
                .getElementById(
                    "infoNoAnggota"
                )
                .textContent =

                anggota.no_anggota
                || "-";


            document
                .getElementById(
                    "infoNama"
                )
                .textContent =

                anggota.nama
                || "-";


            document
                .getElementById(
                    "infoPangkat"
                )
                .textContent =

                anggota.pangkat
                || "-";


            document
                .getElementById(
                    "infoPos"
                )
                .textContent =

                anggota.pos
                || "-";


            document
                .getElementById(
                    "infoUnit"
                )
                .textContent =

                anggota.unit
                || "-";


        }

    );


// =====================================================
// PILIH KOD DUTY
// =====================================================

document

    .getElementById(
        "kodDuty"
    )

    .addEventListener(
        "change",
        function() {


            const kod =
                this.value;


            const duty =
                semuaKodDuty.find(

                    function(x) {

                        return
                        String(
                            x.kod
                        )
                        ===
                        String(
                            kod
                        );

                    }

                );


            if (!duty) {


                document
                    .getElementById(
                        "infoDuty"
                    )
                    .style.display =
                    "none";


                return;

            }


            document
                .getElementById(
                    "infoDuty"
                )
                .style.display =
                "block";


            document
                .getElementById(
                    "infoWaktu"
                )
                .textContent =

                duty.waktu_tugasan
                || "-";


            document
                .getElementById(
                    "infoJamKerja"
                )
                .textContent =

                (
                    duty.jam_kerja
                    || 0
                )
                + " jam";


            document
                .getElementById(
                    "infoJamKlm"
                )
                .textContent =

                (
                    duty.jam_klm
                    || 0
                )
                + " jam";


        }

    );


// =====================================================
// SIMPAN DUTY
// =====================================================

async function simpanDuty() {


    const tarikh =
        document
            .getElementById(
                "tarikh"
            )
            .value;


    const noSkb =
        document
            .getElementById(
                "anggota"
            )
            .value;


    const kodDuty =
        document
            .getElementById(
                "kodDuty"
            )
            .value;


    const dikemaskiniOleh =
        document
            .getElementById(
                "dikemaskiniOleh"
            )
            .value;


    if (

        !tarikh
        ||
        !noSkb
        ||
        !kodDuty

    ) {


        paparMesej(

            "Sila lengkapkan Tarikh, Pos, Anggota dan Kod Duty.",

            "error"

        );


        return;

    }


    const anggota =
        semuaAnggota.find(

            function(x) {

                return
                String(
                    x.no_skb
                )
                ===
                String(
                    noSkb
                );

            }

        );


    const duty =
        semuaKodDuty.find(

            function(x) {

                return
                String(
                    x.kod
                )
                ===
                String(
                    kodDuty
                );

            }

        );


    const tarikhObj =
        new Date(
            tarikh
        );


    const bulan =
        tarikhObj
            .getMonth()
            \+ 1;


    const tahun =
        tarikhObj
            .getFullYear();


    const {
        error
    } =
    await supabaseClient

        .from(
            "jadual_duty"
        )

        .insert({

            tarikh:
                tarikh,

            bulan:
                bulan,

            tahun:
                tahun,

            no_skb:
                noSkb,

            kod_dutyy:
                kodDuty,

            waktu_tugasan:
                duty.waktu_tugasan,

            jam_kerja:
                duty.jam_kerja,

            jam_klm:
                duty.jam_klm,

            pos:
                anggota.pos,

            dikemaskini_oleh:
                dikemaskiniOleh

        });


    if (error) {


        console.error(error);


        if (

            error.code
            ===
            "23505"

        ) {


            paparMesej(

                "Anggota ini sudah mempunyai duty pada tarikh tersebut.",

                "error"

            );


        } else {


            paparMesej(

                "Gagal simpan: "
                + error.message,

                "error"

            );

        }


        return;

    }


    paparMesej(

        "Duty berjaya disimpan.",

        "success"

    );


    document
        .getElementById(
            "anggota"
        )
        .value =
        "";


    document
        .getElementById(
            "kodDuty"
        )
        .value =
        "";


    document
        .getElementById(
            "infoAnggota"
        )
        .style.display =
        "none";


    document
        .getElementById(
            "infoDuty"
        )
        .style.display =
        "none";


    paparDuty();


}


// =====================================================
// SENARAI POS UNTUK FILTER
// =====================================================

async function muatSenaraiPos() {


    const {
        data,
        error
    } =
    await supabaseClient

        .from(
            "Data_Anggota"
        )

        .select(
            "pos"
        )

        .eq(
            "status",
            "Aktif"
        );


    if (error) {


        console.error(error);


        return;

    }


    const posUnik = [

        ...new Set(

            data

                .map(
                    x => x.pos
                )

                .filter(Boolean)

        )

    ].sort();


    const select =
        document
            .getElementById(
                "filterPos"
            );


    posUnik.forEach(

        function(pos) {


            const option =
                document
                    .createElement(
                        "option"
                    );


            option.value =
                pos;


            option.textContent =
                pos;


            select
                .appendChild(
                    option
                );


        }

    );


}


// =====================================================
// PAPAR SENARAI DUTY
// =====================================================

async function paparDuty() {


    const tarikh =
        document
            .getElementById(
                "filterTarikh"
            )
            .value;


    const pos =
        document
            .getElementById(
                "filterPos"
            )
            .value;


    const cari =
        document
            .getElementById(
                "cariNama"
            )
            .value
            .toLowerCase();


    let query =

        supabaseClient

            .from(
                "jadual_duty"
            )

            .select(
                "*"
            )

            .order(
                "no_skb",
                {
                    ascending:
                    true
                }
            );


    if (tarikh) {


        query =
            query.eq(
                "tarikh",
                tarikh
            );

    }


    if (pos) {


        query =
            query.eq(
                "pos",
                pos
            );

    }


    const {
        data,
        error
    } =
    await query;


    if (error) {


        console.error(error);


        paparMesej(

            "Gagal ambil senarai duty: "
            + error.message,

            "error"

        );


        return;

    }


    const tbody =
        document
            .getElementById(
                "senaraiDuty"
            );


    tbody.innerHTML =
        "";


    const dataLengkap =
        data.map(

            function(row) {


                const anggota =
                    semuaAnggota.find(

                        function(x) {

                            return
                            String(
                                x.no_skb
                            )
                            ===
                            String(
                                row.no_skb
                            );

                        }

                    );


                return {

                    row:
                        row,

                    anggota:
                        anggota

                };

            }

        );


    const filtered =
        dataLengkap.filter(

            function(item) {


                const nama =

                    item.anggota
                    ?.nama
                    ?.toLowerCase()
                    || "";


                return nama
                    .includes(
                        cari
                    );

            }

        );


    if (

        filtered.length
        ===
        0

    ) {


        tbody.innerHTML = `

            <tr>

                <td colspan="10">

                    Tiada rekod duty.

                </td>

            </tr>

        `;


        return;

    }


    filtered.forEach(

        function(item) {


            const row =
                item.row;


            const anggota =
                item.anggota;


            const tr =
                document
                    .createElement(
                        "tr"
                    );


            tr.innerHTML = `

                <td>

                    ${formatTarikh(
                        row.tarikh
                    )}

                </td>


                <td>

                    ${anggota?.no_anggota || ""}

                </td>


                <td>

                    ${anggota?.nama || ""}

                </td>


                <td>

                    ${anggota?.pangkat || ""}

                </td>


                <td>

                    ${row.pos || ""}

                </td>


                <td>

                    <strong>

                        ${row.kod_dutyy || ""}

                    </strong>

                </td>


                <td>

                    ${row.waktu_tugasan || ""}

                </td>


                <td>

                    ${row.jam_kerja || 0}

                </td>


                <td>

                    ${row.jam_klm || 0}

                </td>


                <td>

                    <button

                        class="btn-danger"

                        onclick="padamDuty('${row.tarikh}', '${row.no_skb}')"

                    >

                        Padam

                    </button>

                </td>

            `;


            tbody
                .appendChild(
                    tr
                );


        }

    );


}


// =====================================================
// PADAM DUTY
// =====================================================

async function padamDuty(

    tarikh,

    noSkb

) {


    if (

        !confirm(
            "Padam rekod duty ini?"
        )

    ) {

        return;

    }


    const {
        error
    } =
    await supabaseClient

        .from(
            "jadual_duty"
        )

        .delete()

        .eq(
            "tarikh",
            tarikh
        )

        .eq(
            "no_skb",
            noSkb
        );


    if (error) {


        paparMesej(

            "Gagal padam: "
            + error.message,

            "error"

        );


        return;

    }


    paparMesej(

        "Rekod duty telah dipadam.",

        "success"

    );


    paparDuty();


}


// =====================================================
// MESEJ
// =====================================================

function paparMesej(

    mesej,

    jenis

) {


    const div =
        document
            .getElementById(
                "mesej"
            );


    div.className =
        jenis;


    div.textContent =
        mesej;


    setTimeout(

        function() {


            div.textContent =
                "";


            div.className =
                "";


        },

        5000

    );


}


// =====================================================
// FORMAT TARIKH
// =====================================================

function formatTarikh(

    tarikh

) {


    if (!tarikh) {

        return "";

    }


    const date =
        new Date(
            tarikh
        );


    return date
        .toLocaleDateString(
            "ms-MY"
        );


}
