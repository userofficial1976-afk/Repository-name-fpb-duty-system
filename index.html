<!DOCTYPE html>

<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FPB Duty System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    background: #f1f5f9;
    color: #1e293b;
}

.sidebar {
    position: fixed;
    width: 244px;
    height: 100vh;
    background: #0f172a;
    color: white;
    padding: 25px 18px;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 30px;
}

.menu {
    padding: 15px;
    margin: 8px 0;
    cursor: pointer;
    border-radius: 8px;
}

.menu:hover,
.menu.active {
    background: #2563eb;
}

.main {
    margin-left: 244px;
    padding: 30px;
}

.header,
.content,
.card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
}

h1 {
    margin-top: 0;
    color: #1e3a5f;
}

.cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
}

.card h3 {
    color: #64748b;
}

.number {
    font-size: 32px;
    color: #2563eb;
    font-weight: bold;
}

.form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 15px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    font-weight: bold;
}

input,
select {
    width: 280px;
    padding: 10px;
    margin-top: 6px;
    border: 1px solid #cbd5e1;
    border-radius: 5px;
    font-size: 14px;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #1d4ed8;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th,
td {
    border-bottom: 1px solid #e2e8f0;
    padding: 12px;
    text-align: left;
    white-space: nowrap;
}

th {
    background: #f8fafc;
}

.duty-info {
    background: #eff6ff;
    padding: 15px;
    border-left: 5px solid #2563eb;
    border-radius: 6px;
    margin-top: 15px;
}

.duty-info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.info-box {
    background: white;
    padding: 15px;
    border-radius: 7px;
}

.info-title {
    font-size: 13px;
    color: #64748b;
}

.info-value {
    font-size: 20px;
    font-weight: bold;
    margin-top: 5px;
}

.error {
    background: #fee2e2;
    color: #991b1b;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.success {
    background: #dcfce7;
    color: #166534;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
}

@media (max-width: 900px) {

    .cards {
        grid-template-columns: repeat(2, 1fr);
    }

}

@media (max-width: 700px) {

    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
    }

    .main {
        margin-left: 0;
        padding: 15px;
    }

    .cards {
        grid-template-columns: 1fr;
    }

    .duty-info-grid {
        grid-template-columns: 1fr;
    }

}

</style>

</head>

<body>

<div class="sidebar">

```
<div class="logo">
    🚓 FPB DUTY
</div>

<div class="menu active"
     onclick="paparDashboard()">
    🏠 Dashboard
</div>

<div class="menu"
     onclick="paparKeyInDuty()">
    📝 Key In Duty
</div>

<div class="menu"
     onclick="paparAnggota()">
    👥 Senarai Anggota
</div>

<div class="menu"
     onclick="paparJadualDuty()">
    🗓️ Jadual Duty
</div>
```

</div>

<div class="main" id="main"></div>

<script>


/* =====================================================
   SAMBUNGAN SUPABASE
===================================================== */

const SUPABASE_URL =
"https://nlwrrrwkjpktrifxeymw.supabase.co";

const SUPABASE_ANON_KEY =
"sb_publishable_0ymP9thOFXkuNYzvwa0gwQ_1mbxyFE6";

const supabaseClient =
window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);


/* =====================================================
   NAMA TABLE
===================================================== */

const TABLE_ANGGOTA = "Data_Anggota";

const TABLE_KOD_DUTY = "kod_duty";

const TABLE_JADUAL_DUTY = "jadual_duty";


/* =====================================================
   MULA
===================================================== */

document.addEventListener(
    "DOMContentLoaded",
    function() {
        paparDashboard();
    }
);


/* =====================================================
   DASHBOARD
===================================================== */

async function paparDashboard() {

    const anggota =
        await supabaseClient
        .from(TABLE_ANGGOTA)
        .select("no_skb");

    const kod =
        await supabaseClient
        .from(TABLE_KOD_DUTY)
        .select("kod");

    const duty =
        await supabaseClient
        .from(TABLE_JADUAL_DUTY)
        .select("tarikh");

    const hariIni =
        new Date()
        .toISOString()
        .split("T")[0];

    const dutyHariIni =
        (duty.data || [])
        .filter(function(d) {
            return d.tarikh === hariIni;
        });


    document.getElementById("main").innerHTML = `

        <div class="header">

            <h1>Dashboard</h1>

            <p>
                Selamat datang ke FPB Duty System
            </p>

        </div>


        <div class="cards">

            <div class="card">

                <h3>Jumlah Anggota</h3>

                <div class="number">
                    ${(anggota.data || []).length}
                </div>

            </div>


            <div class="card">

                <h3>Duty Hari Ini</h3>

                <div class="number">
                    ${dutyHariIni.length}
                </div>

            </div>


            <div class="card">

                <h3>Kod Duty</h3>

                <div class="number">
                    ${(kod.data || []).length}
                </div>

            </div>


            <div class="card">

                <h3>Jumlah Duty</h3>

                <div class="number">
                    ${(duty.data || []).length}
                </div>

            </div>

        </div>

    `;
}


/* =====================================================
   KEY IN DUTY
===================================================== */

async function paparKeyInDuty() {


    /* AMBIL SEMUA ANGGOTA */

    const anggotaResult =
        await supabaseClient
        .from(TABLE_ANGGOTA)
        .select(
            "no_skb,no_anggota,nama,pangkat,pos,status"
        )
        .order(
            "nama",
            {
                ascending: true
            }
        );


    /* AMBIL SEMUA KOD DUTY */

    const kodResult =
        await supabaseClient
        .from(TABLE_KOD_DUTY)
        .select(
            "kod,waktu_tugasan,jam_kerja,jam_klm,status"
        )
        .order(
            "kod",
            {
                ascending: true
            }
        );


    if (anggotaResult.error) {

        paparRalat(
            "Data_Anggota: " +
            anggotaResult.error.message
        );

        return;

    }


    if (kodResult.error) {

        paparRalat(
            "kod_duty: " +
            kodResult.error.message
        );

        return;

    }


    let pilihanAnggota = "";


    (anggotaResult.data || [])
    .forEach(function(a) {

        pilihanAnggota += `

            <option value="${a.no_skb}">

                ${a.no_skb}
                -
                ${a.nama}
                -
                ${a.no_anggota}

            </option>

        `;

    });


    let pilihanKod = "";


    (kodResult.data || [])
    .forEach(function(k) {

        pilihanKod += `

            <option value="${k.kod}">

                ${k.kod}
                -
                ${k.waktu_tugasan}

            </option>

        `;

    });


    document.getElementById("main").innerHTML = `


        <div class="header">

            <h1>Key In Duty</h1>

            <p>
                Masukkan rekod duty anggota
            </p>

        </div>


        <div class="content">

            <h2>Tambah Duty</h2>


            <div class="form-row">


                <div class="form-group">

                    <label>
                        Tarikh
                    </label>

                    <input
                        type="date"
                        id="tarikh">

                </div>


                <div class="form-group">

                    <label>
                        No SKB / Anggota
                    </label>

                    <select
                        id="anggotaDuty">

                        <option value="">

                            -- Pilih Anggota --

                        </option>

                        ${pilihanAnggota}

                    </select>

                </div>


                <div class="form-group">

                    <label>
                        Kod Duty
                    </label>

                    <select
                        id="kodDuty"
                        onchange="paparInfoKodDuty()">

                        <option value="">

                            -- Pilih Kod Duty --

                        </option>

                        ${pilihanKod}

                    </select>

                </div>


            </div>


            <div class="duty-info">

                <h3>
                    Maklumat Duty
                </h3>


                <div class="duty-info-grid">


                    <div class="info-box">

                        <div class="info-title">
                            Waktu Tugasan
                        </div>

                        <div
                            class="info-value"
                            id="paparWaktu">

                            -

                        </div>

                    </div>


                    <div class="info-box">

                        <div class="info-title">
                            Jam Kerja
                        </div>

                        <div
                            class="info-value"
                            id="paparJamKerja">

                            -

                        </div>

                    </div>


                    <div class="info-box">

                        <div class="info-title">
                            Jam KLM
                        </div>

                        <div
                            class="info-value"
                            id="paparJamKLM">

                            -

                        </div>

                    </div>


                </div>

            </div>


            <br>


            <button
                onclick="simpanDuty()">

                💾 Simpan Duty

            </button>


        </div>

    `;


    document.getElementById("tarikh").value =

        new Date()
        .toISOString()
        .split("T")[0];

}


/* =====================================================
   AUTO PAPAR KOD DUTY
===================================================== */

async function paparInfoKodDuty() {


    const kod =
        document
        .getElementById("kodDuty")
        .value;


    if (!kod) {

        return;

    }


    const result =
        await supabaseClient
        .from(TABLE_KOD_DUTY)
        .select(
            "waktu_tugasan,jam_kerja,jam_klm"
        )
        .eq(
            "kod",
            kod
        )
        .single();


    if (result.error) {

        alert(
            result.error.message
        );

        return;

    }


    document
    .getElementById("paparWaktu")
    .textContent =
        result.data.waktu_tugasan || "-";


    document
    .getElementById("paparJamKerja")
    .textContent =
        result.data.jam_kerja ?? "-";


    document
    .getElementById("paparJamKLM")
    .textContent =
        result.data.jam_klm ?? "-";

}


/* =====================================================
   SIMPAN DUTY
===================================================== */

async function simpanDuty() {


    const tarikh =
        document
        .getElementById("tarikh")
        .value;


    const noSkb =
        Number(
            document
            .getElementById("anggotaDuty")
            .value
        );


    const kod =
        document
        .getElementById("kodDuty")
        .value;


    if (
        !tarikh ||
        !noSkb ||
        !kod
    ) {

        alert(
            "Sila lengkapkan semua maklumat."
        );

        return;

    }


    const anggotaResult =
        await supabaseClient
        .from(TABLE_ANGGOTA)
        .select(
            "no_skb,pos"
        )
        .eq(
            "no_skb",
            noSkb
        )
        .single();


    const kodResult =
        await supabaseClient
        .from(TABLE_KOD_DUTY)
        .select("*")
        .eq(
            "kod",
            kod
        )
        .single();


    if (anggotaResult.error) {

        alert(
            "Anggota tidak dijumpai: " +
            anggotaResult.error.message
        );

        return;

    }


    if (kodResult.error) {

        alert(
            "Kod Duty tidak dijumpai: " +
            kodResult.error.message
        );

        return;

    }


    const tarikhObj =
        new Date(
            tarikh + "T00:00:00"
        );


    const bulan =
        tarikhObj.getMonth() + 1;


    const tahun =
        tarikhObj.getFullYear();


    const result =
        await supabaseClient
        .from(TABLE_JADUAL_DUTY)
        .insert([

            {

                tarikh: tarikh,

                bulan: bulan,

                tahun: tahun,

                no_skb: noSkb,

                kod_duty:
                    kodResult.data.kod,

                waktu_tugasan:
                    kodResult.data.waktu_tugasan,

                jam_kerja:
                    kodResult.data.jam_kerja,

                jam_klm:
                    kodResult.data.jam_klm,

                pos:
                    anggotaResult.data.pos,

                dikemaskini_oleh:
                    "Sistem",

                dikemaskini_pada:
                    new Date().toISOString()

            }

        ]);


    if (result.error) {

        alert(
            "Gagal simpan duty: " +
            result.error.message
        );

        return;

    }


    alert(
        "Duty berjaya disimpan."
    );


    paparKeyInDuty();

}


/* =====================================================
   SENARAI ANGGOTA
===================================================== */

async function paparAnggota() {


    const result =
        await supabaseClient
        .from(TABLE_ANGGOTA)
        .select("*")
        .order(
            "nama",
            {
                ascending: true
            }
        );


    if (result.error) {

        paparRalat(
            result.error.message
        );

        return;

    }


    let rows = "";


    (result.data || [])
    .forEach(function(a, index) {


        rows += `

            <tr>

                <td>
                    ${index + 1}
                </td>

                <td>
                    ${a.no_skb || ""}
                </td>

                <td>
                    ${a.no_anggota || ""}
                </td>

                <td>
                    ${a.nama || ""}
                </td>

                <td>
                    ${a.pangkat || ""}
                </td>

                <td>
                    ${a.pos || ""}
                </td>

                <td>
                    ${a.unit || ""}
                </td>

                <td>
                    ${a.jawatan || ""}
                </td>

                <td>
                    ${a.status || ""}
                </td>

            </tr>

        `;

    });


    document.getElementById("main").innerHTML = `


        <div class="header">

            <h1>
                Senarai Anggota
            </h1>

            <p>
                Data daripada Data_Anggota
            </p>

        </div>


        <div class="content">

            <h2>
                Senarai Anggota
            </h2>


            <div style="overflow-x:auto">

                <table>

                    <thead>

                        <tr>

                            <th>Bil</th>

                            <th>No SKB</th>

                            <th>No Anggota</th>

                            <th>Nama</th>

                            <th>Pangkat</th>

                            <th>Pos</th>

                            <th>Unit</th>

                            <th>Jawatan</th>

                            <th>Status</th>

                        </tr>

                    </thead>


                    <tbody>

                        ${rows}

                    </tbody>

                </table>

            </div>

        </div>

    `;

}


/* =====================================================
   JADUAL DUTY
===================================================== */

async function paparJadualDuty() {


    const result =
        await supabaseClient
        .from(TABLE_JADUAL_DUTY)
        .select("*")
        .order(
            "tarikh",
            {
                ascending: false
            }
        );


    if (result.error) {

        paparRalat(
            result.error.message
        );

        return;

    }


    let rows = "";


    (result.data || [])
    .forEach(function(d, index) {


        rows += `

            <tr>

                <td>
                    ${index + 1}
                </td>

                <td>
                    ${d.tarikh || ""}
                </td>

                <td>
                    ${d.bulan || ""}
                </td>

                <td>
                    ${d.tahun || ""}
                </td>

                <td>
                    ${d.no_skb || ""}
                </td>

                <td>
                    ${d.kod_duty || ""}
                </td>

                <td>
                    ${d.waktu_tugasan || ""}
                </td>

                <td>
                    ${d.jam_kerja ?? ""}
                </td>

                <td>
                    ${d.jam_klm ?? ""}
                </td>

                <td>
                    ${d.pos || ""}
                </td>

                <td>
                    ${d.dikemaskini_oleh || ""}
                </td>

            </tr>

        `;

    });


    document.getElementById("main").innerHTML = `


        <div class="header">

            <h1>
                Jadual Duty
            </h1>

            <p>
                Senarai rekod duty
            </p>

        </div>


        <div class="content">

            <div style="overflow-x:auto">

                <table>

                    <thead>

                        <tr>

                            <th>Bil</th>

                            <th>Tarikh</th>

                            <th>Bulan</th>

                            <th>Tahun</th>

                            <th>No SKB</th>

                            <th>Kod Duty</th>

                            <th>Waktu Tugasan</th>

                            <th>Jam Kerja</th>

                            <th>Jam KLM</th>

                            <th>Pos</th>

                            <th>Dikemaskini Oleh</th>

                        </tr>

                    </thead>


                    <tbody>

                        ${rows}

                    </tbody>

                </table>

            </div>

        </div>

    `;

}


/* =====================================================
   PAPAR RALAT
===================================================== */

function paparRalat(mesej) {

    document.getElementById("main").innerHTML = `

        <div class="error">

            <strong>
                Ralat Supabase:
            </strong>

            <br><br>

            ${mesej}

        </div>

    `;

}


</script>

</body>

</html>
