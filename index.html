<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FPB Duty System</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    background: #f1f5f9;
}

.sidebar {
    position: fixed;
    width: 244px;
    height: 100vh;
    background: #0f172a;
    color: white;
    padding: 25px 18px;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 30px;
}

.menu {
    padding: 15px;
    margin: 8px 0;
    cursor: pointer;
    border-radius: 8px;
}

.menu:hover,
.menu.active {
    background: #2563eb;
}

.main {
    margin-left: 244px;
    padding: 30px;
}

.header,
.card,
.content {
    background: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
}

h1 {
    margin-top: 0;
    color: #1e3a5f;
}

.cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
}

.card h3 {
    color: #64748b;
}

.number {
    font-size: 32px;
    color: #2563eb;
    font-weight: bold;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #1d4ed8;
}

.delete {
    background: #dc2626;
}

.delete:hover {
    background: #b91c1c;
}

input,
select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border: 1px solid #cbd5e1;
    border-radius: 5px;
    font-size: 14px;
}

.form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 15px;
}

.form-group {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 220px;
}

.form-group label {
    font-weight: bold;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th,
td {
    border-bottom: 1px solid #e2e8f0;
    padding: 12px;
    text-align: left;
}

th {
    background: #f8fafc;
}

.table-container {
    overflow-x: auto;
}

.info-box {
    background: #eff6ff;
    padding: 15px;
    border-radius: 8px;
    margin-top: 15px;
}

.success {
    background: #dcfce7;
    color: #166534;
    padding: 12px;
    margin-top: 15px;
    border-radius: 6px;
}

.error {
    background: #fee2e2;
    color: #991b1b;
    padding: 12px;
    margin-top: 15px;
    border-radius: 6px;
}

@media (max-width: 900px) {

    .sidebar {
        width: 200px;
    }

    .main {
        margin-left: 200px;
    }

    .cards {
        grid-template-columns: repeat(2, 1fr);
    }

}

@media (max-width: 600px) {

    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
    }

    .main {
        margin-left: 0;
        padding: 15px;
    }

    .cards {
        grid-template-columns: 1fr;
    }

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

```
<div class="logo">
    🚓 FPB DUTY
</div>

<div class="menu active"
     onclick="paparDashboard()">
    🏠 Dashboard
</div>

<div class="menu"
     onclick="paparKeyInDuty()">
    📝 Key In Duty
</div>

<div class="menu"
     onclick="paparAnggota()">
    👥 Senarai Anggota
</div>

<div class="menu"
     onclick="paparJadualDuty()">
    🗓️ Jadual Duty
</div>

<div class="menu"
     onclick="paparKodDuty()">
    🏷️ Kod Duty
</div>
```

</div>

<!-- MAIN -->

<div class="main" id="main"></div>

<script>

/* =====================================================
   SUPABASE
===================================================== */

const SUPABASE_URL =
"https://nlwrrrwkjpktrifxeymw.supabase.co";

const SUPABASE_ANON_KEY =
"sb_publishable_0ymP9thOFXkuNYzvwa0gwQ_1mbxyFE6";

const supabaseClient =
window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);


/* =====================================================
   DATA GLOBAL
===================================================== */

let dataAnggota = [];

let dataKodDuty = [];

let dataJadualDuty = [];


/* =====================================================
   PAGE LOAD
===================================================== */

document.addEventListener(
    "DOMContentLoaded",
    function() {

        paparDashboard();

    }
);


/* =====================================================
   DASHBOARD
===================================================== */

async function paparDashboard() {

    aktifkanMenu(0);

    const anggota =
        await supabaseClient
        .from("data_anggota")
        .select("no_skb")
        .eq("status", "Aktif");

    const kod =
        await supabaseClient
        .from("kod_duty")
        .select("kod")
        .eq("status", "Aktif");

    const duty =
        await supabaseClient
        .from("jadual_duty")
        .select("tarikh");

    const hariIni =
        new Date()
        .toISOString()
        .split("T")[0];

    const dutyHariIni =
        duty.data
        ?
        duty.data.filter(
            x => x.tarikh === hariIni
        ).length
        :
        0;

    document.getElementById("main").innerHTML = `

        <div class="header">

            <h1>Dashboard</h1>

            <p>
                Selamat datang ke FPB Duty System
            </p>

        </div>

        <div class="cards">

            <div class="card">

                <h3>Jumlah Anggota Aktif</h3>

                <div class="number">
                    ${anggota.data ? anggota.data.length : 0}
                </div>

            </div>

            <div class="card">

                <h3>Duty Hari Ini</h3>

                <div class="number">
                    ${dutyHariIni}
                </div>

            </div>

            <div class="card">

                <h3>Kod Duty Aktif</h3>

                <div class="number">
                    ${kod.data ? kod.data.length : 0}
                </div>

            </div>

            <div class="card">

                <h3>Jumlah Rekod Duty</h3>

                <div class="number">
                    ${duty.data ? duty.data.length : 0}
                </div>

            </div>

        </div>

    `;

}


/* =====================================================
   LOAD ANGGOTA
   TABLE: data_anggota
===================================================== */

async function loadDataAnggota() {

    const {
        data,
        error
    } = await supabaseClient

        .from("data_anggota")

        .select(
            "no_skb, wilayah, kawasan, pangkat, no_anggota, nama, pos, unit, jawatan, ketua_pos, ketua_unit, status"
        )

        .eq(
            "status",
            "Aktif"
        )

        .order(
            "nama",
            {
                ascending: true
            }
        );

    if (error) {

        console.error(error);

        alert(
            "Gagal load data anggota: " +
            error.message
        );

        return [];

    }

    dataAnggota = data || [];

    return dataAnggota;

}


/* =====================================================
   LOAD KOD DUTY
   TABLE: kod_duty
===================================================== */

async function loadDataKodDuty() {

    const {
        data,
        error
    } = await supabaseClient

        .from("kod_duty")

        .select(
            "kod, waktu_tugasan, jam_kerja, jam_klm, status"
        )

        .eq(
            "status",
            "Aktif"
        )

        .order(
            "kod",
            {
                ascending: true
            }
        );

    if (error) {

        console.error(error);

        alert(
            "Gagal load kod duty: " +
            error.message
        );

        return [];

    }

    dataKodDuty = data || [];

    return dataKodDuty;

}


/* =====================================================
   KEY IN DUTY
===================================================== */

async function paparKeyInDuty() {

    aktifkanMenu(1);

    dataAnggota =
        await loadDataAnggota();

    dataKodDuty =
        await loadDataKodDuty();

    let pilihanAnggota = "";

    dataAnggota.forEach(
        function(a) {

            pilihanAnggota += `

                <option value="${a.no_skb}">

                    ${a.no_skb} -
                    ${a.nama}

                </option>

            `;

        }
    );


    let pilihanKod = "";

    dataKodDuty.forEach(
        function(k) {

            pilihanKod += `

                <option value="${k.kod}">

                    ${k.kod} -
                    ${k.waktu_tugasan}

                </option>

            `;

        }
    );


    document.getElementById("main").innerHTML = `

        <div class="header">

            <h1>
                Key In Duty
            </h1>

            <p>
                Masukkan rekod duty anggota
            </p>

        </div>


        <div class="content">

            <h2>
                Tambah Duty
            </h2>


            <div class="form-row">

                <div class="form-group">

                    <label>
                        Tarikh
                    </label>

                    <input
                        type="date"
                        id="tarikh"
                    >

                </div>


                <div class="form-group">

                    <label>
                        No. SKB
                    </label>

                    <select
                        id="no_skb"
                    >

                        <option value="">
                            -- Pilih No. SKB --
                        </option>

                        ${pilihanAnggota}

                    </select>

                </div>


                <div class="form-group">

                    <label>
                        Kod Duty
                    </label>

                    <select
                        id="kod_duty"
                        onchange="paparMaklumatKodDuty()"
                    >

                        <option value="">
                            -- Pilih Kod Duty --
                        </option>

                        ${pilihanKod}

                    </select>

                </div>

            </div>


            <div id="maklumatDuty"></div>


            <br>


            <button
                onclick="simpanDuty()"
            >

                💾 Simpan Duty

            </button>


            <div
                id="status"
            ></div>

        </div>


        <div class="content">

            <h2>
                Senarai Duty
            </h2>

            <div
                class="table-container"
            >

                <table>

                    <thead>

                        <tr>

                            <th>
                                Tarikh
                            </th>

                            <th>
                                No. SKB
                            </th>

                            <th>
                                Nama
                            </th>

                            <th>
                                Kod Duty
                            </th>

                            <th>
                                Waktu
                            </th>

                            <th>
                                Jam Kerja
                            </th>

                            <th>
                                Jam KLM
                            </th>

                        </tr>

                    </thead>

                    <tbody
                        id="senaraiDuty"
                    >

                        <tr>

                            <td
                                colspan="7"
                            >

                                Loading...

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    `;


    document.getElementById("tarikh").value =
        new Date()
        .toISOString()
        .split("T")[0];


    loadSenaraiDuty();

}


/* =====================================================
   PAPAR MAKLUMAT KOD DUTY
===================================================== */

function paparMaklumatKodDuty() {

    const kod =
        document
        .getElementById("kod_duty")
        .value;

    const duty =
        dataKodDuty.find(
            x => x.kod === kod
        );

    if (!duty) {

        document
        .getElementById("maklumatDuty")
        .innerHTML = "";

        return;

    }

    document
    .getElementById("maklumatDuty")
    .innerHTML = `

        <div class="info-box">

            <b>Waktu Tugasan:</b>
            ${duty.waktu_tugasan || "-"}

            <br><br>

            <b>Jam Kerja:</b>
            ${duty.jam_kerja || 0}

            <br><br>

            <b>Jam KLM:</b>
            ${duty.jam_klm || 0}

        </div>

    `;

}


/* =====================================================
   SIMPAN DUTY
   TABLE: jadual_duty
===================================================== */

async function simpanDuty() {

    const tarikh =
        document
        .getElementById("tarikh")
        .value;

    const noSKB =
        document
        .getElementById("no_skb")
        .value;

    const kodDuty =
        document
        .getElementById("kod_duty")
        .value;


    if (
        !tarikh ||
        !noSKB ||
        !kodDuty
    ) {

        alert(
            "Sila lengkapkan Tarikh, No. SKB dan Kod Duty"
        );

        return;

    }


    const anggota =
        dataAnggota.find(
            x =>
            String(x.no_skb)
            ===
            String(noSKB)
        );


    const duty =
        dataKodDuty.find(
            x =>
            x.kod
            ===
            kodDuty
        );


    if (!anggota) {

        alert(
            "Data No. SKB tidak dijumpai"
        );

        return;

    }


    if (!duty) {

        alert(
            "Data Kod Duty tidak dijumpai"
        );

        return;

    }


    const tarikhObj =
        new Date(
            tarikh + "T00:00:00"
        );


    const bulan =
        tarikhObj.getMonth() + 1;


    const tahun =
        tarikhObj.getFullYear();


    const {
        error
    } = await supabaseClient

        .from("jadual_duty")

        .insert([

            {

                tarikh:
                    tarikh,

                bulan:
                    bulan,

                tahun:
                    tahun,

                no_skb:
                    Number(noSKB),

                kod_duty:
                    duty.kod,

                waktu_tugasan:
                    duty.waktu_tugasan,

                jam_kerja:
                    duty.jam_kerja,

                jam_klm:
                    duty.jam_klm,

                pos:
                    anggota.pos,

                dikemaskini_oleh:
                    anggota.nama,

                dikemaskini_pada:
                    new Date()
                    .toISOString()

            }

        ]);


    if (error) {

        console.error(error);

        alert(
            "Gagal simpan duty: " +
            error.message
        );

        return;

    }


    alert(
        "Duty berjaya disimpan"
    );


    paparKeyInDuty();

}


/* =====================================================
   LOAD SENARAI DUTY
===================================================== */

async function loadSenaraiDuty() {

    const {
        data,
        error
    } = await supabaseClient

        .from("jadual_duty")

        .select("*")

        .order(
            "tarikh",
            {
                ascending: false
            }
        );


    const tbody =
        document
        .getElementById("senaraiDuty");


    if (!tbody)
        return;


    if (error) {

        tbody.innerHTML = `

            <tr>

                <td colspan="7">

                    Gagal load data

                </td>

            </tr>

        `;

        console.error(error);

        return;

    }


    if (
        !data ||
        data.length === 0
    ) {

        tbody.innerHTML = `

            <tr>

                <td colspan="7">

                    Tiada rekod duty

                </td>

            </tr>

        `;

        return;

    }


    tbody.innerHTML = "";


    data.forEach(
        function(d) {

            const anggota =
                dataAnggota.find(
                    x =>
                    String(x.no_skb)
                    ===
                    String(d.no_skb)
                );


            tbody.innerHTML += `

                <tr>

                    <td>
                        ${d.tarikh || ""}
                    </td>

                    <td>
                        ${d.no_skb || ""}
                    </td>

                    <td>
                        ${anggota
                            ?
                            anggota.nama
                            :
                            "-"
                        }
                    </td>

                    <td>
                        ${d.kod_duty || ""}
                    </td>

                    <td>
                        ${d.waktu_tugasan || ""}
                    </td>

                    <td>
                        ${d.jam_kerja ?? ""}
                    </td>

                    <td>
                        ${d.jam_klm ?? ""}
                    </td>

                </tr>

            `;

        }

    );

}


/* =====================================================
   SENARAI ANGGOTA
===================================================== */

async function paparAnggota() {

    aktifkanMenu(2);

    dataAnggota =
        await loadDataAnggota();


    let rows = "";


    dataAnggota.forEach(
        function(a, index) {

            rows += `

                <tr>

                    <td>
                        ${index + 1}
                    </td>

                    <td>
                        ${a.no_skb}
                    </td>

                    <td>
                        ${a.nama}
                    </td>

                    <td>
                        ${a.no_anggota}
                    </td>

                    <td>
                        ${a.pangkat}
                    </td>

                    <td>
                        ${a.pos}
                    </td>

                    <td>
                        ${a.jawatan}
                    </td>

                    <td>
                        ${a.status}
                    </td>

                </tr>

            `;

        }

    );


    document.getElementById("main").innerHTML = `

        <div class="header">

            <h1>
                Senarai Anggota
            </h1>

            <p>
                Data anggota daripada Supabase
            </p>

        </div>


        <div class="content">

            <div
                class="table-container"
            >

                <table>

                    <thead>

                        <tr>

                            <th>
                                Bil
                            </th>

                            <th>
                                No. SKB
                            </th>

                            <th>
                                Nama
                            </th>

                            <th>
                                No. Anggota
                            </th>

                            <th>
                                Pangkat
                            </th>

                            <th>
                                Pos
                            </th>

                            <th>
                                Jawatan
                            </th>

                            <th>
                                Status
                            </th>

                        </tr>

                    </thead>

                    <tbody>

                        ${rows}

                    </tbody>

                </table>

            </div>

        </div>

    `;

}


/* =====================================================
   JADUAL DUTY
===================================================== */

async function paparJadualDuty() {

    aktifkanMenu(3);

    const {
        data,
        error
    } = await supabaseClient

        .from("jadual_duty")

        .select("*")

        .order(
            "tarikh",
            {
                ascending: false
            }
        );


    let rows = "";


    if (data) {

        data.forEach(
            function(d) {

                rows += `

                    <tr>

                        <td>
                            ${d.tarikh || ""}
                        </td>

                        <td>
                            ${d.no_skb || ""}
                        </td>

                        <td>
                            ${d.kod_duty || ""}
                        </td>

                        <td>
                            ${d.waktu_tugasan || ""}
                        </td>

                        <td>
                            ${d.jam_kerja ?? ""}
                        </td>

                        <td>
                            ${d.jam_klm ?? ""}
                        </td>

                        <td>
                            ${d.pos || ""}
                        </td>

                    </tr>

                `;

            }

        );

    }


    document.getElementById("main").innerHTML = `

        <div class="header">

            <h1>
                Jadual Duty
            </h1>

        </div>


        <div class="content">

            <div
                class="table-container"
            >

                <table>

                    <thead>

                        <tr>

                            <th>
                                Tarikh
                            </th>

                            <th>
                                No. SKB
                            </th>

                            <th>
                                Kod Duty
                            </th>

                            <th>
                                Waktu
                            </th>

                            <th>
                                Jam Kerja
                            </th>

                            <th>
                                Jam KLM
                            </th>

                            <th>
                                Pos
                            </th>

                        </tr>

                    </thead>

                    <tbody>

                        ${rows}

                    </tbody>

                </table>

            </div>

        </div>

    `;

}


/* =====================================================
   KOD DUTY
===================================================== */

async function paparKodDuty() {

    aktifkanMenu(4);

    dataKodDuty =
        await loadDataKodDuty();


    let rows = "";


    dataKodDuty.forEach(
        function(k) {

            rows += `

                <tr>

                    <td>
                        ${k.kod}
                    </td>

                    <td>
                        ${k.waktu_tugasan}
                    </td>

                    <td>
                        ${k.jam_kerja}
                    </td>

                    <td>
                        ${k.jam_klm}
                    </td>

                    <td>
                        ${k.status}
                    </td>

                </tr>

            `;

        }

    );


    document.getElementById("main").innerHTML = `

        <div class="header">

            <h1>
                Kod Duty
            </h1>

        </div>


        <div class="content">

            <div
                class="table-container"
            >

                <table>

                    <thead>

                        <tr>

                            <th>
                                Kod
                            </th>

                            <th>
                                Waktu Tugasan
                            </th>

                            <th>
                                Jam Kerja
                            </th>

                            <th>
                                Jam KLM
                            </th>

                            <th>
                                Status
                            </th>

                        </tr>

                    </thead>

                    <tbody>

                        ${rows}

                    </tbody>

                </table>

            </div>

        </div>

    `;

}


/* =====================================================
   MENU AKTIF
===================================================== */

function aktifkanMenu(index) {

    const menu =
        document.querySelectorAll(".menu");

    menu.forEach(
        function(m, i) {

            m.classList.toggle(
                "active",
                i === index
            );

        }

    );

}

</script>

</body>

</html>
