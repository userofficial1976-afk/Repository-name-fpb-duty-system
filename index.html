<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPB Duty System</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f1f5f9;
        }

        .sidebar {
            position: fixed;
            width: 244px;
            height: 100vh;
            background: #0f172a;
            color: white;
            padding: 25px 24px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .menu {
            padding: 15px;
            margin: 8px 0;
            cursor: pointer;
            border-radius: 8px;
        }

        .menu:hover,
        .menu.active {
            background: #2563eb;
        }

        .main {
            margin-left: 244px;
            padding: 30px;
        }

        .header,
        .card,
        .content {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        h1 {
            margin-top: 0;
            color: #1e3a5f;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
        }

        .card h3 {
            color: #64748b;
        }

        .number {
            font-size: 32px;
            color: #2563eb;
            font-weight: bold;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        input {
            padding: 10px;
            margin: 5px;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border-bottom: 1px solid #e2e8f0;
            padding: 12px;
            text-align: left;
        }

        th {
            background: #f8fafc;
        }

        .delete {
            background: #dc2626;
        }

        .delete:hover {
            background: #b91c1c;
        }
    </style>
</head>

<body>

    <div class="sidebar">

        <div class="logo">🚓 FPB DUTY</div>

        <div class="menu active" onclick="paparDashboard()">🏠 Dashboard</div>
        <div class="menu" onclick="paparAnggota()">👥 Senarai Anggota</div>
        <div class="menu">🗓️ Jadual Duty</div>
        <div class="menu">🏷️ Kod Duty</div>
        <div class="menu">📊 Laporan</div>
        <div class="menu">⚙️ Tetapan</div>

    </div>

    <div class="main" id="main">

        <div class="header">
            <h1>Dashboard</h1>
            <p>Selamat datang ke FPB Duty System</p>
        </div>

        <div class="cards">

            <div class="card">
                <h3>Jumlah Anggota</h3>
                <div class="number" id="jumlahAnggota">0</div>
            </div>

            <div class="card">
                <h3>Duty Hari Ini</h3>
                <div class="number">0</div>
            </div>

            <div class="card">
                <h3>Kod Duty</h3>
                <div class="number">0</div>
            </div>

            <div class="card">
                <h3>Laporan</h3>
                <div class="number">0</div>
            </div>

        </div>

    </div>

    <script>

        let anggota = JSON.parse(localStorage.getItem("anggota")) || [];

        function paparDashboard() {

            document.getElementById("main").innerHTML = `

                <div class="header">
                    <h1>Dashboard</h1>
                    <p>Selamat datang ke FPB Duty System</p>
                </div>

                <div class="cards">

                    <div class="card">
                        <h3>Jumlah Anggota</h3>
                        <div class="number">${anggota.length}</div>
                    </div>

                    <div class="card">
                        <h3>Duty Hari Ini</h3>
                        <div class="number">0</div>
                    </div>

                    <div class="card">
                        <h3>Kod Duty</h3>
                        <div class="number">0</div>
                    </div>

                    <div class="card">
                        <h3>Laporan</h3>
                        <div class="number">0</div>
                    </div>

                </div>
            `;
        }

        function paparAnggota() {

            let rows = "";

            anggota.forEach((a, index) => {

                rows += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${a.nama}</td>
                        <td>${a.noBadan}</td>
                        <td>${a.pangkat}</td>
                        <td>
                            <button class="delete" onclick="padamAnggota(${index})">
                                Padam
                            </button>
                        </td>
                    </tr>
                `;

            });

            document.getElementById("main").innerHTML = `

                <div class="header">
                    <h1>Senarai Anggota</h1>
                    <p>Pengurusan data anggota FPB</p>
                </div>

                <div class="content">

                    <h2>Tambah Anggota</h2>

                    <input id="nama" placeholder="Nama Anggota">

                    <input id="noBadan" placeholder="No. Badan">

                    <input id="pangkat" placeholder="Pangkat">

                    <button onclick="tambahAnggota()">
                        + Tambah Anggota
                    </button>

                </div>

                <div class="content">

                    <h2>Senarai Anggota (${anggota.length})</h2>

                    <table>

                        <thead>
                            <tr>
                                <th>Bil</th>
                                <th>Nama</th>
                                <th>No. Badan</th>
                                <th>Pangkat</th>
                                <th>Tindakan</th>
                            </tr>
                        </thead>

                        <tbody>
                            ${rows}
                        </tbody>

                    </table>

                </div>
            `;
        }

        function tambahAnggota() {

            let nama = document.getElementById("nama").value;
            let noBadan = document.getElementById("noBadan").value;
            let pangkat = document.getElementById("pangkat").value;

            if (nama === "" || noBadan === "") {

                alert("Sila isi Nama dan No. Badan");

                return;
            }

            anggota.push({

                nama: nama,
                noBadan: noBadan,
                pangkat: pangkat

            });

            localStorage.setItem("anggota", JSON.stringify(anggota));

            paparAnggota();

        }

        function padamAnggota(index) {

            if (confirm("Padam anggota ini?")) {

                anggota.splice(index, 1);

                localStorage.setItem("anggota", JSON.stringify(anggota));

                paparAnggota();

            }

        }

    </script>

</body>
</html>
