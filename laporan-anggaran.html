<script>

// =====================================================
// SENARAI BULAN
// =====================================================

const SENARAI_BULAN = [

    "",

    "Januari",

    "Februari",

    "Mac",

    "April",

    "Mei",

    "Jun",

    "Julai",

    "Ogos",

    "September",

    "Oktober",

    "November",

    "Disember"

];


// =====================================================
// APABILA HALAMAN DIBUKA
// =====================================================

document.addEventListener(

    "DOMContentLoaded",

    async function () {


        const tahunSelect =

            document.getElementById(

                "tahun"

            );


        if (tahunSelect) {

            tahunSelect.value =

                new Date()

                    .getFullYear()

                    .toString();

        }


        await isiSenaraiPos();


    }

);


// =====================================================
// PAPAR MESEJ
// =====================================================

function paparMesej(

    mesej,

    jenis = "success"

) {


    const elemen =

        document.getElementById(

            "mesej"

        );


    if (!elemen) return;


    elemen.className =

        "mesej " + jenis;


    elemen.textContent =

        mesej;


    setTimeout(

        function () {


            elemen.textContent = "";


            elemen.className =

                "mesej";


        },

        5000

    );

}


// =====================================================
// ISI DROPDOWN POS
// AMBIL TERUS DARIPADA Data_Anggota
// =====================================================

async function isiSenaraiPos() {


    const selectPos =

        document.getElementById(

            "pos"

        );


    if (!selectPos) {


        console.error(

            "Dropdown POS tidak dijumpai."

        );


        return;

    }


    selectPos.innerHTML = `

        <option value="">

            -- Sedang mengambil senarai Pos --

        </option>

    `;


    try {


        const result =

            await supabaseClient

                .from(

                    "Data_Anggota"

                )

                .select(

                    "pos"

                );


        if (

            result.error

        ) {


            console.error(

                "RALAT AMBIL POS:",

                result.error

            );


            selectPos.innerHTML = `

                <option value="">

                    -- Gagal mengambil Pos --

                </option>

            `;


            paparMesej(

                result.error.message,

                "error"

            );


            return;

        }


        const data =

            result.data || [];


        const senaraiPos = [


            ...

            new Set(


                data

                    .map(

                        function (

                            row

                        ) {


                            return row.pos;

                        }

                    )

                    .filter(

                        function (

                            pos

                        ) {


                            return (

                                pos !== null &&

                                pos !== undefined &&

                                String(

                                    pos

                                ).trim() !== ""

                            );

                        }

                    )

            )


        ];


        senaraiPos.sort(

            function (

                a,

                b

            ) {


                return String(

                    a

                ).localeCompare(

                    String(

                        b

                    ),

                    "ms",

                    {

                        numeric: true

                    }

                );

            }

        );


        selectPos.innerHTML = `

            <option value="">

                -- Pilih Pos --

            </option>

        `;


        senaraiPos.forEach(

            function (

                pos

            ) {


                const option =

                    document.createElement(

                        "option"

                    );


                option.value =

                    String(

                        pos

                    );


                option.textContent =

                    String(

                        pos

                    );


                selectPos.appendChild(

                    option

                );

            }

        );


        console.log(

            "SENARAI POS DARI Data_Anggota:",

            senaraiPos

        );


    }

    catch (

        error

    ) {


        console.error(

            "RALAT SISTEM AMBIL POS:",

            error

        );


        selectPos.innerHTML = `

            <option value="">

                -- Gagal mengambil Pos --

            </option>

        `;


        paparMesej(

            error.message,

            "error"

        );

    }

}


// =====================================================
// JANA LAPORAN
// =====================================================

async function janaLaporanAnggaran() {


    const bulan =

        parseInt(

            document

                .getElementById(

                    "bulan"

                )

                .value,

            10

        );


    const tahun =

        parseInt(

            document

                .getElementById(

                    "tahun"

                )

                .value,

            10

        );


    const pos =

        document

            .getElementById(

                "pos"

            )

            .value;


    const tbody =

        document.getElementById(

            "senaraiAnggaran"

        );


    const tfoot =

        document.getElementById(

            "jumlahAnggaran"

        );


    if (!pos) {


        paparMesej(

            "Sila pilih Pos terlebih dahulu.",

            "error"

        );


        return;

    }


    tbody.innerHTML = `

        <tr>

            <td colspan="15">

                Sedang mengambil data...

            </td>

        </tr>

    `;


    tfoot.innerHTML = "";


    document

        .getElementById(

            "tajukUnit"

        )

        .textContent =

        "WILAYAH TERENGGANU";


    document

        .getElementById(

            "tajukBulan"

        )

        .textContent =

        SENARAI_BULAN[bulan]

        +

        " "

        +

        tahun;


    document

        .getElementById(

            "tajukPos"

        )

        .textContent =

        pos;


    try {


        // =================================================
        // AMBIL DATA DUTY MENGIKUT BULAN / TAHUN / POS
        // =================================================

        const dutyResult =

            await supabaseClient

                .from(

                    "jadual_duty"

                )

                .select(`

                    tarikh,

                    bulan,

                    tahun,

                    no_skb,

                    kod_duty,

                    waktu_tugasan,

                    jam_kerja,

                    jam_klm,

                    pos

                `)

                .eq(

                    "bulan",

                    bulan

                )

                .eq(

                    "tahun",

                    tahun

                )

                .eq(

                    "pos",

                    pos

                )

                .order(

                    "tarikh",

                    {

                        ascending: true

                    }

                );


        if (

            dutyResult.error

        ) {


            throw dutyResult.error;

        }


        const dataDuty =

            dutyResult.data || [];


        if (

            dataDuty.length === 0

        ) {


            tbody.innerHTML = `

                <tr>

                    <td colspan="15">

                        Tiada data duty bagi

                        ${pos}

                        -

                        ${SENARAI_BULAN[bulan]}

                        ${tahun}

                    </td>

                </tr>

            `;


            return;

        }


        // =================================================
        // NO SKB UNIK
        // =================================================

        const senaraiNoSkb = [


            ...

            new Set(


                dataDuty

                    .map(

                        function (

                            row

                        ) {


                            return row.no_skb;

                        }

                    )

                    .filter(

                        function (

                            no

                        ) {


                            return (

                                no !== null &&

                                no !== undefined

                            );

                        }

                    )

            )

        ];


        if (

            senaraiNoSkb.length === 0

        ) {


            tbody.innerHTML = `

                <tr>

                    <td colspan="15">

                        Tiada no_skb dalam jadual_duty.

                    </td>

                </tr>

            `;


            return;

        }


        // =================================================
        // AMBIL DATA ANGGOTA
        // =================================================

        const anggotaResult =

            await supabaseClient

                .from(

                    "Data_Anggota"

                )

                .select(`

                    no_skb,

                    no_anggota,

                    nama,

                    gaji_pokok,

                    pos,

                    unit

                `)

                .in(

                    "no_skb",

                    senaraiNoSkb

                );


        if (

            anggotaResult.error

        ) {


            throw anggotaResult.error;

        }


        const dataAnggota =

            anggotaResult.data || [];


        // =================================================
        // MAP ANGGOTA
        // =================================================

        const mapAnggota =

            new Map();


        dataAnggota.forEach(

            function (

                anggota

            ) {


                mapAnggota.set(

                    String(

                        anggota.no_skb

                    ),

                    anggota

                );

            }

        );


        // =================================================
        // KUMPUL DUTY MENGIKUT ANGGOTA
        // =================================================

        const kumpulan =

            new Map();


        dataDuty.forEach(

            function (

                duty

            ) {


                const key =

                    String(

                        duty.no_skb

                    );


                const anggota =

                    mapAnggota.get(

                        key

                    );


                if (!anggota) {


                    console.warn(

                        "Anggota tidak dijumpai:",

                        duty.no_skb

                    );


                    return;

                }


                if (

                    !kumpulan.has(

                        key

                    )

                ) {


                    kumpulan.set(

                        key,

                        {

                            anggota: anggota,

                            duty: []

                        }

                    );

                }


                kumpulan

                    .get(

                        key

                    )

                    .duty

                    .push(

                        duty

                    );

            }

        );


        // =================================================
        // PAPAR TABLE
        // =================================================

        tbody.innerHTML = "";


        let bil = 1;


        let jumlahJam = 0;


        let jumlahKlm = 0;


        kumpulan.forEach(

            function (

                item

            ) {


                const anggota =

                    item.anggota;


                const duty =

                    item.duty;


                const jam =

                    duty.reduce(

                        function (

                            total,

                            row

                        ) {


                            return total

                                +

                                (

                                    parseFloat(

                                        row.jam_kerja

                                    )

                                    || 0

                                );

                        },

                        0

                    );


                const klm =

                    duty.reduce(

                        function (

                            total,

                            row

                        ) {


                            return total

                                +

                                (

                                    parseFloat(

                                        row.jam_klm

                                    )

                                    || 0

                                );

                        },

                        0

                    );


                jumlahJam +=

                    jam;


                jumlahKlm +=

                    klm;


                const tr =

                    document.createElement(

                        "tr"

                    );


                tr.innerHTML = `

                    <td>

                        ${bil}

                    </td>


                    <td>

                        ${anggota.no_skb || ""}

                    </td>


                    <td class="left">

                        ${anggota.nama || ""}

                    </td>


                    <td class="amount">

                        ${formatRM(

                            anggota.gaji_pokok

                        )}

                    </td>


                    <td>

                        ${jam.toFixed(

                            2

                        )}

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <td>

                        0

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <td>

                        0

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <td>

                        0

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <td>

                        0

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <td>

                        ${klm.toFixed(

                            2

                        )}

                    </td>

                `;


                tbody.appendChild(

                    tr

                );


                bil++;


            }

        );


        // =================================================
        // JUMLAH KESELURUHAN
        // =================================================

        tfoot.innerHTML = `

            <tr class="total-row">


                <td colspan="4">

                    JUMLAH KESELURUHAN

                </td>


                <td>

                    ${jumlahJam.toFixed(

                        2

                    )}

                </td>


                <td>

                    -

                </td>


                <td colspan="8">

                    -

                </td>


                <td>

                    ${jumlahKlm.toFixed(

                        2

                    )}

                </td>


            </tr>

        `;


        paparMesej(

            "Laporan berjaya dijana.",

            "success"

        );


    }

    catch (

        error

    ) {


        console.error(

            "RALAT JANA LAPORAN:",

            error

        );


        tbody.innerHTML = `

            <tr>

                <td colspan="15">

                    ${error.message}

                </td>

            </tr>

        `;


        paparMesej(

            error.message,

            "error"

        );

    }

}


// =====================================================
// FORMAT RM
// =====================================================

function formatRM(

    nilai

) {


    const nombor =

        parseFloat(

            nilai

        )

        || 0;


    return nombor.toLocaleString(

        "ms-MY",

        {

            minimumFractionDigits: 2,

            maximumFractionDigits: 2

        }

    );

}

</script>
