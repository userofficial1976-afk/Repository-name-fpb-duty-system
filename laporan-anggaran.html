<script>

// =====================================================
// SENARAI BULAN
// =====================================================

const SENARAI_BULAN = [

    "",

    "Januari",

    "Februari",

    "Mac",

    "April",

    "Mei",

    "Jun",

    "Julai",

    "Ogos",

    "September",

    "Oktober",

    "November",

    "Disember"

];


// =====================================================
// APABILA HALAMAN DIBUKA
// =====================================================

document.addEventListener(

    "DOMContentLoaded",

    async function () {

        const tahunSelect =

            document.getElementById(

                "tahun"

            );


        if (tahunSelect) {

            const tahunSekarang =

                new Date()

                    .getFullYear()

                    .toString();


            const wujud =

                Array.from(

                    tahunSelect.options

                ).some(

                    function (option) {

                        return option.value ===

                            tahunSekarang;

                    }

                );


            if (wujud) {

                tahunSelect.value =

                    tahunSekarang;

            }

        }


        await isiSenaraiPos();


        const bulan =

            document.getElementById(

                "bulan"

            );


        const tahun =

            document.getElementById(

                "tahun"

            );


        if (bulan) {

            bulan.addEventListener(

                "change",

                function () {

                    resetLaporan();

                }

            );

        }


        if (tahun) {

            tahun.addEventListener(

                "change",

                function () {

                    resetLaporan();

                }

            );

        }

    }

);


// =====================================================
// PAPAR MESEJ
// =====================================================

function paparMesej(

    mesej,

    jenis = "success"

) {

    const elemen =

        document.getElementById(

            "mesej"

        );


    if (!elemen) return;


    elemen.className =

        "mesej " + jenis;


    elemen.textContent =

        mesej;


    setTimeout(

        function () {

            elemen.textContent = "";

            elemen.className = "mesej";

        },

        5000

    );

}


// =====================================================
// RESET LAPORAN
// =====================================================

function resetLaporan() {

    const tbody =

        document.getElementById(

            "senaraiAnggaran"

        );


    const tfoot =

        document.getElementById(

            "jumlahAnggaran"

        );


    if (tbody) {

        tbody.innerHTML = `

            <tr>

                <td colspan="15">

                    Sila pilih Pos dan Bulan / Tahun

                    kemudian tekan JANA LAPORAN

                </td>

            </tr>

        `;

    }


    if (tfoot) {

        tfoot.innerHTML = "";

    }

}


// =====================================================
// ISI DROPDOWN POS
// AMBIL TERUS DARIPADA Data_Anggota
// =====================================================

async function isiSenaraiPos() {

    const selectPos =

        document.getElementById(

            "pos"

        );


    if (!selectPos) {

        console.error(

            "Dropdown Pos tidak dijumpai."

        );

        return;

    }


    selectPos.innerHTML = `

        <option value="">

            -- Sedang mengambil Pos --

        </option>

    `;


    try {

        const result =

            await supabaseClient

                .from(

                    "Data_Anggota"

                )

                .select(

                    "pos"

                );


        if (result.error) {

            console.error(

                "RALAT AMBIL POS:",

                result.error

            );


            selectPos.innerHTML = `

                <option value="">

                    -- Gagal Ambil Pos --

                </option>

            `;


            paparMesej(

                result.error.message,

                "error"

            );


            return;

        }


        const data =

            result.data || [];


        const senaraiPos = [

            ...

            new Set(

                data

                    .map(

                        function (row) {

                            return row.pos;

                        }

                    )

                    .filter(

                        function (pos) {

                            return pos !== null &&

                                pos !== undefined &&

                                String(

                                    pos

                                ).trim() !== "";

                        }

                    )

                    .map(

                        function (pos) {

                            return String(

                                pos

                            ).trim();

                        }

                    )

            )

        ];


        senaraiPos.sort(

            function (

                a,

                b

            ) {

                return String(

                    a

                ).localeCompare(

                    String(

                        b

                    ),

                    "ms",

                    {

                        numeric: true

                    }

                );

            }

        );


        selectPos.innerHTML = `

            <option value="">

                -- Pilih Pos --

            </option>

        `;


        senaraiPos.forEach(

            function (

                pos

            ) {

                const option =

                    document.createElement(

                        "option"

                    );


                option.value =

                    pos;


                option.textContent =

                    pos;


                selectPos.appendChild(

                    option

                );

            }

        );


        console.log(

            "SENARAI POS:",

            senaraiPos

        );

    }

    catch (error) {

        console.error(

            "RALAT SISTEM AMBIL POS:",

            error

        );


        selectPos.innerHTML = `

            <option value="">

                -- Gagal Ambil Pos --

            </option>

        `;


        paparMesej(

            error.message,

            "error"

        );

    }

}


// =====================================================
// JANA LAPORAN ANGGARAN
// =====================================================

async function janaLaporanAnggaran() {

    const bulanElement =

        document.getElementById(

            "bulan"

        );


    const tahunElement =

        document.getElementById(

            "tahun"

        );


    const posElement =

        document.getElementById(

            "pos"

        );


    const tbody =

        document.getElementById(

            "senaraiAnggaran"

        );


    const tfoot =

        document.getElementById(

            "jumlahAnggaran"

        );


    if (

        !bulanElement ||

        !tahunElement ||

        !posElement ||

        !tbody ||

        !tfoot

    ) {

        alert(

            "Elemen laporan tidak lengkap."

        );

        return;

    }


    const bulan =

        parseInt(

            bulanElement.value,

            10

        );


    const tahun =

        parseInt(

            tahunElement.value,

            10

        );


    const pos =

        String(

            posElement.value

        ).trim();


    if (!pos) {

        paparMesej(

            "Sila pilih Pos terlebih dahulu.",

            "error"

        );

        return;

    }


    tbody.innerHTML = `

        <tr>

            <td colspan="15">

                Sedang mengambil data...

            </td>

        </tr>

    `;


    tfoot.innerHTML = "";


    document

        .getElementById(

            "tajukUnit"

        )

        .textContent =

        "WILAYAH TERENGGANU";


    document

        .getElementById(

            "tajukBulan"

        )

        .textContent =

        SENARAI_BULAN[bulan]

        + " "

        + tahun;


    document

        .getElementById(

            "tajukPos"

        )

        .textContent =

        pos;


    try {


        // =================================================
        // 1. AMBIL SEMUA ANGGOTA BAGI POS
        // =================================================

        const anggotaResult =

            await supabaseClient

                .from(

                    "Data_Anggota"

                )

                .select(`

                    no_skb,

                    no_anggota,

                    nama,

                    gaji_pokok,

                    pos,

                    unit

                `)

                .eq(

                    "pos",

                    pos

                );


        if (anggotaResult.error) {

            throw anggotaResult.error;

        }


        const dataAnggota =

            anggotaResult.data || [];


        console.log(

            "ANGGOTA BAGI POS:",

            pos,

            dataAnggota

        );


        if (

            dataAnggota.length === 0

        ) {

            tbody.innerHTML = `

                <tr>

                    <td colspan="15">

                        Tiada anggota dijumpai bagi Pos:

                        <strong>

                            ${escapeHTML(pos)}

                        </strong>

                    </td>

                </tr>

            `;


            return;

        }


        // =================================================
        // 2. AMBIL SEMUA DUTY BULAN / TAHUN / POS
        // =================================================

        const dutyResult =

            await supabaseClient

                .from(

                    "jadual_duty"

                )

                .select(`

                    tarikh,

                    bulan,

                    tahun,

                    no_skb,

                    kod_duty,

                    waktu_tugasan,

                    jam_kerja,

                    jam_klm,

                    hari_off_bertugas,

                    jam_off_bertugas,

                    hari_cutiam_bertugas,

                    jam_cutiam_bertugas,

                    pos

                `)

                .eq(

                    "bulan",

                    bulan

                )

                .eq(

                    "tahun",

                    tahun

                )

                .eq(

                    "pos",

                    pos

                );


        if (dutyResult.error) {

            throw dutyResult.error;

        }


        const dataDuty =

            dutyResult.data || [];


        console.log(

            "SEMUA DATA DUTY:",

            dataDuty

        );


        // =================================================
        // 3. MAP DATA DUTY MENGIKUT no_skb
        // =================================================

        const mapDuty =

            new Map();


        dataDuty.forEach(

            function (

                duty

            ) {

                const key =

                    String(

                        duty.no_skb

                    );


                if (

                    !mapDuty.has(

                        key

                    )

                ) {

                    mapDuty.set(

                        key,

                        []

                    );

                }


                mapDuty

                    .get(

                        key

                    )

                    .push(

                        duty

                    );

            }

        );


        // =================================================
        // 4. PAPAR DATA ANGGOTA
        // =================================================

        tbody.innerHTML = "";


        let bil = 1;


        let jumlahJamBiasa = 0;


        let jumlahHariOff = 0;


        let jumlahJamOff = 0;


        let jumlahHariCutiAm = 0;


        let jumlahJamCutiAm = 0;


        dataAnggota.forEach(

            function (

                anggota

            ) {


                const key =

                    String(

                        anggota.no_skb

                    );


                const dutyAnggota =

                    mapDuty.get(

                        key

                    ) || [];


                // =========================================
                // HARI BIASA — JAM
                // jumlah jam_klm
                // =========================================

                const jamBiasa =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {

                            return jumlah +

                                toNumber(

                                    duty.jam_klm

                                );

                        },

                        0

                    );


                // =========================================
                // HARI OFF 4–8 JAM
                // hari_off_bertugas
                // =========================================

                const hariOff =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {

                            return jumlah +

                                toNumber(

                                    duty.hari_off_bertugas

                                );

                        },

                        0

                    );


                // =========================================
                // HARI OFF > 8 JAM
                // jam_off_bertugas
                // =========================================

                const jamOff =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {

                            return jumlah +

                                toNumber(

                                    duty.jam_off_bertugas

                                );

                        },

                        0

                    );


                // =========================================
                // CUTI AM < 8 JAM
                // hari_cutiam_bertugas
                // =========================================

                const hariCutiAm =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {

                            return jumlah +

                                toNumber(

                                    duty.hari_cutiam_bertugas

                                );

                        },

                        0

                    );


                // =========================================
                // CUTI AM > 8 JAM
                // jam_cutiam_bertugas
                // =========================================

                const jamCutiAm =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {

                            return jumlah +

                                toNumber(

                                    duty.jam_cutiam_bertugas

                                );

                        },

                        0

                    );


                jumlahJamBiasa +=

                    jamBiasa;


                jumlahHariOff +=

                    hariOff;


                jumlahJamOff +=

                    jamOff;


                jumlahHariCutiAm +=

                    hariCutiAm;


                jumlahJamCutiAm +=

                    jamCutiAm;


                const tr =

                    document.createElement(

                        "tr"

                    );


                tr.innerHTML = `

                    <td>

                        ${bil}

                    </td>


                    <td>

                        ${escapeHTML(

                            anggota.no_skb

                        )}

                    </td>


                    <td class="left">

                        ${escapeHTML(

                            anggota.nama

                        )}

                    </td>


                    <td class="amount">

                        ${formatRM(

                            anggota.gaji_pokok

                        )}

                    </td>


                    <!-- HARI BIASA -->

                    <td>

                        ${formatNumber(

                            jamBiasa

                        )}

                    </td>


                    <td class="amount">

                        -

                    </td>


                    <!-- OFF < 4 JAM -->

                    <td>

                        -

                    </td>


                    <td class="amount">

                        -

                    </td>


                    <!-- OFF 4-8 JAM -->

                    <td>

                        ${formatNumber(

                            hariOff

                        )}

                    </td>


                    <td class="amount">

                        -

                    </td>


                    <!-- OFF > 8 JAM -->

                    <td>

                        ${formatNumber(

                            jamOff

                        )}

                    </td>


                    <td class="amount">

                        -

                    </td>


                    <!-- CUTI AM < 8 JAM -->

                    <td>

                        ${formatNumber(

                            hariCutiAm

                        )}

                    </td>


                    <td class="amount">

                        -

                    </td>


                    <!-- CUTI AM > 8 JAM -->

                    <td>

                        ${formatNumber(

                            jamCutiAm

                        )}

                    </td>


                `;


                tbody.appendChild(

                    tr

                );


                bil++;

            }

        );


        // =================================================
        // 5. JUMLAH KESELURUHAN
        // JUMLAH TUNTUTAN KLM KOSONG DAHULU
        // =================================================

        tfoot.innerHTML = `

            <tr class="total-row">


                <td colspan="4">

                    JUMLAH KESELURUHAN

                </td>


                <td>

                    ${formatNumber(

                        jumlahJamBiasa

                    )}

                </td>


                <td>

                    -

                </td>


                <td>

                    -

                </td>


                <td>

                    -

                </td>


                <td>

                    ${formatNumber(

                        jumlahHariOff

                    )}

                </td>


                <td>

                    -

                </td>


                <td>

                    ${formatNumber(

                        jumlahJamOff

                    )}

                </td>


                <td>

                    -

                </td>


                <td>

                    ${formatNumber(

                        jumlahHariCutiAm

                    )}

                </td>


                <td>

                    -

                </td>


                <td>

                    ${formatNumber(

                        jumlahJamCutiAm

                    )}

                </td>


            </tr>

        `;


        if (

            dataDuty.length === 0

        ) {

            paparMesej(

                "Anggota dijumpai, tetapi tiada data duty bagi bulan / tahun / pos yang dipilih.",

                "error"

            );

        }

        else {

            paparMesej(

                "Laporan berjaya dijana.",

                "success"

            );

        }

    }


    catch (error) {

        console.error(

            "RALAT JANA LAPORAN:",

            error

        );


        tbody.innerHTML = `

            <tr>

                <td colspan="15">

                    ${escapeHTML(

                        error.message

                    )}

                </td>

            </tr>

        `;


        paparMesej(

            error.message,

            "error"

        );

    }

}


// =====================================================
// CONVERT NILAI KE NOMBOR
// =====================================================

function toNumber(

    nilai

) {

    if (

        nilai === null ||

        nilai === undefined ||

        nilai === ""

    ) {

        return 0;

    }


    const nombor =

        parseFloat(

            String(

                nilai

            ).replace(

                ",",

                ""

            )

        );


    return isNaN(

        nombor

    )

        ? 0

        : nombor;

}


// =====================================================
// FORMAT NOMBOR
// =====================================================

function formatNumber(

    nilai

) {

    return toNumber(

        nilai

    ).toLocaleString(

        "ms-MY",

        {

            minimumFractionDigits: 2,

            maximumFractionDigits: 2

        }

    );

}


// =====================================================
// FORMAT RM
// =====================================================

function formatRM(

    nilai

) {

    return toNumber(

        nilai

    ).toLocaleString(

        "ms-MY",

        {

            minimumFractionDigits: 2,

            maximumFractionDigits: 2

        }

    );

}


// =====================================================
// ELAK HTML ROSAK
// =====================================================

function escapeHTML(

    nilai

) {

    if (

        nilai === null ||

        nilai === undefined

    ) {

        return "";

    }


    return String(

        nilai

    )

        .replace(

            /&/g,

            "&amp;"

        )

        .replace(

            /</g,

            "&lt;"

        )

        .replace(

            />/g,

            "&gt;"

        )

        .replace(

            /"/g,

            "&quot;"

        )

        .replace(

            /'/g,

            "&#039;"

        );

}

</script>
