<script>

/* =====================================================
   SENARAI BULAN
===================================================== */

const SENARAI_BULAN = [

    "",

    "Januari",

    "Februari",

    "Mac",

    "April",

    "Mei",

    "Jun",

    "Julai",

    "Ogos",

    "September",

    "Oktober",

    "November",

    "Disember"

];


/* =====================================================
   APABILA HALAMAN SIAP
===================================================== */

window.addEventListener(

    "load",

    async function () {

        console.log(
            "HALAMAN SIAP"
        );


        const tahun =

            document.getElementById(
                "tahun"
            );


        if (tahun) {

            const tahunSekarang =

                String(

                    new Date()
                        .getFullYear()

                );


            const wujud =

                Array.from(

                    tahun.options

                ).some(

                    function (option) {

                        return (

                            option.value ===

                            tahunSekarang

                        );

                    }

                );


            if (wujud) {

                tahun.value =

                    tahunSekarang;

            }

        }


        await isiSenaraiPos();

    }

);


/* =====================================================
   PAPAR MESEJ
===================================================== */

function paparMesej(

    mesej,

    jenis = "success"

) {

    const elemen =

        document.getElementById(
            "mesej"
        );


    if (!elemen) {

        console.log(
            mesej
        );

        return;

    }


    elemen.className =

        "mesej " +

        jenis;


    elemen.textContent =

        mesej;


    setTimeout(

        function () {

            elemen.textContent = "";

            elemen.className =
                "mesej";

        },

        5000

    );

}


/* =====================================================
   ISI DROPDOWN POS
   DARIPADA Data_Anggota
===================================================== */

async function isiSenaraiPos() {

    console.log(
        "MULA ISI SENARAI POS"
    );


    const selectPos =

        document.getElementById(
            "pos"
        );


    if (!selectPos) {

        console.error(

            "Dropdown Pos tidak dijumpai dalam HTML."

        );

        return;

    }


    selectPos.innerHTML = `

        <option value="">

            -- Sedang mengambil Pos --

        </option>

    `;


    try {

        const result =

            await supabaseClient

                .from(

                    "Data_Anggota"

                )

                .select(

                    "pos"

                );


        console.log(

            "HASIL DATA POS:",

            result

        );


        if (result.error) {

            throw result.error;

        }


        const data =

            result.data || [];


        const setPos =

            new Set();


        data.forEach(

            function (row) {

                if (

                    row.pos !== null &&

                    row.pos !== undefined &&

                    String(

                        row.pos

                    ).trim() !== ""

                ) {

                    setPos.add(

                        String(

                            row.pos

                        ).trim()

                    );

                }

            }

        );


        const senaraiPos =

            Array.from(

                setPos

            );


        senaraiPos.sort(

            function (

                a,

                b

            ) {

                return a.localeCompare(

                    b,

                    "ms",

                    {

                        numeric: true

                    }

                );

            }

        );


        selectPos.innerHTML = `

            <option value="">

                -- Pilih Pos --

            </option>

        `;


        senaraiPos.forEach(

            function (pos) {

                const option =

                    document.createElement(

                        "option"

                    );


                option.value =

                    pos;


                option.textContent =

                    pos;


                selectPos.appendChild(

                    option

                );

            }

        );


        console.log(

            "JUMLAH POS:",

            senaraiPos.length

        );


        console.log(

            "SENARAI POS:",

            senaraiPos

        );

    }


    catch (error) {

        console.error(

            "RALAT AMBIL POS:",

            error

        );


        selectPos.innerHTML = `

            <option value="">

                -- Gagal Ambil Pos --

            </option>

        `;


        paparMesej(

            error.message,

            "error"

        );

    }

}


/* =====================================================
   JANA LAPORAN ANGGARAN
===================================================== */

async function janaLaporanAnggaran() {


    const bulanElement =

        document.getElementById(
            "bulan"
        );


    const tahunElement =

        document.getElementById(
            "tahun"
        );


    const posElement =

        document.getElementById(
            "pos"
        );


    const tbody =

        document.getElementById(
            "senaraiAnggaran"
        );


    const tfoot =

        document.getElementById(
            "jumlahAnggaran"
        );


    if (

        !bulanElement ||

        !tahunElement ||

        !posElement ||

        !tbody ||

        !tfoot

    ) {

        console.error(

            "ELEMEN HTML LAPORAN TIDAK LENGKAP"

        );

        return;

    }


    const bulan =

        parseInt(

            bulanElement.value,

            10

        );


    const tahun =

        parseInt(

            tahunElement.value,

            10

        );


    const pos =

        String(

            posElement.value

        ).trim();


    if (!pos) {

        paparMesej(

            "Sila pilih Pos terlebih dahulu.",

            "error"

        );

        return;

    }


    tbody.innerHTML = `

        <tr>

            <td colspan="15">

                Sedang mengambil data...

            </td>

        </tr>

    `;


    tfoot.innerHTML = "";


    const tajukUnit =

        document.getElementById(
            "tajukUnit"
        );


    const tajukBulan =

        document.getElementById(
            "tajukBulan"
        );


    const tajukPos =

        document.getElementById(
            "tajukPos"
        );


    if (tajukUnit) {

        tajukUnit.textContent =

            "WILAYAH TERENGGANU";

    }


    if (tajukBulan) {

        tajukBulan.textContent =

            SENARAI_BULAN[bulan]

            + " "

            + tahun;

    }


    if (tajukPos) {

        tajukPos.textContent =

            pos;

    }


    try {


        /* =============================================
           1. AMBIL ANGGOTA MENGIKUT POS
        ============================================= */

        const anggotaResult =

            await supabaseClient

                .from(

                    "Data_Anggota"

                )

                .select(

                    `

                    no_skb,

                    no_anggota,

                    nama,

                    gaji_pokok,

                    pos,

                    unit

                    `

                )

                .eq(

                    "pos",

                    pos

                );


        console.log(

            "DATA ANGGOTA:",

            anggotaResult

        );


        if (anggotaResult.error) {

            throw anggotaResult.error;

        }


        const dataAnggota =

            anggotaResult.data || [];


        if (

            dataAnggota.length === 0

        ) {

            tbody.innerHTML = `

                <tr>

                    <td colspan="15">

                        Tiada anggota dijumpai bagi Pos:

                        ${pos}

                    </td>

                </tr>

            `;


            paparMesej(

                "Tiada anggota dijumpai bagi Pos yang dipilih.",

                "error"

            );


            return;

        }


        /* =============================================
           2. DAPATKAN SENARAI NO SKB
        ============================================= */

        const senaraiNoSkb =

            dataAnggota

                .map(

                    function (anggota) {

                        return anggota.no_skb;

                    }

                )

                .filter(

                    function (no) {

                        return (

                            no !== null &&

                            no !== undefined &&

                            String(

                                no

                            ).trim() !== ""

                        );

                    }

                );


        console.log(

            "SENARAI NO SKB:",

            senaraiNoSkb

        );


        /* =============================================
           3. AMBIL DATA DUTY
        ============================================= */

        let dataDuty = [];


        if (

            senaraiNoSkb.length > 0

        ) {

            const dutyResult =

                await supabaseClient

                    .from(

                        "jadual_duty"

                    )

                    .select(

                        `

                        tarikh,

                        bulan,

                        tahun,

                        no_skb,

                        kod_duty,

                        waktu_tugasan,

                        jam_kerja,

                        jam_klm,

                        pos,

                        hari_offday_bertugas,

                        jam_offday_bertugas,

                        hari_cutiam_bertugas,

                        jam_cutiam_bertugas

                        `

                    )

                    .eq(

                        "bulan",

                        bulan

                    )

                    .eq(

                        "tahun",

                        tahun

                    )

                    .in(

                        "no_skb",

                        senaraiNoSkb

                    );


            console.log(

                "DATA DUTY:",

                dutyResult

            );


            if (dutyResult.error) {

                throw dutyResult.error;

            }


            dataDuty =

                dutyResult.data || [];

        }


        /* =============================================
           4. KUMPUL DUTY MENGIKUT NO SKB
        ============================================= */

        const mapDuty =

            new Map();


        dataDuty.forEach(

            function (duty) {

                const key =

                    String(

                        duty.no_skb

                    );


                if (

                    !mapDuty.has(

                        key

                    )

                ) {

                    mapDuty.set(

                        key,

                        []

                    );

                }


                mapDuty

                    .get(

                        key

                    )

                    .push(

                        duty

                    );

            }

        );


        /* =============================================
           5. PEMBOLEHUBAH JUMLAH
        ============================================= */

        let jumlahJamBiasa = 0;

        let jumlahHariOffKurang4 = 0;

        let jumlahHariOff4hingga8 = 0;

        let jumlahHariOffLebih8 = 0;

        let jumlahCutiAmKurang8 = 0;

        let jumlahCutiAmLebih8 = 0;

        let jumlahKlm = 0;


        tbody.innerHTML = "";


        let bil = 1;


        /* =============================================
           6. PAPAR SETIAP ANGGOTA
        ============================================= */

        dataAnggota.forEach(

            function (anggota) {


                const key =

                    String(

                        anggota.no_skb

                    );


                const dutyAnggota =

                    mapDuty.get(

                        key

                    ) || [];


                const jamBiasa =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {

                            return (

                                jumlah +

                                toNumber(

                                    duty.jam_kerja

                                )

                            );

                        },

                        0

                    );


                const jamKlm =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {

                            return (

                                jumlah +

                                toNumber(

                                    duty.jam_klm

                                )

                            );

                        },

                        0

                    );


                const hariOff =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {

                            return (

                                jumlah +

                                toNumber(

                                    duty.hari_offday_bertugas

                                )

                            );

                        },

                        0

                    );


                const jamOff =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {

                            return (

                                jumlah +

                                toNumber(

                                    duty.jam_offday_bertugas

                                )

                            );

                        },

                        0

                    );


                const hariCutiAm =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {

                            return (

                                jumlah +

                                toNumber(

                                    duty.hari_cutiam_bertugas

                                )

                            );

                        },

                        0

                    );


                const jamCutiAm =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {

                            return (

                                jumlah +

                                toNumber(

                                    duty.jam_cutiam_bertugas

                                )

                            );

                        },

                        0

                    );


                jumlahJamBiasa +=

                    jamBiasa;


                jumlahHariOff4hingga8 +=

                    hariOff;


                jumlahHariOffLebih8 +=

                    jamOff;


                jumlahCutiAmKurang8 +=

                    hariCutiAm;


                jumlahCutiAmLebih8 +=

                    jamCutiAm;


                jumlahKlm +=

                    jamKlm;


                const tr =

                    document.createElement(

                        "tr"

                    );


                tr.innerHTML = `

                    <td>

                        ${bil}

                    </td>


                    <td>

                        ${anggota.no_skb || ""}

                    </td>


                    <td class="left">

                        ${anggota.nama || ""}

                    </td>


                    <td class="amount">

                        ${formatRM(

                            anggota.gaji_pokok

                        )}

                    </td>


                    <!-- HARI BIASA -->

                    <td>

                        ${formatNumber(

                            jamBiasa

                        )}

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <!-- HARI OFF < 4 JAM -->

                    <td>

                        ${formatNumber(

                            jumlahHariOffKurang4

                        )}

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <!-- HARI OFF 4-8 JAM -->

                    <td>

                        ${formatNumber(

                            hariOff

                        )}

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <!-- HARI OFF > 8 JAM -->

                    <td>

                        ${formatNumber(

                            jamOff

                        )}

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <!-- CUTI AM < 8 JAM -->

                    <td>

                        ${formatNumber(

                            hariCutiAm

                        )}

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <!-- CUTI AM > 8 JAM -->

                    <td>

                        ${formatNumber(

                            jamCutiAm

                        )}

                    </td>


                    <td>

                        ${formatNumber(

                            jamKlm

                        )}

                    </td>

                `;


                tbody.appendChild(

                    tr

                );


                bil++;

            }

        );


        /* =============================================
           7. JUMLAH KESELURUHAN
        ============================================= */

        tfoot.innerHTML = `

            <tr class="total-row">

                <td colspan="4">

                    JUMLAH KESELURUHAN

                </td>


                <td>

                    ${formatNumber(

                        jumlahJamBiasa

                    )}

                </td>


                <td>

                    -

                </td>


                <td>

                    ${formatNumber(

                        jumlahHariOffKurang4

                    )}

                </td>


                <td>

                    -

                </td>


                <td>

                    ${formatNumber(

                        jumlahHariOff4hingga8

                    )}

                </td>


                <td>

                    -

                </td>


                <td>

                    ${formatNumber(

                        jumlahHariOffLebih8

                    )}

                </td>


                <td>

                    -

                </td>


                <td>

                    ${formatNumber(

                        jumlahCutiAmKurang8

                    )}

                </td>


                <td>

                    -

                </td>


                <td>

                    ${formatNumber(

                        jumlahCutiAmLebih8

                    )}

                </td>


                <td>

                    ${formatNumber(

                        jumlahKlm

                    )}

                </td>

            </tr>

        `;


        if (

            dataDuty.length === 0

        ) {

            paparMesej(

                "Anggota dijumpai tetapi tiada duty bagi Bulan / Tahun yang dipilih.",

                "error"

            );

        }

        else {

            paparMesej(

                "Laporan berjaya dijana.",

                "success"

            );

        }

    }


    catch (error) {

        console.error(

            "RALAT JANA LAPORAN:",

            error

        );


        tbody.innerHTML = `

            <tr>

                <td colspan="16">

                    RALAT:

                    ${error.message}

                </td>

            </tr>

        `;


        paparMesej(

            error.message,

            "error"

        );

    }

}


/* =====================================================
   TUKAR KEPADA NOMBOR
===================================================== */

function toNumber(

    nilai

) {

    if (

        nilai === null ||

        nilai === undefined ||

        nilai === ""

    ) {

        return 0;

    }


    const nombor =

        parseFloat(

            String(

                nilai

            ).replace(

                ",",

                ""

            )

        );


    return isNaN(

        nombor

    )

        ? 0

        : nombor;

}


/* =====================================================
   FORMAT NOMBOR
===================================================== */

function formatNumber(

    nilai

) {

    return toNumber(

        nilai

    ).toLocaleString(

        "ms-MY",

        {

            minimumFractionDigits: 2,

            maximumFractionDigits: 2

        }

    );

}


/* =====================================================
   FORMAT RM
===================================================== */

function formatRM(

    nilai

) {

    return toNumber(

        nilai

    ).toLocaleString(

        "ms-MY",

        {

            minimumFractionDigits: 2,

            maximumFractionDigits: 2

        }

    );

}

</script>
