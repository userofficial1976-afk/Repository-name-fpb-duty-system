<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"

>

<title>
    Laporan Anggaran Duty
</title>

<style>

/* =====================================================
   ASAS
===================================================== */

* {

    box-sizing: border-box;

    font-family: Arial, sans-serif;

}


body {

    margin: 0;

    background: #f1f5f9;

    color: #1e293b;

}


/* =====================================================
   HEADER SISTEM
===================================================== */

header {

    background: #0f172a;

    color: white;

    padding: 20px 25px;

}


header h1 {

    margin: 0;

    font-size: 25px;

}


header p {

    margin: 6px 0 0;

    color: #cbd5e1;

}


.container {

    max-width: 1800px;

    margin: auto;

    padding: 20px;

}


/* =====================================================
   BUTTON
===================================================== */

.btn-dashboard {

    display: inline-block;

    background: #2563eb;

    color: white;

    text-decoration: none;

    padding: 10px 16px;

    border-radius: 7px;

    font-weight: bold;

    margin-top: 15px;

}


button {

    width: 100%;

    padding: 11px;

    border-radius: 7px;

    border: 1px solid #cbd5e1;

    font-size: 14px;

    background: #2563eb;

    color: white;

    border: none;

    cursor: pointer;

    font-weight: bold;

}


button:hover {

    background: #1d4ed8;

}


.btn-print {

    background: #16a34a;

}


.btn-print:hover {

    background: #15803d;

}


/* =====================================================
   CARD
===================================================== */

.card {

    background: white;

    border-radius: 12px;

    padding: 20px;

    margin-bottom: 20px;

    box-shadow: 0 3px 12px rgba(0,0,0,0.08);

}


h2 {

    margin-top: 0;

    color: #0f172a;

}


/* =====================================================
   FILTER
===================================================== */

.grid {

    display: grid;

    grid-template-columns:

        repeat(

            auto-fit,

            minmax(220px, 1fr)

        );

    gap: 15px;

}


label {

    display: block;

    font-weight: bold;

    margin-bottom: 6px;

}


input,

select {

    width: 100%;

    padding: 11px;

    border-radius: 7px;

    border: 1px solid #cbd5e1;

    font-size: 14px;

}


/* =====================================================
   LAPORAN A4 LANDSCAPE
===================================================== */

.laporan-a4 {

    width: 100%;

    background: white;

    border: 1px solid #000;

    padding: 8px;

    overflow-x: auto;

}


/* =====================================================
   TAJUK LAPORAN
===================================================== */

.laporan-tajuk {

    text-align: center;

    font-size: 18px;

    font-weight: bold;

    margin-bottom: 8px;

}


.laporan-maklumat {

    display: grid;

    grid-template-columns: 1fr 1fr 1fr;

    border-bottom: 1px solid #000;

    padding-bottom: 6px;

    margin-bottom: 6px;

    font-size: 10px;

}


.laporan-maklumat div {

    padding: 2px 5px;

}


/* =====================================================
   JADUAL UTAMA
===================================================== */

.jadual-bulanan {

    width: 100%;

    min-width: 1500px;

    border-collapse: collapse;

    table-layout: fixed;

}


/* Semua cell */

.jadual-bulanan th,

.jadual-bulanan td {

    border: 1px solid #000;

    text-align: center;

    vertical-align: middle;

    padding: 2px;

}


/* =====================================================
   HEADER ANGGOTA
===================================================== */

.jadual-bulanan .header-anggota {

    font-size: 10px;

    font-weight: bold;

    height: 22px;

    background: #f1f1f1;

}


.jadual-bulanan .maklumat-anggota {

    font-size: 8px;

    text-align: left;

    padding: 3px;

    vertical-align: middle;

}


.jadual-bulanan .maklumat-anggota strong {

    font-weight: bold;

}


/* =====================================================
   SUB HEADER KOD / JAM / OFF / AM
===================================================== */

.jadual-bulanan .sub-header {

    font-size: 8px;

    font-weight: bold;

    height: 20px;

    background: #e5e7eb;

}


/* =====================================================
   TARIKH / HARI
===================================================== */

.jadual-bulanan .tarikh-hari {

    width: 70px;

    font-size: 8px;

    font-weight: bold;

}


.jadual-bulanan .tarikh {

    font-size: 9px;

    font-weight: bold;

}


.jadual-bulanan .hari {

    font-size: 8px;

}


/* =====================================================
   WK / TK
===================================================== */

.jadual-bulanan .jenis-baris {

    width: 24px;

    font-size: 8px;

    font-weight: bold;

}


/* =====================================================
   DATA DUTY
===================================================== */

.jadual-bulanan .kod {

    font-size: 9px;

    font-weight: bold;

}


.jadual-bulanan .jam-klm {

    font-size: 9px;

    font-weight: bold;

}


.jadual-bulanan .off,

.jadual-bulanan .am {

    font-size: 9px;

    font-weight: bold;

}


/* JAM KLM 1 RUANG SAHAJA */

.jadual-bulanan .jam-klm-cell {

    font-size: 9px;

    font-weight: bold;

}


/* =====================================================
   WARNA MAKLUMAT
===================================================== */

.wk {

    background: #ffffff;

}


.tk {

    background: #fafafa;

}


/* =====================================================
   NOTA / PETUNJUK
===================================================== */

.petunjuk {

    display: grid;

    grid-template-columns: 1fr 1fr 1fr;

    gap: 10px;

    margin-top: 8px;

    border-top: 1px solid #000;

    padding-top: 6px;

    font-size: 8px;

}


.petunjuk-box {

    padding: 5px;

}


.petunjuk-title {

    font-weight: bold;

    margin-bottom: 3px;

}


/* =====================================================
   CETAK A4 LANDSCAPE
===================================================== */

@page {

    size: A4 landscape;

    margin: 5mm;

}


@media print {


    body {

        background: white;

    }


    header,

    .filter-card,

    .btn-dashboard,

    .btn-print {

        display: none !important;

    }


    .container {

        max-width: none;

        padding: 0;

        margin: 0;

    }


    .card {

        box-shadow: none;

        border: none;

        padding: 0;

        margin: 0;

    }


    .laporan-a4 {

        width: 100%;

        border: 1px solid #000;

        padding: 4px;

        overflow: visible;

    }


    .jadual-bulanan {

        width: 100%;

        min-width: 0;

        table-layout: fixed;

    }


    .jadual-bulanan th,

    .jadual-bulanan td {

        padding: 1px;

    }


    .jadual-bulanan .header-anggota {

        font-size: 7px;

    }


    .jadual-bulanan .maklumat-anggota {

        font-size: 6px;

    }


    .jadual-bulanan .sub-header {

        font-size: 6px;

    }


    .jadual-bulanan .tarikh-hari,

    .jadual-bulanan .jenis-baris,

    .jadual-bulanan .kod,

    .jadual-bulanan .jam-klm-cell,

    .jadual-bulanan .off,

    .jadual-bulanan .am {

        font-size: 6px;

    }


    .petunjuk {

        font-size: 6px;

    }


}


/* =====================================================
   SKRIN KOMPUTER
===================================================== */

@media screen and (max-width: 1200px) {


    .laporan-a4 {

        overflow-x: auto;

    }

}


</style>

</head>
