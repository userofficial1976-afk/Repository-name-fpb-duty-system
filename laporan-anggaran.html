<script>

// =====================================================
// SENARAI BULAN
// =====================================================

const SENARAI_BULAN = [

    "",

    "Januari",

    "Februari",

    "Mac",

    "April",

    "Mei",

    "Jun",

    "Julai",

    "Ogos",

    "September",

    "Oktober",

    "November",

    "Disember"

];


// =====================================================
// DAPATKAN SUPABASE CLIENT
// =====================================================

function dapatkanSupabaseClient() {

    if (

        typeof supabaseClient !== "undefined"

    ) {

        return supabaseClient;

    }


    if (

        typeof supabase !== "undefined"

    ) {

        return supabase;

    }


    throw new Error(

        "supabaseClient tidak dijumpai."

    );

}


// =====================================================
// CARI DROPDOWN POS
// =====================================================

function dapatkanDropdownPos() {


    const senaraiID = [

        "pos",

        "posDropdown",

        "pilihPos",

        "dropdownPos",

        "posSelect",

        "selectPos"

    ];


    for (

        let i = 0;

        i < senaraiID.length;

        i++

    ) {


        const elemen =

            document.getElementById(

                senaraiID[i]

            );


        if (elemen) {

            console.log(

                "Dropdown Pos dijumpai:",

                senaraiID[i]

            );


            return elemen;

        }

    }


    const semuaSelect =

        document.querySelectorAll(

            "select"

        );


    for (

        let i = 0;

        i < semuaSelect.length;

        i++

    ) {


        const select =

            semuaSelect[i];


        const teks =

            String(

                select.id

            ).toLowerCase();


        if (

            teks.includes("pos")

        ) {


            console.log(

                "Dropdown Pos dijumpai melalui ID:",

                select.id

            );


            return select;

        }

    }


    return null;

}


// =====================================================
// APABILA HALAMAN DIBUKA
// =====================================================

document.addEventListener(

    "DOMContentLoaded",

    async function () {


        try {


            const tahunSelect =

                document.getElementById(

                    "tahun"

                );


            if (tahunSelect) {


                const tahunSekarang =

                    new Date()

                        .getFullYear()

                        .toString();


                const wujud =

                    Array.from(

                        tahunSelect.options

                    ).some(

                        function (option) {


                            return (

                                String(

                                    option.value

                                ) === tahunSekarang

                            );

                        }

                    );


                if (wujud) {


                    tahunSelect.value =

                        tahunSekarang;

                }

            }


            await isiSenaraiPos();


        }

        catch (error) {


            console.error(

                "RALAT SEMASA BUKA HALAMAN:",

                error

            );


            paparMesej(

                error.message,

                "error"

            );

        }

    }

);


// =====================================================
// PAPAR MESEJ
// =====================================================

function paparMesej(

    mesej,

    jenis = "success"

) {


    const elemen =

        document.getElementById(

            "mesej"

        );


    if (!elemen) {


        console.error(

            mesej

        );


        return;

    }


    elemen.className =

        "mesej " + jenis;


    elemen.textContent =

        mesej;


    setTimeout(

        function () {


            elemen.textContent = "";


            elemen.className =

                "mesej";


        },

        5000

    );

}


// =====================================================
// ISI SENARAI POS
// =====================================================

async function isiSenaraiPos() {


    const selectPos =

        dapatkanDropdownPos();


    if (!selectPos) {


        console.error(

            "Dropdown Pos tidak dijumpai."

        );


        paparMesej(

            "Dropdown Pos tidak dijumpai dalam HTML.",

            "error"

        );


        return;

    }


    selectPos.innerHTML = `

        <option value="">

            -- Sedang mengambil Pos --

        </option>

    `;


    try {


        const client =

            dapatkanSupabaseClient();


        const result =

            await client

                .from(

                    "Data_Anggota"

                )

                .select(

                    "pos"

                );


        if (

            result.error

        ) {


            throw result.error;

        }


        const data =

            result.data || [];


        const setPos =

            new Set();


        data.forEach(

            function (row) {


                if (

                    row.pos !== null &&

                    row.pos !== undefined

                ) {


                    const pos =

                        String(

                            row.pos

                        ).trim();


                    if (pos !== "") {


                        setPos.add(

                            pos

                        );

                    }

                }

            }

        );


        const senaraiPos =

            Array.from(

                setPos

            );


        senaraiPos.sort(

            function (

                a,

                b

            ) {


                return a.localeCompare(

                    b,

                    "ms",

                    {

                        numeric: true

                    }

                );

            }

        );


        selectPos.innerHTML = `

            <option value="">

                -- Pilih Pos --

            </option>

        `;


        senaraiPos.forEach(

            function (

                pos

            ) {


                const option =

                    document.createElement(

                        "option"

                    );


                option.value =

                    pos;


                option.textContent =

                    pos;


                selectPos.appendChild(

                    option

                );

            }

        );


        console.log(

            "SENARAI POS:",

            senaraiPos

        );


        if (

            senaraiPos.length === 0

        ) {


            paparMesej(

                "Tiada Pos dijumpai dalam Data_Anggota.",

                "error"

            );

        }

    }


    catch (error) {


        console.error(

            "RALAT AMBIL POS:",

            error

        );


        selectPos.innerHTML = `

            <option value="">

                -- Gagal Ambil Pos --

            </option>

        `;


        paparMesej(

            error.message,

            "error"

        );

    }

}


// =====================================================
// JANA LAPORAN ANGGARAN
// =====================================================

async function janaLaporanAnggaran() {


    const bulanElement =

        document.getElementById(

            "bulan"

        );


    const tahunElement =

        document.getElementById(

            "tahun"

        );


    const posElement =

        dapatkanDropdownPos();


    const tbody =

        document.getElementById(

            "senaraiAnggaran"

        );


    const tfoot =

        document.getElementById(

            "jumlahAnggaran"

        );


    if (!bulanElement) {


        alert(

            "Elemen bulan tidak dijumpai."

        );


        return;

    }


    if (!tahunElement) {


        alert(

            "Elemen tahun tidak dijumpai."

        );


        return;

    }


    if (!posElement) {


        alert(

            "Dropdown Pos tidak dijumpai."

        );


        return;

    }


    if (!tbody) {


        alert(

            "tbody senaraiAnggaran tidak dijumpai."

        );


        return;

    }


    if (!tfoot) {


        alert(

            "tfoot jumlahAnggaran tidak dijumpai."

        );


        return;

    }


    const bulan =

        parseInt(

            bulanElement.value,

            10

        );


    const tahun =

        parseInt(

            tahunElement.value,

            10

        );


    const pos =

        String(

            posElement.value

        ).trim();


    if (

        isNaN(bulan)

    ) {


        paparMesej(

            "Sila pilih bulan.",

            "error"

        );


        return;

    }


    if (

        isNaN(tahun)

    ) {


        paparMesej(

            "Sila pilih tahun.",

            "error"

        );


        return;

    }


    if (

        pos === ""

    ) {


        paparMesej(

            "Sila pilih Pos terlebih dahulu.",

            "error"

        );


        return;

    }


    tbody.innerHTML = `

        <tr>

            <td colspan="15">

                Sedang mengambil data...

            </td>

        </tr>

    `;


    tfoot.innerHTML = "";


    const tajukUnit =

        document.getElementById(

            "tajukUnit"

        );


    const tajukBulan =

        document.getElementById(

            "tajukBulan"

        );


    const tajukPos =

        document.getElementById(

            "tajukPos"

        );


    if (tajukUnit) {


        tajukUnit.textContent =

            "WILAYAH TERENGGANU";

    }


    if (tajukBulan) {


        tajukBulan.textContent =

            SENARAI_BULAN[bulan]

            + " "

            + tahun;

    }


    if (tajukPos) {


        tajukPos.textContent =

            pos;

    }


    try {


        const client =

            dapatkanSupabaseClient();


        // =================================================
        // 1. AMBIL ANGGOTA MENGIKUT POS
        // =================================================

        const anggotaResult =

            await client

                .from(

                    "Data_Anggota"

                )

                .select(`

                    no_skb,

                    no_anggota,

                    nama,

                    gaji_pokok,

                    pos,

                    unit

                `)

                .eq(

                    "pos",

                    pos

                );


        if (

            anggotaResult.error

        ) {


            throw anggotaResult.error;

        }


        const dataAnggota =

            anggotaResult.data || [];


        console.log(

            "DATA ANGGOTA:",

            dataAnggota

        );


        if (

            dataAnggota.length === 0

        ) {


            tbody.innerHTML = `

                <tr>

                    <td colspan="15">

                        Tiada anggota dijumpai bagi Pos:

                        <strong>

                            ${escapeHTML(pos)}

                        </strong>

                    </td>

                </tr>

            `;


            return;

        }


        // =================================================
        // 2. AMBIL DATA JADUAL DUTY BULAN PENUH
        // =================================================

        const dutyResult =

            await client

                .from(

                    "jadual_duty"

                )

                .select(`

                    tarikh,

                    bulan,

                    tahun,

                    no_skb,

                    jam_klm,

                    hari_offday_bertugas,

                    jam_offday_bertugas,

                    hari_cutiam_bertugas,

                    jam_cutiam_bertugas,

                    pos

                `)

                .eq(

                    "bulan",

                    bulan

                )

                .eq(

                    "tahun",

                    tahun

                )

                .eq(

                    "pos",

                    pos

                );


        if (

            dutyResult.error

        ) {


            throw dutyResult.error;

        }


        const dataDuty =

            dutyResult.data || [];


        console.log(

            "DATA DUTY BULAN PENUH:",

            dataDuty

        );


        // =================================================
        // 3. MAP DATA DUTY IKUT NO SKB
        // =================================================

        const mapDuty =

            new Map();


        dataDuty.forEach(

            function (

                duty

            ) {


                if (

                    duty.no_skb === null ||

                    duty.no_skb === undefined

                ) {


                    return;

                }


                const key =

                    String(

                        duty.no_skb

                    ).trim();


                if (

                    !mapDuty.has(

                        key

                    )

                ) {


                    mapDuty.set(

                        key,

                        []

                    );

                }


                mapDuty

                    .get(

                        key

                    )

                    .push(

                        duty

                    );

            }

        );


        // =================================================
        // 4. JUMLAH KESELURUHAN
        // =================================================

        let jumlahJamBiasa = 0;


        let jumlahHariOff = 0;


        let jumlahJamOff = 0;


        let jumlahHariCutiAm = 0;


        let jumlahJamCutiAm = 0;


        tbody.innerHTML = "";


        let bil = 1;


        // =================================================
        // 5. PAPAR ANGGOTA
        // =================================================

        dataAnggota.forEach(

            function (

                anggota

            ) {


                const key =

                    String(

                        anggota.no_skb

                    ).trim();


                const dutyAnggota =

                    mapDuty.get(

                        key

                    ) || [];


                // =========================================
                // HARI BIASA
                // jumlah jam_klm
                // =========================================

                const jamBiasa =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {


                            return jumlah

                                +

                                toNumber(

                                    duty.jam_klm

                                );

                        },

                        0

                    );


                // =========================================
                // HARI OFF 4-8 JAM
                // hari_offday_bertugas
                // =========================================

                const hariOff =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {


                            return jumlah

                                +

                                toNumber(

                                    duty.hari_offday_bertugas

                                );

                        },

                        0

                    );


                // =========================================
                // HARI OFF > 8 JAM
                // jam_offday_bertugas
                // =========================================

                const jamOff =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {


                            return jumlah

                                +

                                toNumber(

                                    duty.jam_offday_bertugas

                                );

                        },

                        0

                    );


                // =========================================
                // CUTI AM < 8 JAM
                // hari_cutiam_bertugas
                // =========================================

                const hariCutiAm =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {


                            return jumlah

                                +

                                toNumber(

                                    duty.hari_cutiam_bertugas

                                );

                        },

                        0

                    );


                // =========================================
                // CUTI AM > 8 JAM
                // jam_cutiam_bertugas
                // =========================================

                const jamCutiAm =

                    dutyAnggota.reduce(

                        function (

                            jumlah,

                            duty

                        ) {


                            return jumlah

                                +

                                toNumber(

                                    duty.jam_cutiam_bertugas

                                );

                        },

                        0

                    );


                jumlahJamBiasa +=

                    jamBiasa;


                jumlahHariOff +=

                    hariOff;


                jumlahJamOff +=

                    jamOff;


                jumlahHariCutiAm +=

                    hariCutiAm;


                jumlahJamCutiAm +=

                    jamCutiAm;


                const tr =

                    document.createElement(

                        "tr"

                    );


                tr.innerHTML = `


                    <td>

                        ${bil}

                    </td>


                    <td>

                        ${escapeHTML(

                            anggota.no_skb || ""

                        )}

                    </td>


                    <td class="left">

                        ${escapeHTML(

                            anggota.nama || ""

                        )}

                    </td>


                    <td class="amount">

                        ${formatRM(

                            anggota.gaji_pokok

                        )}

                    </td>


                    <!-- HARI BIASA -->

                    <td>

                        ${formatNumber(

                            jamBiasa

                        )}

                    </td>


                    <td class="amount">

                        -

                    </td>


                    <!-- HARI OFF < 4 JAM -->

                    <td>

                        -

                    </td>


                    <td class="amount">

                        -

                    </td>


                    <!-- HARI OFF 4-8 JAM -->

                    <td>

                        ${formatNumber(

                            hariOff

                        )}

                    </td>


                    <td class="amount">

                        -

                    </td>


                    <!-- HARI OFF > 8 JAM -->

                    <td>

                        ${formatNumber(

                            jamOff

                        )}

                    </td>


                    <td class="amount">

                        -

                    </td>


                    <!-- CUTI AM < 8 JAM -->

                    <td>

                        ${formatNumber(

                            hariCutiAm

                        )}

                    </td>


                    <td class="amount">

                        -

                    </td>


                    <!-- CUTI AM > 8 JAM -->

                    <td>

                        ${formatNumber(

                            jamCutiAm

                        )}

                    </td>


                `;


                tbody.appendChild(

                    tr

                );


                bil++;


            }

        );


        // =================================================
        // 6. JUMLAH KESELURUHAN
        // =================================================

        tfoot.innerHTML = `

            <tr class="total-row">


                <td colspan="4">

                    JUMLAH KESELURUHAN

                </td>


                <td>

                    ${formatNumber(

                        jumlahJamBiasa

                    )}

                </td>


                <td>

                    -

                </td>


                <td>

                    -

                </td>


                <td>

                    -

                </td>


                <td>

                    ${formatNumber(

                        jumlahHariOff

                    )}

                </td>


                <td>

                    -

                </td>


                <td>

                    ${formatNumber(

                        jumlahJamOff

                    )}

                </td>


                <td>

                    -

                </td>


                <td>

                    ${formatNumber(

                        jumlahHariCutiAm

                    )}

                </td>


                <td>

                    -

                </td>


                <td>

                    ${formatNumber(

                        jumlahJamCutiAm

                    )}

                </td>


            </tr>

        `;


        if (

            dataDuty.length === 0

        ) {


            paparMesej(

                "Anggota dijumpai tetapi tiada data duty untuk Bulan / Tahun / Pos dipilih.",

                "error"

            );

        }

        else {


            paparMesej(

                "Laporan berjaya dijana.",

                "success"

            );

        }

    }


    catch (

        error

    ) {


        console.error(

            "RALAT JANA LAPORAN:",

            error

        );


        tbody.innerHTML = `

            <tr>

                <td colspan="15">

                    RALAT:

                    ${escapeHTML(

                        error.message

                    )}

                </td>

            </tr>

        `;


        paparMesej(

            error.message,

            "error"

        );

    }

}


// =====================================================
// TUKAR NILAI KEPADA NOMBOR
// =====================================================

function toNumber(

    nilai

) {


    if (

        nilai === null ||

        nilai === undefined ||

        nilai === ""

    ) {


        return 0;

    }


    const teks =

        String(

            nilai

        )

        .replace(

            ",",

            "."

        );


    const nombor =

        parseFloat(

            teks

        );


    return isNaN(

        nombor

    )

        ? 0

        : nombor;

}


// =====================================================
// FORMAT NOMBOR
// =====================================================

function formatNumber(

    nilai

) {


    return toNumber(

        nilai

    ).toLocaleString(

        "ms-MY",

        {

            minimumFractionDigits: 2,

            maximumFractionDigits: 2

        }

    );

}


// =====================================================
// FORMAT RM
// =====================================================

function formatRM(

    nilai

) {


    return toNumber(

        nilai

    ).toLocaleString(

        "ms-MY",

        {

            minimumFractionDigits: 2,

            maximumFractionDigits: 2

        }

    );

}


// =====================================================
// KESELAMATAN PAPAR TEKS
// =====================================================

function escapeHTML(

    nilai

) {


    return String(

        nilai

    )

    .replace(

        /&/g,

        "&amp;"

    )

    .replace(

        /</g,

        "&lt;"

    )

    .replace(

        />/g,

        "&gt;"

    )

    .replace(

        /"/g,

        "&quot;"

    )

    .replace(

        /'/g,

        "&#039;"

    );

}

</script>
