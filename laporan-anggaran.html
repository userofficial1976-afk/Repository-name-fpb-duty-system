<script>

// =====================================================
// SENARAI BULAN
// =====================================================

const SENARAI_BULAN = [

    "",

    "Januari",

    "Februari",

    "Mac",

    "April",

    "Mei",

    "Jun",

    "Julai",

    "Ogos",

    "September",

    "Oktober",

    "November",

    "Disember"

];


// =====================================================
// APABILA HALAMAN DIBUKA
// =====================================================

document.addEventListener(

    "DOMContentLoaded",

    async function () {


        const tahunSelect =

            document.getElementById(

                "tahun"

            );


        if (tahunSelect) {


            const tahunSekarang =

                new Date()

                    .getFullYear()

                    .toString();


            const optionTahun =

                Array.from(

                    tahunSelect.options

                );


            const wujud =

                optionTahun.some(

                    function (option) {

                        return option.value ===

                            tahunSekarang;

                    }

                );


            if (wujud) {

                tahunSelect.value =

                    tahunSekarang;

            }

        }


        await isiSenaraiPos();


    }

);


// =====================================================
// PAPAR MESEJ
// =====================================================

function paparMesej(

    mesej,

    jenis = "success"

) {


    const elemen =

        document.getElementById(

            "mesej"

        );


    if (!elemen) return;


    elemen.className =

        "mesej " + jenis;


    elemen.textContent =

        mesej;


    setTimeout(

        function () {


            elemen.textContent = "";


            elemen.className =

                "mesej";


        },

        5000

    );

}


// =====================================================
// ISI DROPDOWN POS
// AMBIL TERUS DARIPADA Data_Anggota
// =====================================================

async function isiSenaraiPos() {


    const selectPos =

        document.getElementById(

            "pos"

        );


    if (!selectPos) {

        console.error(

            "Dropdown Pos tidak dijumpai."

        );


        return;

    }


    selectPos.innerHTML = `

        <option value="">

            -- Sedang mengambil Pos --

        </option>

    `;


    try {


        const result =

            await supabaseClient

                .from(

                    "Data_Anggota"

                )

                .select(

                    "pos"

                );


        if (

            result.error

        ) {


            console.error(

                "RALAT AMBIL POS:",

                result.error

            );


            selectPos.innerHTML = `

                <option value="">

                    -- Gagal Ambil Pos --

                </option>

            `;


            paparMesej(

                result.error.message,

                "error"

            );


            return;

        }


        const data =

            result.data || [];


        const senaraiPos = [


            ...

            new Set(


                data

                    .map(

                        function (row) {

                            return row.pos;

                        }

                    )

                    .filter(

                        function (pos) {


                            return pos !== null &&

                                pos !== undefined &&

                                String(

                                    pos

                                ).trim() !== "";


                        }

                    )

            )


        ];


        senaraiPos.sort(

            function (

                a,

                b

            ) {


                return String(

                    a

                ).localeCompare(

                    String(

                        b

                    ),

                    "ms",

                    {

                        numeric: true

                    }

                );

            }

        );


        selectPos.innerHTML = `

            <option value="">

                -- Pilih Pos --

            </option>

        `;


        senaraiPos.forEach(

            function (

                pos

            ) {


                const option =

                    document.createElement(

                        "option"

                    );


                option.value =

                    String(

                        pos

                    );


                option.textContent =

                    String(

                        pos

                    );


                selectPos.appendChild(

                    option

                );

            }

        );


        console.log(

            "SENARAI POS:",

            senaraiPos

        );


    }

    catch (

        error

    ) {


        console.error(

            "RALAT SISTEM AMBIL POS:",

            error

        );


        selectPos.innerHTML = `

            <option value="">

                -- Gagal Ambil Pos --

            </option>

        `;


        paparMesej(

            error.message,

            "error"

        );

    }

}


// =====================================================
// JANA LAPORAN ANGGARAN
// =====================================================

async function janaLaporanAnggaran() {


    const bulanElement =

        document.getElementById(

            "bulan"

        );


    const tahunElement =

        document.getElementById(

            "tahun"

        );


    const posElement =

        document.getElementById(

            "pos"

        );


    const tbody =

        document.getElementById(

            "senaraiAnggaran"

        );


    const tfoot =

        document.getElementById(

            "jumlahAnggaran"

        );


    if (

        !bulanElement ||

        !tahunElement ||

        !posElement ||

        !tbody ||

        !tfoot

    ) {


        alert(

            "Elemen laporan tidak lengkap."

        );


        return;

    }


    const bulan =

        parseInt(

            bulanElement.value,

            10

        );


    const tahun =

        parseInt(

            tahunElement.value,

            10

        );


    const pos =

        posElement.value;


    if (!pos) {


        paparMesej(

            "Sila pilih Pos terlebih dahulu.",

            "error"

        );


        return;

    }


    tbody.innerHTML = `

        <tr>

            <td colspan="15">

                Sedang mengambil data anggota...

            </td>

        </tr>

    `;


    tfoot.innerHTML = "";


    document

        .getElementById(

            "tajukUnit"

        )

        .textContent =

        "WILAYAH TERENGGANU";


    document

        .getElementById(

            "tajukBulan"

        )

        .textContent =

        SENARAI_BULAN[bulan]

        +

        " "

        +

        tahun;


    document

        .getElementById(

            "tajukPos"

        )

        .textContent =

        pos;


    try {


        // =================================================
        // 1. AMBIL ANGGOTA MENGIKUT POS
        // =================================================

        const anggotaResult =

            await supabaseClient

                .from(

                    "Data_Anggota"

                )

                .select(`

                    no_skb,

                    no_anggota,

                    nama,

                    gaji_pokok,

                    pos,

                    unit

                `)

                .eq(

                    "pos",

                    pos

                );


        if (

            anggotaResult.error

        ) {


            throw anggotaResult.error;

        }


        const dataAnggota =

            anggotaResult.data || [];


        console.log(

            "ANGGOTA BAGI POS:",

            pos,

            dataAnggota

        );


        if (

            dataAnggota.length === 0

        ) {


            tbody.innerHTML = `

                <tr>

                    <td colspan="15">

                        Tiada anggota dijumpai bagi Pos:

                        <strong>

                            ${pos}

                        </strong>

                    </td>

                </tr>

            `;


            return;

        }


        // =================================================
        // 2. DAPATKAN NO SKB ANGGOTA
        // =================================================

        const senaraiNoSkb =


            dataAnggota

                .map(

                    function (

                        anggota

                    ) {


                        return anggota.no_skb;

                    }

                )

                .filter(

                    function (

                        noSkb

                    ) {


                        return noSkb !== null &&

                            noSkb !== undefined &&

                            String(

                                noSkb

                            ).trim() !== "";

                    }

                );


        console.log(

            "NO SKB ANGGOTA:",

            senaraiNoSkb

        );


        // =================================================
        // 3. AMBIL DATA DUTY
        // =================================================

        let dataDuty = [];


        if (

            senaraiNoSkb.length > 0

        ) {


            const dutyResult =

                await supabaseClient

                    .from(

                        "jadual_duty"

                    )

                    .select(`

                        tarikh,

                        bulan,

                        tahun,

                        no_skb,

                        kod_duty,

                        waktu_tugasan,

                        jam_kerja,

                        jam_klm,

                        pos

                    `)

                    .eq(

                        "bulan",

                        bulan

                    )

                    .eq(

                        "tahun",

                        tahun

                    )

                    .eq(

                        "pos",

                        pos

                    );


            if (

                dutyResult.error

            ) {


                throw dutyResult.error;

            }


            dataDuty =

                dutyResult.data || [];

        }


        console.log(

            "DATA DUTY:",

            dataDuty

        );


        // =================================================
        // 4. MAP DUTY MENGIKUT NO SKB
        // =================================================

        const mapDuty =

            new Map();


        dataDuty.forEach(

            function (

                duty

            ) {


                const key =

                    String(

                        duty.no_skb

                    );


                if (

                    !mapDuty.has(

                        key

                    )

                ) {


                    mapDuty.set(

                        key,

                        []

                    );

                }


                mapDuty

                    .get(

                        key

                    )

                    .push(

                        duty

                    );

            }

        );


        // =================================================
        // 5. PAPAR SETIAP ANGGOTA
        // =================================================

        tbody.innerHTML = "";


        let bil = 1;


        let jumlahJam = 0;


        let jumlahKlm = 0;


        dataAnggota.forEach(

            function (

                anggota

            ) {


                const key =

                    String(

                        anggota.no_skb

                    );


                const dutyAnggota =

                    mapDuty.get(

                        key

                    ) || [];


                // =========================================
                // JUMLAH JAM DUTY
                // =========================================

                const jam =

                    dutyAnggota.reduce(

                        function (

                            total,

                            duty

                        ) {


                            return total

                                +

                                (

                                    parseFloat(

                                        duty.jam_kerja

                                    )

                                    ||

                                    0

                                );

                        },

                        0

                    );


                // =========================================
                // JUMLAH KLM
                // =========================================

                const klm =

                    dutyAnggota.reduce(

                        function (

                            total,

                            duty

                        ) {


                            return total

                                +

                                (

                                    parseFloat(

                                        duty.jam_klm

                                    )

                                    ||

                                    0

                                );

                        },

                        0

                    );


                jumlahJam +=

                    jam;


                jumlahKlm +=

                    klm;


                const tr =

                    document.createElement(

                        "tr"

                    );


                tr.innerHTML = `


                    <td>

                        ${bil}

                    </td>


                    <td>

                        ${anggota.no_skb || ""}

                    </td>


                    <td class="left">

                        ${anggota.nama || ""}

                    </td>


                    <td class="amount">

                        ${formatRM(

                            anggota.gaji_pokok

                        )}

                    </td>


                    <td>

                        ${jam.toFixed(

                            2

                        )}

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <td>

                        0

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <td>

                        0

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <td>

                        0

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <td>

                        0

                    </td>


                    <td class="amount">

                        RM 0.00

                    </td>


                    <td>

                        ${klm.toFixed(

                            2

                        )}

                    </td>


                `;


                tbody.appendChild(

                    tr

                );


                bil++;


            }

        );


        // =================================================
        // 6. JUMLAH KESELURUHAN
        // =================================================

        tfoot.innerHTML = `

            <tr class="total-row">


                <td colspan="4">

                    JUMLAH KESELURUHAN

                </td>


                <td>

                    ${jumlahJam.toFixed(

                        2

                    )}

                </td>


                <td>

                    -

                </td>


                <td colspan="8">

                    -

                </td>


                <td>

                    ${jumlahKlm.toFixed(

                        2

                    )}

                </td>


            </tr>

        `;


        if (

            dataDuty.length === 0

        ) {


            paparMesej(

                "Anggota dijumpai, tetapi tiada data duty bagi Bulan / Tahun / Pos yang dipilih.",

                "error"

            );

        }

        else {


            paparMesej(

                "Laporan berjaya dijana.",

                "success"

            );

        }


    }

    catch (

        error

    ) {


        console.error(

            "RALAT JANA LAPORAN:",

            error

        );


        tbody.innerHTML = `

            <tr>

                <td colspan="15">

                    ${error.message}

                </td>

            </tr>

        `;


        paparMesej(

            error.message,

            "error"

        );

    }

}


// =====================================================
// FORMAT RM
// =====================================================

function formatRM(

    nilai

) {


    const nombor =

        parseFloat(

            nilai

        )

        ||

        0;


    return nombor.toLocaleString(

        "ms-MY",

        {

            minimumFractionDigits: 2,

            maximumFractionDigits: 2

        }

    );

}

</script>
