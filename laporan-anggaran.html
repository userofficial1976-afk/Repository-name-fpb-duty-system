<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>
    Laporan Anggaran Duty
</title>


<style>

* {

    box-sizing: border-box;

    font-family: Arial, sans-serif;

}


body {

    margin: 0;

    background: #f1f5f9;

    color: #1e293b;

}


header {

    background: #0f172a;

    color: white;

    padding: 20px 25px;

}


header h1 {

    margin: 0;

    font-size: 25px;

}


header p {

    margin: 6px 0 0;

    color: #cbd5e1;

}


.container {

    max-width: 1800px;

    margin: auto;

    padding: 20px;

}


.btn-dashboard {

    display: inline-block;

    background: #2563eb;

    color: white;

    text-decoration: none;

    padding: 10px 16px;

    border-radius: 7px;

    font-weight: bold;

    margin-top: 15px;

}


.card {

    background: white;

    border-radius: 12px;

    padding: 20px;

    margin-bottom: 20px;

    box-shadow: 0 3px 12px rgba(0,0,0,0.08);

}


h2 {

    margin-top: 0;

    color: #0f172a;

}


h3 {

    color: #0f172a;

}


.grid {

    display: grid;

    grid-template-columns:

        repeat(

            auto-fit,

            minmax(220px, 1fr)

        );

    gap: 15px;

}


label {

    display: block;

    font-weight: bold;

    margin-bottom: 6px;

}


input,

select,

button {

    width: 100%;

    padding: 11px;

    border-radius: 7px;

    border: 1px solid #cbd5e1;

    font-size: 14px;

}


button {

    background: #2563eb;

    color: white;

    border: none;

    cursor: pointer;

    font-weight: bold;

}


button:hover {

    background: #1d4ed8;

}


.btn-print {

    background: #16a34a;

}


.btn-print:hover {

    background: #15803d;

}


.table-wrapper {

    overflow-x: auto;

}


table {

    width: 100%;

    border-collapse: collapse;

}


th,

td {

    border: 1px solid #cbd5e1;

    padding: 8px;

    text-align: center;

    white-space: nowrap;

}


th {

    background: #0f172a;

    color: white;

}


td {

    background: white;

}


.info-header {

    margin-bottom: 20px;

}


.info-header h2 {

    text-align: center;

    margin-bottom: 20px;

}


.info-header table {

    width: 100%;

    max-width: 800px;

}


.info-header td:first-child {

    font-weight: bold;

    text-align: left;

    width: 250px;

    background: #e2e8f0;

}


.info-header td:last-child {

    text-align: left;

}


.jadual-bulanan {

    min-width: 1600px;

}


.jadual-bulanan th,

.jadual-bulanan td {

    font-size: 11px;

}


.jadual-bulanan th {

    height: 40px;

}


.jadual-bulanan td {

    height: 35px;

}


.jadual-bulanan .nama-anggota {

    min-width: 220px;

    height: 70px;

    font-size: 12px;

    vertical-align: middle;

}


.jadual-bulanan .tarikh {

    min-width: 60px;

    font-weight: bold;

}


.jadual-bulanan .hari {

    min-width: 100px;

}


.jadual-bulanan .kod {

    font-weight: bold;

    font-size: 14px;

}


.jadual-bulanan small {

    font-size: 10px;

    font-weight: normal;

}


.summary-table {

    margin-top: 20px;

}


.summary-table th {

    background: #334155;

}


@media print {


    body {

        background: white;

    }


    header,

    .filter-card,

    .btn-dashboard,

    .btn-print {

        display: none !important;

    }


    .container {

        max-width: none;

        padding: 0;

    }


    .card {

        box-shadow: none;

        padding: 0;

    }


    .table-wrapper {

        overflow: visible;

    }


    .jadual-bulanan {

        min-width: 0;

        width: 100%;

    }


    .jadual-bulanan th,

    .jadual-bulanan td {

        font-size: 8px;

        padding: 4px;

    }


    .jadual-bulanan .nama-anggota {

        font-size: 8px;

        min-width: 0;

        height: 50px;

    }


    .info-header h2 {

        font-size: 16px;

    }


    .info-header table {

        font-size: 10px;

    }


    .summary-table {

        page-break-before: always;

    }

}


</style>

</head>


<body>


<header>

    <h1>

        📊 LAPORAN ANGGARAN DUTY

    </h1>


    <p>

        Laporan Bulanan Duty Anggota

    </p>


    <a

        href="index.html"

        class="btn-dashboard"

    >

        🏠 Kembali ke Dashboard

    </a>

</header>


<div class="container">


    <!-- =========================================
         FILTER LAPORAN
    ========================================== -->


    <div class="card filter-card">


        <h2>

            🔍 Pilih Laporan

        </h2>


        <div class="grid">


            <div>


                <label>

                    Bulan

                </label>


                <select

                    id="bulan"

                >

                    <option value="1">

                        Januari

                    </option>


                    <option value="2">

                        Februari

                    </option>


                    <option value="3">

                        Mac

                    </option>


                    <option value="4">

                        April

                    </option>


                    <option value="5">

                        Mei

                    </option>


                    <option value="6">

                        Jun

                    </option>


                    <option value="7">

                        Julai

                    </option>


                    <option value="8">

                        Ogos

                    </option>


                    <option value="9">

                        September

                    </option>


                    <option value="10">

                        Oktober

                    </option>


                    <option value="11">

                        November

                    </option>


                    <option value="12">

                        Disember

                    </option>


                </select>


            </div>


            <div>


                <label>

                    Tahun

                </label>


                <select

                    id="tahun"

                >

                </select>


            </div>


            <div>


                <label>

                    Pos Asal

                </label>


                <select

                    id="pos"

                >

                    <option value="">

                        -- Pilih Pos --

                    </option>


                </select>


            </div>


        </div>


        <br>


        <div class="grid">


            <div>


                <button

                    onclick="janaLaporan()"

                >

                    🔍 JANA LAPORAN

                </button>


            </div>


            <div>


                <button

                    class="btn-print"

                    onclick="window.print()"

                >

                    🖨️ CETAK LAPORAN

                </button>


            </div>


        </div>


    </div>


    <!-- =========================================
         HASIL LAPORAN
    ========================================== -->


    <div class="card">


        <div

            id="laporan"

        >

            <p>

                Sila pilih bulan, tahun dan pos.

            </p>


        </div>


    </div>


</div>


<!-- =============================================
     SUPABASE
============================================= -->


<script

    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"

></script>


<script

    src="supabase.js"

></script>


<!-- =============================================
     JAVASCRIPT LAPORAN
============================================= -->


<script

    src="js/laporan-anggaran.js"

></script>


</body>

</html>
