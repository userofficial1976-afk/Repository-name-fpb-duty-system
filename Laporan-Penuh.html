<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Laporan Penuh Jadual Duty
</title>

<style>

/* =====================================================
   GLOBAL
===================================================== */

* {

    box-sizing: border-box;

    margin: 0;

    padding: 0;

    font-family:
        "Segoe UI",
        Arial,
        sans-serif;

}


body {

    background: #f3f3f3;

    color: #111;

}


/* =====================================================
   SIDEBAR
===================================================== */

.sidebar {

    width: 290px;

    background: #080808;

    color: white;

    padding: 24px 16px;

    position: fixed;

    top: 0;

    bottom: 0;

    left: 0;

    z-index: 100;

    overflow-y: auto;

}


.brand {

    display: flex;

    align-items: center;

    gap: 14px;

    padding: 0 11px 25px;

    border-bottom: 1px solid #303030;

}


.logo {

    width: 58px;

    height: 58px;

    object-fit: contain;

    background: white;

    padding: 5px;

    border-radius: 10px;

}


.brand-text h1 {

    font-size: 18px;

}


.brand-text p {

    color: #aaa;

    font-size: 12px;

    margin-top: 4px;

}


.heritage-mark {

    margin: 22px 10px;

    padding: 15px;

    border: 1px solid #3b3b3b;

    border-radius: 10px;

    background: #111;

}


.heritage-mark strong {

    display: block;

    font-size: 12px;

}


.heritage-mark span {

    display: block;

    margin-top: 7px;

    color: #999;

    font-size: 11px;

}


.nav-title {

    color: #777;

    font-size: 11px;

    text-transform: uppercase;

    letter-spacing: 1.5px;

    font-weight: bold;

    margin: 26px 13px 10px;

}


.nav {

    display: flex;

    flex-direction: column;

    gap: 5px;

}


.nav a {

    display: flex;

    align-items: center;

    gap: 14px;

    color: #bdbdbd;

    text-decoration: none;

    padding: 14px 15px;

    border-radius: 8px;

    font-size: 15px;

    font-weight: 600;

}


.nav a:hover {

    background: #1e1e1e;

    color: white;

}


.nav a.active {

    background: white;

    color: #080808;

}


.nav-icon {

    width: 24px;

    text-align: center;

    font-size: 20px;

}


/* =====================================================
   MAIN
===================================================== */

.main {

    margin-left: 290px;

    min-height: 100vh;

}


/* =====================================================
   TOPBAR
===================================================== */

.topbar {

    min-height: 82px;

    background: white;

    border-bottom: 1px solid #ddd;

    display: flex;

    align-items: center;

    justify-content: space-between;

    padding: 0 38px;

}


.page-title h2 {

    font-size: 26px;

}


.page-title p {

    color: #777;

    margin-top: 5px;

}


.system-status {

    background: #f1f1f1;

    padding: 10px 16px;

    border-radius: 22px;

    font-weight: 600;

}


/* =====================================================
   CONTENT
===================================================== */

.content {

    padding: 32px;

}


/* =====================================================
   FILTER CARD
===================================================== */

.filter-card {

    background: white;

    border: 1px solid #ddd;

    border-radius: 12px;

    padding: 24px;

    margin-bottom: 20px;

}


.filter-card h2 {

    margin-bottom: 20px;

}


.filter-grid {

    display: grid;

    grid-template-columns:
        repeat(4, 1fr);

    gap: 15px;

}


.form-group {

    display: flex;

    flex-direction: column;

    gap: 7px;

}


.form-group label {

    font-size: 13px;

    font-weight: bold;

    color: #555;

}


.form-group select {

    height: 43px;

    padding: 0 12px;

    border: 1px solid #ccc;

    border-radius: 7px;

    background: white;

}


.button-area {

    display: flex;

    gap: 10px;

    align-items: end;

}


button {

    border: none;

    border-radius: 7px;

    padding: 12px 18px;

    font-weight: bold;

    cursor: pointer;

}


.btn-cari {

    background: #111;

    color: white;

}


.btn-print {

    background: #2563eb;

    color: white;

}


.btn-csv {

    background: #16803c;

    color: white;

}


button:hover {

    opacity: 0.85;

}


/* =====================================================
   REPORT HEADER
===================================================== */

.report-header {

    background: white;

    border: 1px solid #ccc;

    padding: 10px 15px;

    text-align: center;

    margin-bottom: 10px;

}


.report-title {

    display: flex;

    align-items: center;

    justify-content: center;

    gap: 12px;

}


.report-logo {

    width: 42px;

    height: 42px;

    object-fit: contain;

}


.report-header h1 {

    font-size: 15px;

    font-weight: 800;

    letter-spacing: 0.8px;

}


.report-header h2 {

    font-size: 11px;

    font-weight: 700;

    margin-top: 4px;

    letter-spacing: 0.3px;

}


/* =====================================================
   TABLE
===================================================== */

.report-wrapper {

    background: white;

    border: 1px solid #ccc;

    padding: 10px;

    overflow-x: auto;

}


#laporanTable {

    border-collapse: collapse;

    width: 100%;

    table-layout: fixed;

}


#laporanTable th,

#laporanTable td {

    border: 1px solid #777;

    text-align: center;

    vertical-align: middle;

    padding: 3px;

    word-wrap: break-word;

    overflow-wrap: anywhere;

}


#laporanTable th {

    background: #e8e8e8;

    font-size: 10px;

    font-weight: 800;

}


.tarikh-cell {

    width: 82px;

    min-width: 82px;

    font-weight: bold;

    background: #f5f5f5;

    font-size: 9px;

}


.anggota-header {

    width: calc((100% - 82px) / 8);

    font-size: 9px;

    line-height: 1.15;

    height: 48px;

}


.anggota-header small {

    display: block;

    margin-top: 3px;

    font-size: 8px;

    font-weight: normal;

}


.sub-header {

    font-size: 8px;

    font-weight: bold;

}


.data-cell {

    height: 25px;

    font-size: 8px;

    line-height: 1.05;

}


.kod-cell {

    width: 25%;

}


.jam-cell {

    width: 25%;

}


.off-cell {

    width: 25%;

}


.am-cell {

    width: 25%;

}


.empty-message {

    padding: 40px;

    text-align: center;

    color: #777;

}


/* =====================================================
   RUMUSAN BY POS
===================================================== */

.rumusan-wrapper {

    margin-top: 15px;

    background: white;

    border: 1px solid #ccc;

    padding: 10px;

}


.rumusan-title {

    font-size: 13px;

    font-weight: 800;

    text-align: center;

    margin-bottom: 8px;

    text-transform: uppercase;

}


#rumusanTable {

    width: 100%;

    border-collapse: collapse;

    table-layout: fixed;

}


#rumusanTable th,

#rumusanTable td {

    border: 1px solid #777;

    padding: 4px;

    text-align: center;

    vertical-align: middle;

    word-wrap: break-word;

    overflow-wrap: anywhere;

}


#rumusanTable th {

    background: #e8e8e8;

    font-size: 9px;

}


#rumusanTable td {

    font-size: 9px;

}


#rumusanTable th:nth-child(1),

#rumusanTable td:nth-child(1) {

    width: 9%;

}


#rumusanTable th:nth-child(2),

#rumusanTable td:nth-child(2) {

    width: 24%;

}


#rumusanTable th:nth-child(3),

#rumusanTable td:nth-child(3),

#rumusanTable th:nth-child(4),

#rumusanTable td:nth-child(4),

#rumusanTable th:nth-child(5),

#rumusanTable td:nth-child(5),

#rumusanTable th:nth-child(6),

#rumusanTable td:nth-child(6),

#rumusanTable th:nth-child(7),

#rumusanTable td:nth-child(7),

#rumusanTable th:nth-child(8),

#rumusanTable td:nth-child(8) {

    width: 11.16%;

}


.total-row {

    font-weight: 800;

    background: #eeeeee;

}


/* =====================================================
   FOOTER
===================================================== */

.footer {

    text-align: center;

    padding: 30px;

    color: #888;

    font-size: 13px;

}


/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:1200px) {

    .filter-grid {

        grid-template-columns:
            repeat(2, 1fr);

    }

}


@media(max-width:800px) {

    .sidebar {

        width: 78px;

        padding: 16px 8px;

    }


    .brand {

        justify-content: center;

    }


    .brand-text,

    .heritage-mark,

    .nav-title,

    .nav a span {

        display: none;

    }


    .nav a {

        justify-content: center;

    }


    .main {

        margin-left: 78px;

    }


    .filter-grid {

        grid-template-columns: 1fr;

    }

}


/* =====================================================
   PRINT A4 LANDSCAPE
===================================================== */

@media print {

    @page {

        size: A4 landscape;

        margin: 5mm;

    }


    body {

        background: white;

    }


    .sidebar,

    .topbar,

    .filter-card,

    .footer {

        display: none !important;

    }


    .main {

        margin-left: 0;

    }


    .content {

        padding: 0;

    }


    .report-header {

        border: none;

        margin-bottom: 4px;

        padding: 0 0 4px;

    }


    .report-title {

        gap: 7px;

    }


    .report-logo {

        width: 30px;

        height: 30px;

    }


    .report-header h1 {

        font-size: 10px;

    }


    .report-header h2 {

        font-size: 7px;

        margin-top: 1px;

    }


    .report-wrapper {

        border: none;

        padding: 0;

        overflow: visible;

    }


    #laporanTable {

        width: 100%;

        table-layout: fixed;

    }


    #laporanTable th,

    #laporanTable td {

        font-size: 5.8px;

        padding: 1px;

        line-height: 1;

    }


    .tarikh-cell {

        width: 55px;

        min-width: 55px;

        font-size: 5.8px;

    }


    .anggota-header {

        height: 34px;

        font-size: 5.8px;

    }


    .anggota-header small {

        font-size: 5px;

    }


    .data-cell {

        height: 17px;

        font-size: 5.5px;

    }


    .rumusan-wrapper {

        margin-top: 5px;

        padding: 3px;

    }


    .rumusan-title {

        font-size: 7px;

        margin-bottom: 3px;

    }


    #rumusanTable th,

    #rumusanTable td {

        font-size: 5.5px;

        padding: 2px;

        line-height: 1;

    }

}


/* =====================================================
   SCREEN TABLE HEIGHT
===================================================== */

@media screen {

    #laporanTable th,

    #laporanTable td {

        min-height: 25px;

    }

}

</style>

</head>
