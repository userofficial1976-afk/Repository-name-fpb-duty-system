<script>


// =====================================================
// SUPABASE
// =====================================================


const SUPABASE_URL =

"https://nlwrrrwkjpktrifxeymw.supabase.co";


const SUPABASE_KEY =

"sb_publishable_0ymP9thOFXkuNYzvwa0gwQ_1mbxyFE6";


const supabaseClient =

supabase.createClient(

    SUPABASE_URL,

    SUPABASE_KEY

);


// =====================================================
// DATA
// =====================================================


let semuaAnggota = [];


// =====================================================
// MULA
// =====================================================


document.addEventListener(

    "DOMContentLoaded",

    async function () {


        await muatAnggota();


        muatDropdownPangkat();


        muatDropdownPos();


        muatDropdownUnit();


        muatFilterPos();


        muatFilterKawasan();


        document

            .getElementById(

                "pos"

            )

            .addEventListener(

                "change",

                paparKetua

            );


        document

            .getElementById(

                "unit"

            )

            .addEventListener(

                "change",

                paparKetuaUnit

            );


        document

            .getElementById(

                "kawasan"

            )

            .addEventListener(

                "change",

                function () {


                    paparKetua();


                    paparKetuaUnit();


                }

            );

    }

);


// =====================================================
// MUAT ANGGOTA
// =====================================================


async function muatAnggota() {


    const result =

        await supabaseClient

            .from(

                "Data_Anggota"

            )

            .select(

                "no_skb,no_anggota,nama,pangkat,wilayah,kawasan,pos,unit,jawatan,ketua_pos,ketua_unit,status"

            )

            .order(

                "nama",

                {

                    ascending:

                        true

                }

            );


    if (

        result.error

    ) {


        paparMesej(

            "Gagal ambil data: "

            +

            result.error.message,

            "error"

        );


        return;

    }


    semuaAnggota =

        result.data || [];


    paparAnggota();

}


// =====================================================
// SENARAI UNIK
// =====================================================


function senaraiUnik(

    namaKolum

) {


    return [


        ...

        new Set(

            semuaAnggota

                .map(

                    function (

                        item

                    ) {


                        return item[

                            namaKolum

                        ];

                    }

                )

                .filter(

                    function (

                        nilai

                    ) {


                        return (

                            nilai !== null

                            &&

                            nilai !== undefined

                            &&

                            String(

                                nilai

                            )

                            .trim()

                            !== ""

                        );

                    }

                )

                .map(

                    function (

                        nilai

                    ) {


                        return String(

                            nilai

                        )

                        .trim();

                    }

                )

        )


    ]

    .sort(

        function (

            a,

            b

        ) {


            return a.localeCompare(

                b

            );

        }

    );

}


// =====================================================
// DROPDOWN UMUM
// =====================================================


function isiDropdown(

    id,

    namaKolum,

    teksDefault

) {


    const select =

        document

            .getElementById(

                id

            );


    const nilaiLama =

        select.value;


    select.innerHTML =


        `

        <option value="">

            ${teksDefault}

        </option>

        `;


    const data =

        senaraiUnik(

            namaKolum

        );


    data.forEach(

        function (

            nilai

        ) {


            const option =

                document

                    .createElement(

                        "option"

                    );


            option.value =

                nilai;


            option.textContent =

                nilai;


            select.appendChild(

                option

            );

        }

    );


    if (

        data.includes(

            nilaiLama

        )

    ) {


        select.value =

            nilaiLama;

    }

}


// =====================================================
// DROPDOWN PANGKAT
// =====================================================


function muatDropdownPangkat() {


    isiDropdown(

        "pangkat",

        "pangkat",

        "-- Pilih Pangkat --"

    );

}


// =====================================================
// DROPDOWN POS
// =====================================================


function muatDropdownPos() {


    isiDropdown(

        "pos",

        "pos",

        "-- Pilih Pos --"

    );

}


// =====================================================
// DROPDOWN UNIT
// =====================================================


function muatDropdownUnit() {


    isiDropdown(

        "unit",

        "unit",

        "-- Pilih Unit --"

    );

}


// =====================================================
// FILTER POS
// =====================================================


function muatFilterPos() {


    isiDropdown(

        "filterPos",

        "pos",

        "Semua Pos"

    );

}


// =====================================================
// FILTER KAWASAN
// =====================================================


function muatFilterKawasan() {


    const select =

        document

            .getElementById(

                "filterKawasan"

            );


    select.innerHTML = `

        <option value="">

            Semua Kawasan

        </option>


        <option value="F102-Jerangau">

            F102-Jerangau

        </option>


        <option value="F105-Chalok">

            F105-Chalok

        </option>

    `;

}


// =====================================================
// AUTO KETUA POS
// =====================================================


function paparKetua() {


    const kawasan =

        document

            .getElementById(

                "kawasan"

            )

            .value;


    const pos =

        document

            .getElementById(

                "pos"

            )

            .value;


    const input =

        document

            .getElementById(

                "ketuaPos"

            );


    if (

        !kawasan

        ||

        !pos

    ) {


        input.value =

            "";


        return;

    }


    const ketua =

        semuaAnggota.find(

            function (

                anggota

            ) {


                return (


                    anggota.kawasan === kawasan


                    &&


                    anggota.pos === pos


                    &&


                    anggota.jawatan === "Ketua Pos"


                    &&


                    anggota.status === "Aktif"


                );

            }

        );


    input.value =

        ketua

        ?

        ketua.nama

        :

        "";

}


// =====================================================
// AUTO KETUA UNIT
// =====================================================


function paparKetuaUnit() {


    const kawasan =

        document

            .getElementById(

                "kawasan"

            )

            .value;


    const unit =

        document

            .getElementById(

                "unit"

            )

            .value;


    const input =

        document

            .getElementById(

                "ketuaUnit"

            );


    if (

        !kawasan

        ||

        !unit

    ) {


        input.value =

            "";


        return;

    }


    const ketua =

        semuaAnggota.find(

            function (

                anggota

            ) {


                return (


                    anggota.kawasan === kawasan


                    &&


                    anggota.unit === unit


                    &&


                    anggota.jawatan === "Ketua Unit"


                    &&


                    anggota.status === "Aktif"


                );

            }

        );


    input.value =

        ketua

        ?

        ketua.nama

        :

        "";

}


// =====================================================
// PAPAR ANGGOTA
// =====================================================


function paparAnggota() {


    const cari =

        document

            .getElementById(

                "cari"

            )

            .value

            .toLowerCase();


    const filterPos =

        document

            .getElementById(

                "filterPos"

            )

            .value;


    const filterKawasan =

        document

            .getElementById(

                "filterKawasan"

            )

            .value;


    const filterStatus =

        document

            .getElementById(

                "filterStatus"

            )

            .value;


    const data =

        semuaAnggota.filter(

            function (

                x

            ) {


                const teks =


                    (

                        x.no_skb

                        +

                        " "

                        +

                        x.no_anggota

                        +

                        " "

                        +

                        x.nama

                        +

                        " "

                        +

                        x.pangkat

                        +

                        " "

                        +

                        x.wilayah

                        +

                        " "

                        +

                        x.kawasan

                        +

                        " "

                        +

                        x.pos

                        +

                        " "

                        +

                        x.unit

                        +

                        " "

                        +

                        x.jawatan

                        +

                        " "

                        +

                        x.ketua_pos

                        +

                        " "

                        +

                        x.ketua_unit

                    )

                    .toLowerCase();


                return (


                    teks.includes(

                        cari

                    )


                    &&


                    (

                        !filterPos

                        ||

                        x.pos === filterPos

                    )


                    &&


                    (

                        !filterKawasan

                        ||

                        x.kawasan === filterKawasan

                    )


                    &&


                    (

                        !filterStatus

                        ||

                        x.status === filterStatus

                    )


                );

            }

        );


    const tbody =

        document

            .getElementById(

                "senaraiAnggota"

            );


    tbody.innerHTML = "";


    if (

        data.length === 0

    ) {


        tbody.innerHTML = `

            <tr>

                <td colspan="13">

                    Tiada rekod anggota.

                </td>

            </tr>

        `;


        return;

    }


    data.forEach(

        function (

            anggota

        ) {


            const tr =

                document

                    .createElement(

                        "tr"

                    );


            const statusClass =

                anggota.status === "Aktif"

                ?

                "badge-aktif"

                :

                "badge-tidak";


            tr.innerHTML = `

                <td>

                    ${escapeHTML(

                        anggota.no_skb

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.no_anggota

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.nama

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.pangkat

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.wilayah

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.kawasan

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.pos

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.unit

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.jawatan

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.ketua_pos

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.ketua_unit

                    )}

                </td>


                <td>


                    <span

                        class="badge

                        ${statusClass}"

                    >

                        ${escapeHTML(

                            anggota.status

                        )}

                    </span>


                </td>


                <td>


                    <button

                        class="btn-edit"

                        onclick=

                        "editAnggota('${String(

                            anggota.no_skb

                        ).replace(

                            /'/g,

                            "\\'"

                        )}')"

                    >

                        ✏️ Edit

                    </button>


                    <button

                        class="btn-delete"

                        onclick=

                        "padamAnggota('${String(

                            anggota.no_skb

                        ).replace(

                            /'/g,

                            "\\'"

                        )}')"

                    >

                        🗑️ Padam

                    </button>


                </td>

            `;


            tbody.appendChild(

                tr

            );

        }

    );

}


// =====================================================
// BUKA TAMBAH
// =====================================================


function bukaTambah() {


    document

        .getElementById(

            "tajukModal"

        )

        .textContent =

        "Tambah Anggota";


    document

        .getElementById(

            "editNoSkb"

// =====================================================

// =====================================================


async function padamAnggota(

    noSkb

) {


    const anggota =

        semuaAnggota.find(

            function (

                x

            ) {


                return String(

                    x.no_skb

                )

                ===

                String(

                    noSkb

                );

            }

        );


    if (

        !anggota

    ) {


        alert(

            "Data anggota tidak dijumpai."

        );


        return;

    }


    const sahPadam =

        confirm(

            "ADAKAH ANDA PASTI?\n\n"

            +

            "Data anggota akan dipadam secara kekal.\n\n"

            +

            "No. SKB: "

            +

            anggota.no_skb

            +

            "\n"

            +

            "Nama: "

            +

            anggota.nama

        );


    if (

        !sahPadam

    ) {


        return;

    }


    const result =

        await supabaseClient

            .from(

                "Data_Anggota"

            )

            .delete()

            .eq(

                "no_skb",

                noSkb

            );


    if (

        result.error

    ) {


        paparMesej(

            "Gagal padam data: "

            +

            result.error.message,

            "error"

        );


        return;

    }


    paparMesej(

        "Data anggota berjaya dipadam.",

        "success"

    );


    await muatAnggota();


    muatDropdownPangkat();


    muatDropdownPos();


    muatDropdownUnit();


    muatFilterPos();


    muatFilterKawasan();

}


// =====================================================
// SIMPAN
// =====================================================


async function simpanAnggota() {


    const noSkb =

        document

            .getElementById(

                "noSkb"

            )

            .value

            .trim();


    const noAnggota =

        document

            .getElementById(

                "noAnggota"

            )

            .value

            .trim();


    const nama =

        document

            .getElementById(

                "nama"

            )

            .value

            .trim();


    const pangkat =

        document

            .getElementById(

                "pangkat"

            )

            .value;


    const wilayah =

        document

            .getElementById(

                "wilayah"

            )

            .value;


    const kawasan =

        document

            .getElementById(

                "kawasan"

            )

            .value;


    const pos =

        document

            .getElementById(

                "pos"

            )

            .value;


    const unit =

        document

            .getElementById(

                "unit"

            )

            .value;


    const jawatan =

        document

            .getElementById(

                "jawatan"

            )

            .value;


    const ketuaPos =

        document

            .getElementById(

                "ketuaPos"

            )

            .value;


    const ketuaUnit =

        document

            .getElementById(

                "ketuaUnit"

            )

            .value;


    const status =

        document

            .getElementById(

                "status"

            )

            .value;


    const editNoSkb =

        document

            .getElementById(

                "editNoSkb"

            )

            .value;


    if (

        !noSkb

        ||

        !nama

        ||

        !kawasan

        ||

        !pos

        ||

        !unit

        ||

        !jawatan

    ) {


        alert(

            "Sila lengkapkan No. SKB, Nama, Kawasan, Pos, Unit dan Jawatan."

        );


        return;

    }


    const data = {


        no_anggota:

            noAnggota,


        nama:

            nama,


        pangkat:

            pangkat,


        wilayah:

            wilayah,


        kawasan:

            kawasan,


        pos:

            pos,


        unit:

            unit,


        jawatan:

            jawatan,


        ketua_pos:

            ketuaPos,


        ketua_unit:

            ketuaUnit,


        status:

            status

    };


    let result;


    if (

        editNoSkb

    ) {


        result =

            await supabaseClient

                .from(

                    "Data_Anggota"

                )

                .update(

                    data

                )

                .eq(

                    "no_skb",

                    editNoSkb

                );

    }


    else {


        result =

            await supabaseClient

                .from(

                    "Data_Anggota"

                )

                .insert(

                    {


                        no_skb:

                            noSkb,


                        ...data

                    }

                );

    }


    if (

        result.error

    ) {


        paparMesej(

            "Gagal simpan: "

            +

            result.error.message,

            "error"

        );


        return;

    }


    tutupModal();


    paparMesej(

        "Data anggota berjaya disimpan.",

        "success"

    );


    await muatAnggota();


    muatDropdownPangkat();


    muatDropdownPos();


    muatDropdownUnit();


    muatFilterPos();


    muatFilterKawasan();

}


// =====================================================

function tutupModal() {


    document

        .getElementById(

            "modalAnggota"

        )

        .style.display =

        "none";

}


// =====================================================
// MESEJ
// =====================================================


function paparMesej(

    mesej,

    jenis

) {


    const div =

        document

            .getElementById(

                "mesej"

            );


    div.className =

        jenis;


    div.textContent =

        mesej;


    setTimeout(

        function () {


            div.textContent =

                "";


            div.className =

                "";

        },

        5000

    );

}


// =====================================================
// ESCAPE HTML
// =====================================================


function escapeHTML(

    value

) {


    if (

        value === null

        ||

        value === undefined

    ) {


        return "";

    }


    return String(

        value

    )


        .replace(

            /&/g,

            "&amp;"

        )


        .replace(

            /</g,

            "&lt;"

        )


        .replace(

            />/g,

            "&gt;"

        )


        .replace(

            /"/g,

            "&quot;"

        )


        .replace(

            /'/g,

            "&#039;"

        );

}
