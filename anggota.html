<script>


// =====================================================
// SUPABASE
// =====================================================


const SUPABASE_URL =

"https://nlwrrrwkjpktrifxeymw.supabase.co";


const SUPABASE_KEY =

"sb_publishable_0ymP9thOFXkuNYzvwa0gwQ_1mbxyFE6";


const supabaseClient =

supabase.createClient(

    SUPABASE_URL,

    SUPABASE_KEY

);


// =====================================================
// DATA
// =====================================================


let semuaAnggota = [];


// =====================================================
// MULA
// =====================================================


document.addEventListener(

    "DOMContentLoaded",

    async function () {


        await muatAnggota();


        muatDropdownPangkat();


        muatDropdownPos();


        muatDropdownUnit();


    }

);


// =====================================================
// MUAT ANGGOTA
// =====================================================


async function muatAnggota() {


    const result =

        await supabaseClient

            .from(

                "Data_Anggota"

            )

            .select(

                "no_skb,no_anggota,nama,pangkat,pos,unit,status"

            )

            .order(

                "nama",

                {

                    ascending:

                        true

                }

            );


    if (

        result.error

    ) {


        paparMesej(

            "Gagal ambil data: "

            + result.error.message,

            "error"

        );


        return;

    }


    semuaAnggota =

        result.data || [];


    paparAnggota();


    muatFilterPos();


}


// =====================================================
// SENARAI UNIK
// =====================================================


function senaraiUnik(

    namaKolum

) {


    return [

        ...

        new Set(

            semuaAnggota

                .map(

                    function (

                        item

                    ) {

                        return item[

                            namaKolum

                        ];

                    }

                )

                .filter(

                    function (

                        nilai

                    ) {


                        return (

                            nilai !== null

                            &&

                            nilai !== undefined

                            &&

                            String(

                                nilai

                            )

                            .trim()

                            !== ""

                        );

                    }

                )

                .map(

                    function (

                        nilai

                    ) {

                        return String(

                            nilai

                        )

                        .trim();

                    }

                )

        )

    ]

    .sort(

        function (

            a,

            b

        ) {


            return a.localeCompare(

                b

            );

        }

    );

}


// =====================================================
// DROPDOWN PANGKAT
// =====================================================


function muatDropdownPangkat() {


    const select =

        document

            .getElementById(

                "pangkat"

            );


    const data =

        senaraiUnik(

            "pangkat"

        );


    data.forEach(

        function (

            pangkat

        ) {


            const option =

                document

                    .createElement(

                        "option"

                    );


            option.value =

                pangkat;


            option.textContent =

                pangkat;


            select.appendChild(

                option

            );

        }

    );

}


// =====================================================
// DROPDOWN POS
// =====================================================


function muatDropdownPos() {


    const select =

        document

            .getElementById(

                "pos"

            );


    const data =

        senaraiUnik(

            "pos"

        );


    data.forEach(

        function (

            pos

        ) {


            const option =

                document

                    .createElement(

                        "option"

                    );


            option.value =

                pos;


            option.textContent =

                pos;


            select.appendChild(

                option

            );

        }

    );

}


// =====================================================
// DROPDOWN UNIT
// =====================================================


function muatDropdownUnit() {


    const select =

        document

            .getElementById(

                "unit"

            );


    const data =

        senaraiUnik(

            "unit"

        );


    data.forEach(

        function (

            unit

        ) {


            const option =

                document

                    .createElement(

                        "option"

                    );


            option.value =

                unit;


            option.textContent =

                unit;


            select.appendChild(

                option

            );

        }

    );

}


// =====================================================
// FILTER POS
// =====================================================


function muatFilterPos() {


    const select =

        document

            .getElementById(

                "filterPos"

            );


    select.innerHTML = `

        <option value="">

            Semua Pos

        </option>

    `;


    const data =

        senaraiUnik(

            "pos"

        );


    data.forEach(

        function (

            pos

        ) {


            const option =

                document

                    .createElement(

                        "option"

                    );


            option.value =

                pos;


            option.textContent =

                pos;


            select.appendChild(

                option

            );

        }

    );

}


// =====================================================
// PAPAR ANGGOTA
// =====================================================


function paparAnggota() {


    const cari =

        document

            .getElementById(

                "cari"

            )

            .value

            .toLowerCase();


    const filterPos =

        document

            .getElementById(

                "filterPos"

            )

            .value;


    const filterStatus =

        document

            .getElementById(

                "filterStatus"

            )

            .value;


    const data =

        semuaAnggota.filter(

            function (

                x

            ) {


                const teks =

                    (

                        x.no_skb

                        + " "

                        + x.no_anggota

                        + " "

                        + x.nama

                        + " "

                        + x.pangkat

                        + " "

                        + x.pos

                        + " "

                        + x.unit

                    )

                    .toLowerCase();


                return (

                    teks.includes(

                        cari

                    )


                    &&


                    (

                        !filterPos

                        ||

                        x.pos === filterPos

                    )


                    &&


                    (

                        !filterStatus

                        ||

                        x.status === filterStatus

                    )

                );

            }

        );


    const tbody =

        document

            .getElementById(

                "senaraiAnggota"

            );


    tbody.innerHTML = "";


    if (

        data.length === 0

    ) {


        tbody.innerHTML = `

            <tr>

                <td colspan="8">

                    Tiada rekod anggota.

                </td>

            </tr>

        `;


        return;

    }


    data.forEach(

        function (

            anggota

        ) {


            const tr =

                document

                    .createElement(

                        "tr"

                    );


            const statusClass =

                anggota.status === "Aktif"

                ?

                "badge-aktif"

                :

                "badge-tidak";


            tr.innerHTML = `

                <td>

                    ${escapeHTML(

                        anggota.no_skb

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.no_anggota

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.nama

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.pangkat

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.pos

                    )}

                </td>


                <td>

                    ${escapeHTML(

                        anggota.unit

                    )}

                </td>


                <td>


                    <span

                        class="badge

                        ${statusClass}"

                    >

                        ${escapeHTML(

                            anggota.status

                        )}

                    </span>


                </td>


                <td>


                    <button

                        class="btn-warning"

                        onclick=

                        "editAnggota('${escapeHTML(

                            anggota.no_skb

                        )}')"

                    >

                        ✏️ Edit

                    </button>


                </td>

            `;


            tbody.appendChild(

                tr

            );

        }

    );

}


// =====================================================
// BUKA TAMBAH
// =====================================================


function bukaTambah() {


    document

        .getElementById(

            "tajukModal"

        )

        .textContent =

        "Tambah Anggota";


    document

        .getElementById(

            "editNoSkb"

        )

        .value =

        "";


    document

        .getElementById(

            "noSkb"

        )

        .value =

        "";


    document

        .getElementById(

            "noAnggota"

        )

        .value =

        "";


    document

        .getElementById(

            "nama"

        )

        .value =

        "";


    document

        .getElementById(

            "pangkat"

        )

        .value =

        "";


    document

        .getElementById(

            "pos"

        )

        .value =

        "";


    document

        .getElementById(

            "unit"

        )

        .value =

        "";


    document

        .getElementById(

            "status"

        )

        .value =

        "Aktif";


    document

        .getElementById(

            "noSkb"

        )

        .disabled =

        false;


    document

        .getElementById(

            "modalAnggota"

        )

        .style.display =

        "block";

}


// =====================================================
// EDIT ANGGOTA
// =====================================================


function editAnggota(

    noSkb

) {


    const anggota =

        semuaAnggota.find(

            function (

                x

            ) {


                return String(

                    x.no_skb

                )

                ===

                String(

                    noSkb

                );

            }

        );


    if (!anggota) {

        return;

    }


    document

        .getElementById(

            "tajukModal"

        )

        .textContent =

        "Edit Anggota";


    document

        .getElementById(

            "editNoSkb"

        )

        .value =

        anggota.no_skb;


    document

        .getElementById(

            "noSkb"

        )

        .value =

        anggota.no_skb;


    document

        .getElementById(

            "noSkb"

        )

        .disabled =

        true;


    document

        .getElementById(

            "noAnggota"

        )

        .value =

        anggota.no_anggota || "";


    document

        .getElementById(

            "nama"

        )

        .value =

        anggota.nama || "";


    document

        .getElementById(

            "pangkat"

        )

        .value =

        anggota.pangkat || "";


    document

        .getElementById(

            "pos"

        )

        .value =

        anggota.pos || "";


    document

        .getElementById(

            "unit"

        )

        .value =

        anggota.unit || "";


    document

        .getElementById(

            "status"

        )

        .value =

        anggota.status || "Aktif";


    document

        .getElementById(

            "modalAnggota"

        )

        .style.display =

        "block";

}


// =====================================================
// SIMPAN ANGGOTA
// =====================================================


async function simpanAnggota() {


    const noSkb =

        document

            .getElementById(

                "noSkb"

            )

            .value

            .trim();


    const noAnggota =

        document

            .getElementById(

                "noAnggota"

            )

            .value

            .trim();


    const nama =

        document

            .getElementById(

                "nama"

            )

            .value

            .trim();


    const pangkat =

        document

            .getElementById(

                "pangkat"

            )

            .value;


    const pos =

        document

            .getElementById(

                "pos"

            )

            .value;


    const unit =

        document

            .getElementById(

                "unit"

            )

            .value;


    const status =

        document

            .getElementById(

                "status"

            )

            .value;


    const editNoSkb =

        document

            .getElementById(

                "editNoSkb"

            )

            .value;


    if (

        !noSkb

        ||

        !nama

    ) {


        alert(

            "No. SKB dan Nama wajib diisi."

        );


        return;

    }


    let result;


    if (

        editNoSkb

    ) {


        result =

            await supabaseClient

                .from(

                    "Data_Anggota"

                )

                .update(

                    {


                        no_anggota:

                            noAnggota,


                        nama:

                            nama,


                        pangkat:

                            pangkat,


                        pos:

                            pos,


                        unit:

                            unit,


                        status:

                            status

                    }

                )

                .eq(

                    "no_skb",

                    editNoSkb

                );

    }


    else {


        result =

            await supabaseClient

                .from(

                    "Data_Anggota"

                )

                .insert(

                    {


                        no_skb:

                            noSkb,


                        no_anggota:

                            noAnggota,


                        nama:

                            nama,


                        pangkat:

                            pangkat,


                        pos:

                            pos,


                        unit:

                            unit,


                        status:

                            status

                    }

                );

    }


    if (

        result.error

    ) {


        paparMesej(

            "Gagal simpan: "

            + result.error.message,

            "error"

        );


        return;

    }


    tutupModal();


    paparMesej(

        "Data anggota berjaya disimpan.",

        "success"

    );


    await muatAnggota();


    muatDropdownPangkat();


    muatDropdownPos();


    muatDropdownUnit();

}


// =====================================================
// TUTUP MODAL
// =====================================================


function tutupModal() {


    document

        .getElementById(

            "modalAnggota"

        )

        .style.display =

        "none";

}


// =====================================================
// MESEJ
// =====================================================


function paparMesej(

    mesej,

    jenis

) {


    const div =

        document

            .getElementById(

                "mesej"

            );


    div.className =

        jenis;


    div.textContent =

        mesej;


    setTimeout(

        function () {


            div.textContent =

                "";


            div.className =

                "";


        },

        5000

    );

}


// =====================================================
// ESCAPE HTML
// =====================================================


function escapeHTML(

    value

) {


    if (

        value === null

        ||

        value === undefined

    ) {


        return "";

    }


    return String(

        value

    )

        .replace(

            /&/g,

            "&amp;"

        )

        .replace(

            /</g,

            "&lt;"

        )

        .replace(

            />/g,

            "&gt;"

        )

        .replace(

            /"/g,

            "&quot;"

        )

        .replace(

            /'/g,

            "&#039;"

        );

}


</script>
